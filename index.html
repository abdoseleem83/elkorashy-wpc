<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>القرشي | طلبات الموزعين</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3050">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="طلبات القرشي">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" crossorigin="anonymous">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#1F3050;
  --navy-deep:#152238;
  --navy-soft:#2C4368;
  --gold:#C9A227;
  --gold-light:#E4C766;
  --bg:#F5F3EE;
  --card:#FFFFFF;
  --ink:#20242B;
  --muted:#6E7480;
  --line:#E4E0D6;
  --success:#2F7D5A;
  --success-bg:#E7F3EC;
  --danger:#B3261E;
  --radius:14px;
}
*{box-sizing:border-box;}
/* ⚠️ ده كان السبب الحقيقي إن الهيدر لسه بيتحرك مع التمرير رغم
   position:sticky: overflow-x:hidden من غير overflow-y مكتوب — قاعدة CSS
   بتخلي المتصفح يحط overflow-y:auto ضمنيًا، فـ body كان بيبقى صندوق تمرير
   مستقل عن نافذة العرض الحقيقية. الـ sticky كان بيلتصق بصندوق body الداخلي
   ده، مش بالشاشة اللي إنت شايفها فعليًا — فكان بيبان وكأنه لسه بيتحرك.
   بنكتب overflow-y:visible صراحةً عشان نفس الشاشة (viewport) تفضل هي
   صندوق التمرير الوحيد، وsticky يلتصق بيها هي بالظبط. */
html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden;overflow-y:visible;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Cairo',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  font-size:12px;
}
#app{max-width:640px;width:100%;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);overflow-x:hidden;overflow-y:visible;}

/* ---------- profile motif ---------- */
.profile-bar{
  height:5px;
  display:flex;
  width:100%;
}
.profile-bar span{flex:1;}
.profile-bar span:nth-child(1){background:var(--gold);}
.profile-bar span:nth-child(2){background:var(--navy-soft);}
.profile-bar span:nth-child(3){background:var(--gold-light);}
.profile-bar span:nth-child(4){background:var(--navy);}
.profile-bar span:nth-child(5){background:var(--gold);}

.chambers{
  display:flex;
  gap:3px;
  height:22px;
  margin:0 0 2px 0;
}
.chambers i{
  flex:1;
  border:1.5px solid rgba(255,255,255,.35);
  border-radius:2px;
}

/* ---------- header ---------- */
/* ⚠️ position:sticky اتجرّب مرتين ومكنش بيلتصق فعليًا (سواء بسبب overflow
   ضمني على أب، أو تعارض sticky مع أب flex زي #app). بدل ما نكمل نلاحق نفس
   المشكلة، بقى الهيدر جوه صندوق position:fixed حقيقي — ده مش بيعتمد على
   حساب "أقرب أب فيه تمرير" خالص، فمفيش مجال يفشل بنفس الطريقة تاني. */
.fixedhead-outer{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--navy-deep);
}
.fixedhead-inner{max-width:640px;margin:0 auto;}
header.top{
  background:linear-gradient(155deg,var(--navy) 0%,var(--navy-deep) 100%);
  color:#fff;
  padding:12px 14px 10px;
  overflow:hidden;
}
header.top .brand{
  display:flex;
  align-items:center;
  gap:9px;
}
header.top .logoimg{
  width:34px;height:34px;border-radius:8px;
  background:#fff;object-fit:contain;padding:3px;flex-shrink:0;
}
header.top h1{font-size:15px;margin:0;font-weight:800;letter-spacing:.1px;line-height:1.25;}
header.top p.sub{margin:1px 0 0;font-size:10.5px;color:#C7D0DE;font-weight:500;}

nav.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}
.discounttogglebtn{
  background:#3B7A57 !important;
  border-color:#3B7A57 !important;
  color:#fff !important;
  font-weight:800;
  border-radius:999px !important;
}
.extradiscwrap{display:inline-flex;align-items:center;gap:4px;margin-right:6px;vertical-align:middle;direction:rtl;}
.extradiscwrap label{font-size:12px;color:var(--gold);font-weight:800;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.4);}
.extradiscwrap input{width:52px;padding:3px 5px;border:2px solid var(--gold);border-radius:6px;font-size:14px;font-weight:800;text-align:center;background:var(--gold);color:#1F3050;}
.extradiscwrap .pctsign{font-size:13px;font-weight:800;color:var(--gold);}
.discounttogglebtn.on{
  background:var(--gold) !important;
  border-color:var(--gold) !important;
  color:var(--navy-deep) !important;
}
nav.tabs button{
  flex:1 1 auto;
  min-width:68px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  color:#DCE3EE;
  padding:7px 4px;
  border-radius:8px;
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:10.8px;
  cursor:pointer;
  transition:.15s;
}
nav.tabs button.active{
  background:var(--gold);
  border-color:var(--gold);
  color:var(--navy-deep);
}

main{flex:1;padding:18px 16px 100px;}

/* ---------- cards / sections ---------- */
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  border:1px solid var(--line);
}
.card h2{
  font-size:16.2px;
  margin:0 0 12px;
  font-weight:800;
  color:var(--navy);
  display:flex;
  align-items:center;
  gap:8px;
}
.card h2 .num{
  width:22px;height:22px;border-radius:6px;
  background:var(--navy);color:#fff;
  font-size:12.9px;display:flex;align-items:center;justify-content:center;
  font-weight:800;flex-shrink:0;
}

label{
  display:block;
  font-size:14px;
  font-weight:700;
  color:var(--muted);
  margin-bottom:6px;
}
input[type=text],input[type=tel],input[type=number],input[type=password],textarea{
  width:100%;
  border:1.5px solid var(--line);
  border-radius:10px;
  padding:11px 12px;
  font-family:'Cairo',sans-serif;
  font-size:16.2px;
  color:var(--ink);
  background:#FCFBF8;
}
input:focus,textarea:focus,button:focus-visible{
  outline:2px solid var(--gold);
  outline-offset:1px;
  border-color:var(--gold);
}
textarea{resize:vertical;min-height:60px;}
.field{margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
.row2{display:flex;gap:10px;}
.row2 .field{flex:1;}
.row3{display:flex;gap:6px;}
.row3 .field{flex:1;min-width:0;margin-bottom:0;}
.row3 .field input{padding:8px 6px;font-size:11.5px;}
.row3 .field label{font-size:10.5px;margin-bottom:2px;}
.distcard .field{margin-bottom:8px;}

/* chips */
.chipwrap{display:flex;flex-wrap:wrap;gap:8px;}
/* 4 في الصف — للقطاعات والألوان بالظبط زي ما طلب */
.chipwrap.chipgrid4{display:grid;grid-template-columns:repeat(4, minmax(0,1fr));gap:7px;}
.chipwrap.chipgrid4 .chip{padding:9px 6px;text-align:center;}
/* لون مميّز لكل قطاع — يبقى واضح ومختلف عن اللي جنبه في شبكة الـ4 في الصف */
.chip.sc-1{background:#EAF3FB;border-color:#8FB8DE;color:#1F4E79;}
.chip.sc-2{background:#EAF7EF;border-color:#8FCFA6;color:#1E6B3A;}
.chip.sc-3{background:#FBEFEA;border-color:#E3A98A;color:#8A4A1F;}
.chip.sc-4{background:#F4EAFB;border-color:#C6A0E0;color:#5B2C82;}
.chip.sc-5{background:#FBEAF0;border-color:#E0A0BE;color:#82285A;}
.chip.sc-6{background:#EAEFFB;border-color:#A0B3E0;color:#2A3C82;}
.chip.sc-7{background:#FBF7EA;border-color:#E0CE9F;color:#7A5F1F;}
.chip.sc-8{background:#EEEEEE;border-color:#BFBFBF;color:#444;}
.chip.sc-1.active,.chip.sc-2.active,.chip.sc-3.active,.chip.sc-4.active,
.chip.sc-5.active,.chip.sc-6.active,.chip.sc-7.active,.chip.sc-8.active{
  background:var(--navy);border-color:var(--navy);color:#fff;
}
/* الألوان بقت مربعات متساوية بالظبط (مش بيضاوي زي القطاعات) */
.chipwrap.chipgrid4.chipsquares .chip{
  /* ⚠️ aspect-ratio:1/1 + overflow:hidden كانوا بيقصّوا أي اسم لون طويل
     (زي "بيج بكاوتش 6 م") ويسيبوا كلمة واحدة بس ظاهرة. المربع دلوقتي
     "مربع لحد ما المحتوى يحتاج مساحة أكتر" — يكبر لفوق لو الاسم طويل
     بدل ما يقص جزء منه، ومفيش overflow:hidden خالص على النص. */
  aspect-ratio:1/1;
  min-height:64px;
  max-width:80px;
  width:100%;
  min-width:0;
  margin:0 auto;
  border-radius:10px;
  padding:4px 3px;
  font-size:10px;
  line-height:1.2;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  white-space:normal;
  word-break:break-word;
  height:auto;
}
.chipwrap.chipgrid4.chipsquares .chip small{
  font-size:8px;line-height:1.1;white-space:normal;word-break:break-word;
}
.whgrid{display:grid;grid-template-columns:repeat(2, 1fr);gap:10px;}
.cartbtn{position:relative;}
.cartbadge{
  position:absolute;top:-6px;left:-6px;background:var(--danger);color:#fff;
  border-radius:999px;min-width:18px;height:18px;font-size:10.5px;font-weight:800;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
}
.whtile{
  border:1.5px solid var(--line);background:#FCFBF8;border-radius:12px;
  padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;color:var(--ink);
  cursor:pointer;
}
.whtile .whicon{font-size:28px;}
.whtile.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.chip{
  border:1.5px solid var(--line);
  background:#FCFBF8;
  color:var(--ink);
  padding:9px 14px;
  border-radius:999px;
  font-family:'Cairo',sans-serif;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
}
.chip.active{
  background:var(--navy);
  border-color:var(--navy);
  color:#fff;
}
.chip.gold.active{background:var(--gold);border-color:var(--gold);color:var(--navy-deep);}

/* شيبس عمودي (قايمة رأسية) - بيتستخدم لعمود القطاعات الرئيسية */
.chipwrap-vertical{display:flex;flex-direction:column;flex-wrap:nowrap;gap:6px;}
.chipwrap-vertical .chip{
  width:100%;
  text-align:center;
  border-radius:10px;
  padding:10px 6px;
  white-space:normal;
  line-height:1.3;
}

/* تخطيط الأعمدة الثلاثة: القطاعات / الأصناف / التفاصيل - جنب بعض وقابلة للتمرير أفقيًا */
.ordercols{
  display:flex;
  gap:8px;
  align-items:flex-start;
  overflow-x:auto;
  padding-bottom:6px;
  -webkit-overflow-scrolling:touch;
  margin-bottom:12px;
}
.ordercols .card{margin-bottom:0;}
.ordercol{flex:0 0 auto;}
.ordercol-sectors{width:112px;}
.ordercol-products{width:230px;}
.ordercol-details{width:250px;}
.ordercol .productgrid{
  grid-template-columns:1fr;
}

.subchipwrap-compact{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:5px;
}
.chip.subchip-compact{
  padding:6px 5px;
  font-size:13.4px;
  border-radius:10px;
  line-height:1.3;
  white-space:normal;
  text-align:center;
  overflow-wrap:break-word;
}

.searchbox{position:relative;margin-bottom:10px;}
.searchbox input{padding-left:14px;}

.productgrid{
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:7px;
  padding:2px;
}
/* الأكسسوارات: أسماء قصيرة، فبنعمل خانات أصغر وأعمدة أكتر */
.productgrid.compact{
  grid-template-columns:repeat(auto-fill, minmax(78px, 1fr));
  gap:6px;
}
.productgrid.compact .ptile{
  min-height:54px;
  font-size:10.6px;
  padding:6px 4px 16px;
}
.productgrid.compact .ptile .stocktag,
.productgrid.compact .ptile .unavailtag{
  font-size:7.8px;
}
.productgrid .ptile{
  border:1.5px solid var(--line);
  border-radius:9px;
  background:#FCFBF8;
  padding:8px 5px 22px;
  font-size:12px;
  line-height:1.3;
  text-align:center;
  cursor:pointer;
  min-width:0;
  overflow-wrap:break-word;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:72px;
  word-break:break-word;
}
.productgrid .ptile:hover{background:#F0EDE4;}
.productgrid .ptile.selected{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700;}
.productgrid .empty{
  grid-column:1 / -1;
  padding:20px;text-align:center;color:var(--muted);font-size:14.6px;
}

.qtystepper{display:flex;align-items:center;gap:10px;}
.qtystepper button{
  width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line);
  background:#FCFBF8;font-size:20.2px;font-weight:800;color:var(--navy);cursor:pointer;
}
.qtystepper input{text-align:center;width:70px;}

.addbtn{
  width:100%;
  background:var(--navy);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:13px;
  font-family:'Cairo',sans-serif;
  font-weight:800;
  font-size:16.2px;
  cursor:pointer;
  margin-top:14px;
}
.addbtn:disabled{background:#B9C0CD;cursor:not-allowed;}

/* cart */
.cartrow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:11px 0;
  border-bottom:1px solid var(--line);
  gap:10px;
}
.cartrow:last-child{border-bottom:none;}
.cartrow .info{flex:1;min-width:0;}
.cartrow .pname{font-size:15.1px;font-weight:700;color:var(--ink);}
.cartrow .pmeta{font-size:13.4px;color:var(--muted);margin-top:2px;}
.cartrow .qty{font-size:15.1px;font-weight:800;color:var(--navy);white-space:nowrap;}
.cartrow .del{
  background:none;border:none;color:var(--danger);font-size:20.2px;cursor:pointer;padding:4px 6px;
}
.cartrow .del.edit{color:var(--navy);font-size:16.8px;}
.cartempty{color:var(--muted);font-size:14.6px;text-align:center;padding:14px 0;}
.linetotal{font-size:11.8px;color:var(--gold);font-weight:700;}
.autotag{font-size:11.2px;color:var(--navy);background:#EAF0F8;padding:1px 6px;border-radius:6px;font-weight:700;}
.pricetablewrap{overflow-x:auto;margin-top:14px;border:1px solid var(--line);border-radius:10px;}
.pricetable{width:100%;border-collapse:collapse;font-size:13.4px;white-space:nowrap;}
.pricetable th,.pricetable td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--line);}
.pricetable th{background:var(--navy);color:#fff;font-weight:700;font-size:12.9px;}
.pricetable td:nth-child(2){text-align:right;white-space:normal;min-width:140px;}
.pricetable tbody tr:nth-child(even){background:#FAF9F5;}
.pricetable tbody tr:last-child td{border-bottom:none;}
.carttotal{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:12px;padding-top:12px;border-top:2px solid var(--navy);
  font-size:15.7px;font-weight:800;color:var(--navy);
}
.carttotal b{font-size:17.9px;}
.pricenote{font-size:12.3px;color:#8A5A00;margin-top:6px;text-align:center;}

.submitbar{
  position:sticky;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,var(--bg) 60%,transparent);
  padding:14px 16px 18px;
  margin-top:-10px;
}
/* ⚠️ الشكل ده اتوحّد بعد ما اتشتكى إن "إرسال الطلب" شكله مختلف تمامًا
   عن "معاينة"/"حفظ للسلة" (عرض وطول وتخطيط مختلف). الثلاثة دلوقتي بنفس
   الحجم والشكل بالظبط — بس إرسال الطلب فاضل بلونه الذهبي المميز. */
.submitrow{display:flex;gap:8px;}
.submitrow .submitbtn,
.submitrow .savebtn{
  flex:1;
  border-radius:12px;
  padding:10px 6px;
  font-family:'Cairo',sans-serif;
  font-weight:800;
  font-size:12.9px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  min-height:66px;
  border:1.5px solid var(--navy);
}
.submitbtn{
  background:var(--gold);
  color:var(--navy-deep);
  border-color:var(--gold);
  box-shadow:0 6px 18px rgba(201,162,39,.35);
}
.submitbtn:disabled{background:#D9D2BC;box-shadow:none;cursor:not-allowed;color:#8A8470;border-color:#D9D2BC;}
.savebtn{
  background:#fff;
  color:var(--navy);
}
.savebtn .ic{font-size:20.2px;}
.savebtn.saved{background:var(--success);border-color:var(--success);color:#fff;}
.previewfoot .savebtn{width:100%;min-height:auto;flex-direction:row;}

/* success screen */
.success{
  text-align:center;
  padding:60px 20px;
}
.success .ic{
  width:70px;height:70px;border-radius:50%;
  background:var(--success-bg);color:var(--success);
  display:flex;align-items:center;justify-content:center;
  font-size:38.1px;margin:0 auto 18px;
}
.success h2{color:var(--navy);font-size:21.3px;margin:0 0 8px;}
.success p{color:var(--muted);font-size:15.1px;margin:0 0 22px;}
.success .ordid{
  display:inline-block;background:#fff;border:1.5px solid var(--line);
  border-radius:10px;padding:8px 16px;font-weight:800;color:var(--navy);font-size:15.7px;letter-spacing:.5px;
}
.newbtn{
  margin-top:22px;background:var(--navy);color:#fff;border:none;border-radius:10px;
  padding:12px 24px;font-family:'Cairo',sans-serif;font-weight:700;font-size:15.7px;cursor:pointer;
}
.newbtn.outline{background:none;border:1.5px solid var(--navy);color:var(--navy);margin-top:10px;}
.receiptpreview{
  margin:18px auto 4px;max-width:280px;border-radius:12px;overflow:hidden;
  border:1px solid var(--line);box-shadow:0 6px 18px rgba(0,0,0,.08);
}
.receiptpreview img{width:100%;display:block;}
.previewlabel{
  background:var(--navy);color:#fff;font-size:12.3px;font-weight:700;
  text-align:center;padding:6px;
}
.docsection{
  border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;
  background:#FCFBF8;text-align:right;
}
.docsectiontitle{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:10px;}
.iconbtnrow{display:flex;gap:8px;}
.iconbtn{
  flex:1;background:#fff;border:1.5px solid var(--line);border-radius:10px;
  padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:11.8px;font-weight:700;color:var(--ink);cursor:pointer;font-family:'Cairo',sans-serif;
}
.iconbtn:active{background:#F0EDE4;}
.receiptbtns{display:flex;flex-direction:column;gap:8px;max-width:280px;margin:0 auto;}
.receiptbtns .newbtn{margin-top:8px;width:100%;}

/* admin */
.pingate{padding:60px 20px;text-align:center;}
.pingate .ic{font-size:33.6px;margin-bottom:12px;}

.authtitle{color:var(--navy);font-size:17.4px;font-weight:800;text-align:center;margin:0 0 2px;}

.authcard h3{color:var(--navy);font-size:16.8px;margin:0 0 14px;text-align:center;font-weight:800;}
.authcard label{margin-top:2px;}

.authcard button:not([type=button]){

.authlinks span{cursor:pointer;}

.authlinks .muted{color:var(--muted);}
.authcard .err{color:var(--danger);font-size:14px;margin:6px 0 0;text-align:center;}

.adminbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.adminbar input{flex:1 1 100%;}
.adminbar .exportbtn{flex:1;padding:10px 8px;}

  font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;
}
.exportbtn.danger{background:var(--danger);}
.delbtn{
  margin-top:10px;width:100%;background:none;border:1.5px solid var(--danger);color:var(--danger);
  border-radius:10px;padding:9px;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;cursor:pointer;
}
.statuschips{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.statuschips .chip{padding:6px 12px;font-size:13.4px;}

.ordercard{margin-bottom:12px;}
.ordercard .ohead{

  padding-bottom:10px;border-bottom:1px dashed var(--line);
}
.ordercard .dname{font-weight:800;font-size:16.2px;color:var(--navy);}
.ordercard .dmeta{font-size:12.9px;color:var(--muted);margin-top:3px;}
.ordercard .oid{font-size:12.3px;color:var(--muted);font-weight:700;}
.statusbadge{
  font-size:12.3px;font-weight:800;padding:5px 10px;border-radius:999px;white-space:nowrap;cursor:pointer;
  border:none;font-family:'Cairo',sans-serif;
}
.statusbadge.pending{background:#FBEBD1;color:#8A5A00;}

.ordercard .items{font-size:14px;}
.ordercard .item-row{display:flex;justify-content:space-between;padding:4px 0;color:var(--ink);}
.ordercard .item-row b{color:var(--navy);}
.ordercard .note{
  margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
  font-size:13.4px;color:var(--muted);
}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:15.1px;}
.ordertotalline{
  margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
  font-size:14px;color:var(--muted);text-align:left;
}
.ordertotalline b{color:var(--navy);font-size:15.7px;}
.emptystate{text-align:center;padding:50px 20px;color:var(--muted);}
.emptystate .ic{font-size:33.6px;margin-bottom:10px;}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--navy-deep);color:#fff;padding:11px 20px;border-radius:10px;
  font-size:14.6px;font-weight:600;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.25);
  max-width:90%;text-align:center;
}

.installbanner{
  display:flex;align-items:center;gap:10px;
  background:#fff;border-bottom:1.5px solid var(--gold);
  padding:10px 14px;
}
.installbanner img{width:36px;height:36px;border-radius:8px;object-fit:contain;flex-shrink:0;}
.installtext{flex:1;display:flex;flex-direction:column;min-width:0;}
.installtext b{font-size:14px;color:var(--navy);}
.installtext span{font-size:11.8px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.installbtn{
  background:var(--gold);color:var(--navy-deep);border:none;border-radius:8px;
  padding:8px 14px;font-family:'Cairo',sans-serif;font-weight:800;font-size:13.4px;cursor:pointer;white-space:nowrap;
}
.installclose{background:none;border:none;color:var(--muted);font-size:17.9px;cursor:pointer;padding:4px;}

.installgate{
  min-height:100vh;
  background:linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 26px;text-align:center;color:#fff;
}
.installgate .gatelogo{
  width:88px;height:88px;border-radius:18px;background:#fff;object-fit:contain;
  padding:10px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,.3);
}
.installgate h1{font-size:21.3px;font-weight:800;margin:0 0 10px;}
.installgate .gatesub{font-size:14.6px;color:#C7D0DE;line-height:1.7;max-width:320px;margin:0 0 28px;}
.gatebtn{
  background:var(--gold);color:var(--navy-deep);border:none;border-radius:12px;
  padding:15px 30px;font-family:'Cairo',sans-serif;font-weight:800;font-size:16.8px;cursor:pointer;
  box-shadow:0 8px 22px rgba(201,162,39,.4);
}
.gatehint{font-size:12.3px;color:#9FAAC0;margin-top:14px;max-width:280px;line-height:1.6;}
.gatesteps{max-width:320px;width:100%;margin-bottom:10px;}
.gatestep{
  display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);
  border-radius:10px;padding:12px 14px;margin-bottom:10px;text-align:right;font-size:14px;
}
.gatestep b{
  width:24px;height:24px;border-radius:50%;background:var(--gold);color:var(--navy-deep);
  display:flex;align-items:center;justify-content:center;font-size:13.4px;flex-shrink:0;
}
.shareicon{margin-right:auto;font-size:16.8px;}
.gateskip{
  background:none;border:none;color:#9FAAC0;font-size:13.4px;font-family:'Cairo',sans-serif;
  text-decoration:underline;cursor:pointer;margin-top:26px;padding:6px;
}

/* product tile ticks */
.productgrid .ptile{position:relative;}
.productgrid .ptile .tick{
  position:absolute;top:3px;left:3px;
  background:var(--success);color:#fff;border-radius:50%;
  width:16px;height:16px;font-size:11.2px;display:flex;align-items:center;justify-content:center;
}
.productgrid .ptile.incart{border-color:var(--success);}

/* ===== ألوان التوفّر =====
   أخضر  = متوفر بالمخزون
   أحمر  = مفيش منه رصيد (لسه ينفع تختاره وتاخد سعره)
   رمادي = موقوف من الأدمن (مش هينفع تختاره خالص) */
.productgrid .ptile.instock{
  background:#EDF7EE;border-color:var(--success);
}
.productgrid .ptile.instock:hover{background:#DFF0E1;}

.productgrid .ptile.lowstock{background:#FFFBE8;}
.productgrid .ptile.lowstock:hover{background:#FFF3C4;}
.productgrid .ptile.outstock,
.productgrid .ptile.critstock{
  background:#FDECEC;border-color:var(--danger);color:#8A1F1F;
}
.productgrid .ptile.outstock:hover,
.productgrid .ptile.critstock:hover{background:#FADCDC;}
.productgrid .ptile.blackstock{
  background:#2A2A2A;border-color:#2A2A2A;color:#fff;
}
.productgrid .ptile.blackstock:hover{background:#000;}

/* المختار يفضل بلون الاختيار مهما كانت حالته */
.productgrid .ptile.selected{background:var(--navy);color:#fff;border-color:var(--navy);}

.productgrid .ptile.unavailable{
  opacity:.45;cursor:not-allowed;position:relative;
  background:#EDEBE4;border-color:var(--line);
}
.productgrid .ptile .unavailtag{
  position:absolute;bottom:2px;left:2px;right:2px;
  background:var(--danger);color:#fff;font-size:9px;font-weight:800;
  border-radius:4px;padding:1px 2px;text-align:center;
}
.productgrid .ptile .stocktag{
  position:absolute;bottom:2px;left:2px;right:2px;
  font-size:8.4px;font-weight:800;border-radius:4px;padding:2px;text-align:center;
  line-height:1.2;white-space:normal;
}
.productgrid .ptile .stocktag.out{background:var(--danger);color:#fff;}
.productgrid .ptile .stocktag.low{background:var(--gold);color:#1F3050;}
.productgrid .ptile .stocktag.in{background:var(--success);color:#fff;}
.productgrid .ptile .stocktag.black{background:#000;color:#fff;}

/* مفتاح الألوان فوق شبكة الأصناف */
.stocklegend{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  font-size:12.3px;color:var(--muted);margin-bottom:10px;
}
.stocklegend span{display:flex;align-items:center;gap:4px;}
.stocklegend i{width:10px;height:10px;border-radius:3px;display:inline-block;}
.chip.disabled{
  opacity:.5;cursor:not-allowed;
  background:#EDEBE4;border-color:var(--line);color:var(--muted);
}
/* لون مفيش منه رصيد: أحمر واضح + كلمة "غير متوفر" تحته */
/* لون مفيش منه رصيد خالص: أسود واضح */
.chip.nostockchip{
  background:#2A2A2A;border-color:#2A2A2A;color:#fff;font-weight:700;
}
.chip.nostockchip.active{
  background:#000;border-color:#000;color:#fff;
}
.chip.nostockchip small{color:#D8D8D8;}
.chip.nostockchip.active small{color:#fff;}
/* لون متاح بالكامل: أخضر */
.chip.greenchip{
  background:var(--success-bg);border-color:var(--success);color:var(--success);font-weight:700;
}
.chip.greenchip.active{
  background:var(--success);border-color:var(--success);color:#fff;
}
.chip.outstockchip{
  background:#FDECEC;border-color:var(--danger);color:#8A1F1F;font-weight:700;
}
.chip.outstockchip.active{
  background:var(--danger);border-color:var(--danger);color:#fff;
}
.chip small, .chip.disabled small{
  display:block;font-size:9.5px;font-weight:800;line-height:1.2;margin-top:1px;opacity:.9;
}
.chip.gold.lowstockchip{
  border-color:#E0A800;background:#FFF8E6;
}
.chip.gold.lowstockchip small{color:#8A5A00;}
.chip.gold.lowstockchip.active small{color:#fff;}
.lowstocknote{
  background:#FBEBD1;color:#8A5A00;border:1px solid #E0A800;
  border-radius:8px;padding:6px 9px;font-size:10.5px;font-weight:700;
  margin-top:6px;line-height:1.4;
}
.chip.outstockchip small{color:var(--danger);}
.chip.outstockchip.active small{color:#fff;}

/* staged product block */
.stagedblock{
  border:1.5px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;
  background:#FCFBF8;transition:.3s;
}
.stagedblock.cancelling{
  opacity:.4;
  text-decoration:line-through;
  text-decoration-color:var(--danger);
  text-decoration-thickness:3px;
}
.stagedhead{margin-bottom:10px;}
.stagedname{font-weight:800;font-size:15.7px;color:var(--navy);}
.edittag{
  display:inline-block;background:#FBEBD1;color:#8A5A00;font-size:11.2px;font-weight:800;
  padding:2px 8px;border-radius:6px;margin-right:6px;vertical-align:middle;
}
.stagedmain{font-size:12.9px;color:var(--muted);margin-top:1px;}
.colorqtytable{margin-top:6px;margin-bottom:8px;}
.cqheader{
  display:flex;align-items:center;gap:4px;padding:0 2px 4px;
  font-size:10.1px;color:var(--muted);font-weight:800;
}
.cqheader .cqcol-color{flex:1.1;}
.cqheader .cqcol-unit{width:64px;text-align:center;}
.cqheader .cqcol-qty{width:82px;text-align:center;}
.cqheader .cqcol-price{width:50px;text-align:center;}
.cqrow{
  display:flex;align-items:center;gap:4px;
  padding:6px 2px;border-bottom:1px solid var(--line);
}
.cqrow:last-child{border-bottom:none;}
.cqcolor{
  flex:1.1;font-size:12.3px;font-weight:700;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.cqselect{
  width:64px;border:1.3px solid var(--line);border-radius:8px;background:#fff;
  font-family:'Cairo',sans-serif;font-size:10.6px;padding:5px 1px;color:var(--ink);text-align:center;
}
.cqunitfixed{width:64px;text-align:center;font-size:10.6px;color:var(--muted);font-weight:700;}
.qtystepper.small{display:flex;align-items:center;gap:3px;width:82px;justify-content:center;}
.qtystepper.small button{width:23px;height:23px;font-size:14.6px;border-radius:6px;}
.qtystepper.small input{width:30px;font-size:11.8px;padding:4px 1px;}
.cqprice{
  width:50px;text-align:center;font-size:11.2px;font-weight:800;color:var(--navy);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.stagedbtns{display:flex;gap:8px;margin-top:12px;}
.confirmbtn{
  flex:1;background:var(--success);color:#fff;border:none;border-radius:9px;
  padding:8px;font-family:'Cairo',sans-serif;font-weight:800;font-size:11.8px;cursor:pointer;
}
.confirmbtn.small{flex:none;padding:7px 10px;font-size:11px;border-radius:8px;}
.cancelbtn{
  flex:1;background:none;border:1.5px solid var(--danger);color:var(--danger);border-radius:9px;
  padding:8px;font-family:'Cairo',sans-serif;font-weight:700;font-size:11.8px;cursor:pointer;
}
/* ⚠️ الصف المختصر ده بيظهر تحت الصنف مباشرة لما يكون اللون اتحدد بالفعل من
   خطوة "اختار اللون" العامة فوق الشبكة — مفيش داعي نعيد عرض اختيار اللون
   ولا نبعت الموزع لقسم "حدد التفاصيل" البعيد؛ وحدة+كمية+سعر+زرار إضافة
   وخلاص. */
.inlineqtyrow{
  grid-column:1/-1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:#F7F5F0;border:1.3px solid var(--line);border-radius:10px;padding:8px 10px;margin-top:-4px;
}
.inlineqtyrow .cqprice{width:auto;flex:1;text-align:left;}

/* cart grouped by sector */
.cartgroup{margin-bottom:14px;}
.cartgroup:last-child{margin-bottom:0;}
.cartgrouptitle{
  font-size:13.4px;font-weight:800;color:var(--gold);
  text-transform:uppercase;letter-spacing:.3px;
  padding-bottom:6px;margin-bottom:4px;border-bottom:1.5px solid var(--gold-light);
}

/* edit banner */
.editbanner{
  background:#FBEBD1;color:#8A5A00;font-size:14px;font-weight:700;
  padding:9px 12px;border-radius:9px;margin-bottom:14px;text-align:center;
}

/* modals */
.modalbg{
  position:fixed;inset:0;background:rgba(21,34,56,.55);
  display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;
}
.modalcard{
  background:#fff;border-radius:16px;padding:26px 22px;max-width:360px;width:100%;
  text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);
}
.modalic{font-size:35.8px;margin-bottom:10px;}
.modalcard h3{color:var(--navy);font-size:18.5px;margin:0 0 10px;}
.modalcard p{color:var(--muted);font-size:14px;line-height:1.7;margin:0 0 20px;}
.modalbtns{display:flex;flex-direction:column;gap:8px;}
.modalbtn{
  border:1.5px solid var(--line);background:#fff;color:var(--ink);
  border-radius:10px;padding:12px;font-family:'Cairo',sans-serif;font-weight:700;font-size:15.1px;cursor:pointer;
}
.modalbtn.primary{background:var(--navy);border-color:var(--navy);color:#fff;}

/* in-app PDF preview */
.previewmodal{
  background:#fff;border-radius:14px;width:100%;max-width:520px;
  max-height:88dvh;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}
.previewhead{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;background:var(--navy);color:#fff;font-weight:800;font-size:15.7px;
}
.previewclose{
  background:transparent;border:none;color:#fff;font-size:20.2px;cursor:pointer;line-height:1;
}
.previewbody{overflow:auto;padding:10px;background:#F5F3EE;flex:1;}
.previewfoot{padding:10px 14px;border-top:1px solid var(--line);}
.previewfoot .savebtn{width:100%;}

.delbtn.edit{border-color:var(--navy);color:var(--navy);margin-top:8px;}
.adminbtnrow{display:flex;gap:8px;margin-top:10px;}
.adminbtnrow .delbtn{margin-top:0;flex:1;}
.delbtn.pdf{border-color:var(--gold);color:#8A6D0B;}

@media (min-width:480px){
  header.top{padding:26px 28px 22px;}
  main{padding:22px 24px 100px;}
}

function productsForGroup(main, sub){
  const seen = new Map();
  CATALOG.filter(d=>d.main===main && (!sub || d.sub===sub)).forEach(d=>{
    if(!seen.has(d.product)) seen.set(d.product, []);
    seen.get(d.product).push(d);
  });
  return seen;
}
function subGroupsForMain(main){
  return [...new Set(CATALOG.filter(d=>d.main===main).map(d=>d.sub).filter(Boolean))];
}
function sectorNeedsSubFilter(main){
  return main.includes('اكسسوارات') || main==='ابواب WPC';
}
function colorsForProduct(main, product){
  return CATALOG.filter(d=>d.main===main && d.product===product);
}
// الألوان المتاحة في قطاع معيّن (بترتيب ظهورها في الكتالوج) — لو القطاع مفيهوش
// ألوان حقيقية (زي شاتر) بترجع مصفوفة فاضية، وساعتها مش هيظهر خطوة "اختار اللون".
function colorsForMain(main){
  const seen = [];
  CATALOG.forEach(d=>{
    if(d.main===main && d.color && !seen.includes(d.color)) seen.push(d.color);
  });
  return seen;
}
function hasRealColors(main, product){
  return colorsForProduct(main, product).some(c => c.color);
}
function isProductFullyUnavailable(main, product){
  const opts = colorsForProduct(main, product);
  return opts.length>0 && opts.every(c=>c.available===false);
}
function isColorUnavailable(main, product, color){
  const item = findCatalogItem(main, product, color);
  return item ? item.available===false : false;
}

// أقل من لفة كاملة = صفر فعليًا (في كل مكان، مش بس في التقرير)
// حالة اللون في شاشة الاختيار:
//   'out'  = صفر فعلي (الرصيد صفر أو الأدمن قافله)      -> أحمر "مفيش رصيد"
//   'crit' = أقل من لفة كاملة                            -> أحمر "كمية قليلة"
//   'low'  = أقل من 5 لفات (بس لفة فأكتر)               -> أصفر "كمية قليلة"
//   'ok'   = كفاية
function colorStockLevel(item){
  if(!item || item.available===false) return 'out'; // "موقوف" يفضل زي ما هو
  if(!warehouseAffectsStock()) return 'ok';
  const n = Number(item.stock);
  if(!isFinite(n) || n <= 0) return 'out';
  if(item.inStock === false) return 'out';
  const content = Number(item.unit) || 1;
  if(n < content) return 'crit';               // أقل من لفة
  if(n < lowStockLimitFor(item)) return 'low'; // أقل من 5 لفات
  return 'ok';
}

// المخازن دي (العاشر والمنصورة) ماعندهاش تتبّع رصيد حقيقي — الأصناف كلها
// تتعامل كأنها متاحة دايمًا فيها من غير أي تلوين أو لافتة "متوفر/مفيش رصيد".
// وطنطا والإسكندرية بس هما اللي بيتبع فيهم الرصيد الحقيقي.
// والعميل (مش الموزع) ميشوفش أي معلومة رصيد في أي مخزن، ومش بيشوف اختيار
// مخزن أصلاً — فالرصيد بالنسبالو مالوش معنى في كل الأحوال.
function isClientAccount(){
  return !!(state.currentUser && state.currentUser.distType === 'عميل');
}

const STOCK_TRACKED_WAREHOUSES_ = ['طنطا', 'الاسكندرية'];
function warehouseAffectsStock(){
  if(state.currentUser && state.currentUser.distType === 'عميل') return false;
  return STOCK_TRACKED_WAREHOUSES_.includes(state.warehouse);
}

function effectiveInStock(item){
  if(!item || item.available===false) return false; // "موقوف" من الأدمن يفضل يتطبق دايمًا
  if(!warehouseAffectsStock()) return true;
  if(item.inStock===false) return false;
  const n = Number(item.stock);
  if(!isFinite(n) || n <= 0) return false;
  const content = Number(item.unit) || 1;
  return n >= content;
}

function isProductOutOfStock(main, product){
  const opts = colorsForProduct(main, product);
  return opts.length>0 && opts.every(c=>c.available!==false && isColorOutOfStock(main, product, c.color));
}

// ⚠️ كان فيه تناقض: تاج الصنف كان بيقول "مفيش رصيد" (أحمر) حتى لو لون واحد
// فيه عيدان متاحة (crit) — بينما شاشة تفاصيل نفس الصنف كانت بتوري اللون ده
// "متاح اعواد". بنجمع حالة الألوان كلها هنا بنفس المنطق (3 مستويات) عشان
// التاج فوق يطابق اللي جوه بالظبط:
//   'ok'   = فيه لون واحد على الأقل بلفة كاملة فأكتر
//   'crit' = مفيش لفة كاملة في أي لون، بس فيه عيدان في لون واحد على الأقل
//   'out'  = كل الألوان صفر فعليًا
function productStockLevel(main, product){
  const opts = colorsForProduct(main, product).filter(c=>c.available!==false);
  if(!opts.length) return 'out';
  let sawCrit = false;
  for(const c of opts){
    const lvl = colorStockLevel(findCatalogItem(main, product, c.color));
    if(lvl==='ok' || lvl==='low') return 'ok';
    if(lvl==='crit') sawCrit = true;
  }
  return sawCrit ? 'crit' : 'out';
}
// بيرجّع نص مختصر بالألوان المتوفرة فعلاً في الصنف ده:
// "جميع الألوان" لو كلها متوفرة · "بيج، ابيض" لو بعضها · '' لو مفيش
// هل الكمية المتاحة قليلة؟ (بنرجّع true/false بس — الموزع مش المفروض يشوف الرقم)
// الرقم اللي جاي من السيرفر أصلاً = الرصيد − المحجوز، وبالعود/القطعة.
function lowStockLimitFor(item){
  // محتوى اللفة (عمود D في شيت الأصناف) — للقطعة بيبقى 1
  const content = Number(item && item.unit) || 1;
  return LOW_STOCK_ROLLS * content;
}
function isLowStock(main, product, color){
  const item = findCatalogItem(main, product, color);
  if(!effectiveInStock(item)) return false;   // أقل من لفة = صفر مش قليل
  const q = Number(item.stock);
  return q < lowStockLimitFor(item);
}

function availableColorsLabel(main, product){
  const opts = colorsForProduct(main, product).filter(c => c.available !== false);
  if(!opts.length) return '';
  const withColor = opts.filter(c => c.color);
  // صنف من غير ألوان أصلاً
  if(!withColor.length) return opts.some(c=>effectiveInStock(c)) ? 'متوفر' : '';
  const inStock = withColor.filter(c => effectiveInStock(c)).map(c => c.color);
  if(!inStock.length) return '';
  if(inStock.length === withColor.length) return 'جميع الألوان';
  return inStock.join('، ');
}

// بيرجّع أسماء الألوان اللي فيها "كمية قليلة" (عيدان بس، مفيش لفة كاملة) —
// عشان تاج الصنف "كمية قليلة" يوضّح أنهي لون بالظبط، مش يسيب الموزع يخمّن.
function lowStockColorsLabel(main, product){
  const opts = colorsForProduct(main, product).filter(c => c.available !== false && c.color);
  const names = opts
    .filter(c => colorStockLevel(findCatalogItem(main, product, c.color)) === 'crit')
    .map(c => c.color);
  return names.join('، ');
}

function isColorOutOfStock(main, product, color){
  const item = findCatalogItem(main, product, color);
  if(!item) return false;
  return item.available!==false && !effectiveInStock(item);
}
function unitOptionsForGroup(main){
  if(main==='ابواب WPC') return ['بدون إكسسوارات','بإكسسوارات'];
  if(['قطاعات PVC كومبن','قطاعات كرافت لاين','نيو لاين','شاتر'].includes(main)) return ['لفة','عود'];
  if(main.includes('اكسسوارات')) return ['كرتونة','قطعة'];
  if(main===OTHER_SECTOR) return ['قطعة','كرتونة','لفة','عود'];
  return ['قطعة'];
}
function unitColumnLabel(main){
  return main==='ابواب WPC' ? 'الإكسسوارات' : 'الوحدة';
}

// ===== catalog loading (from Google Sheet, with static fallback) =====
async function loadCatalog(){
  state.catalogLoading = true; state.catalogError = false; render();
  try{
    const res = await fetch(APPS_SCRIPT_URL + '?action=catalog');
    const data = await res.json();
    if(data && Array.isArray(data.items) && data.items.length){
      CATALOG = data.items.map(d=>({
        name:d.name, main:d.main, sub:d.sub,
        unit: Number(d.unit)||1, product: d.product || d.name, color: d.color || '',
        price: (d.price===null || d.price===undefined || d.price==='') ? null : Number(d.price),
        available: d.available !== false,
        inStock: d.inStock !== false,
        stock: (d.stock===null || d.stock===undefined) ? null : Number(d.stock)
      }));
      DISCOUNTS = data.discounts || {};
    } else {
      throw new Error('empty catalog');
    }
  }catch(e){
    CATALOG = FALLBACK_CATALOG.map(d=>Object.assign({price:null, available:true, inStock:true}, d));
    DISCOUNTS = {};
    state.catalogError = true;
  }
  MAIN_GROUPS = [...new Set(CATALOG.map(d=>d.main))];
  SECTOR_CHIPS = [...MAIN_GROUPS, OTHER_SECTOR];
  state.catalogLoading = false;
  render();
}

// ===== pricing =====
// ⚠️ جوجل شيتس بيخزّن رقم الهاتف كـ "رقم" مش نص (وبيشيل الصفر اللي في الأول).
// فالقيم الراجعة من الشيت ممكن تبقى أرقام، و .trim() بيموت عليها.
// الدالة دي بتضمن إن أي قيمة نستخدمها كنص تبقى نص فعلاً.
function asText(v){
  return (v === null || v === undefined) ? '' : String(v);
}

// رقم الطلب المعروض للمستخدم: رقم تسلسلي لكل مخزن (1، 2، 3...) لو متوفر
// من السيرفر، وإلا (طلبات قديمة اتسجلت قبل الميزة دي) بنرجع لمعرّف الطلب
// القديم كـ fallback بس عشان الطلبات القديمة تفضل متعرّفة.
function orderNoDisplay_(order){
  if(!order) return '';
  return asText(order.orderNo).trim() || asText(order.id).toUpperCase();
}

function normalizeProductName(s){
  return String(s||'').trim().replace(/\s+/g,' ');
}
function findCatalogItem(main, product, color){
  const np = normalizeProductName(product), nc = normalizeProductName(color);
  let item = CATALOG.find(d=>d.main===main && normalizeProductName(d.product)===np && normalizeProductName(d.color)===nc);
  if(!item && nc===''){
    // الصنف متوقع من غير لون، لكن ممكن خلية "اللون" في الشيت فيها نص غلط
    // (زي اسم مجموعة فرعية) بدل ما تكون فاضية — لو في صنف واحد بس بنفس
    // الاسم والقطاع، نرجّعه بدل ما نسيب السعر مفقود
    const candidates = CATALOG.filter(d=>d.main===main && normalizeProductName(d.product)===np);
    if(candidates.length===1) item = candidates[0];
  }
  return item;
}
function findCatalogItemAnyMain(product, color){
  const np = normalizeProductName(product), nc = normalizeProductName(color);
  let item = CATALOG.find(d=>normalizeProductName(d.product)===np && normalizeProductName(d.color)===nc);
  if(!item && nc===''){
    const candidates = CATALOG.filter(d=>normalizeProductName(d.product)===np);
    if(candidates.length===1) item = candidates[0];
  }
  return item;
}
function getDiscount(main){
  const v = DISCOUNTS[main];
  if(typeof v!=='number' || isNaN(v)) return 0;
  // ⚠️ السيرفر بيحوّل الكسر العشري لنسبة مئوية (×100)، وده بيولّد صور مشوّهة
  // زي 7.000000000000001% بسبب دقة الأرقام العشرية في الكمبيوتر. بنقرّبها
  // هنا لأقرب رقمين عشريين عشان تتعرض نضيفة (7%) في كل حتة بتستخدمها.
  return Math.round(v * 100) / 100;
}
// الخصم يتفصل ويتحسب بس للموزع (النوع من شيت المستخدمين)؛ العميل يشوف السعر
// من غير أي خصم خالص.
function isDiscountEligible(){
  return !!(state.currentUser && state.currentUser.distType === 'موزع');
}
// نفس محتوى بلوك "الأصناف المطلوبة" — استخرجناها لدالة مستقلة عشان نقدر
// نستخدمها في مكانين: الكارت جوه فورم الطلب، وشاشة مراجعة السلة الجديدة
// (اللي بتفتح لما تدوس على أيقونة السلة فوق).
function renderCartItemsHtml(cart){
  if(!cart.length) return '<div class="cartempty">لسه معملتش إضافة لأي صنف</div>';
  const cartGroups = new Map();
  cart.forEach((it,idx)=>{
    if(!cartGroups.has(it.main)) cartGroups.set(it.main, []);
    cartGroups.get(it.main).push({...it, _idx: idx});
  });
  const orderedMains = orderGroups_(cartGroups);
  const pricing = computeCartPricing(cart);
  const hasMissingPrice = cart.some(it=>it.lineTotal==null);

  return `
    ${orderedMains.map(main=>`
      <div class="cartgroup">
        <div class="cartgrouptitle">${esc(main)}</div>
        ${cartGroups.get(main).map(it=>`
          <div class="cartrow">
            <div class="info">
              <div class="pname">${esc(it.product)}</div>
              <div class="pmeta">${it.color ? esc(it.color) : ''}${it.note ? (it.color?' · ':'') + esc(it.note) : ''}${it.autoBundled ? ' <span class="autotag">🔗 مضاف تلقائيًا مع الباب</span>' : ''}</div>
            </div>
            <div class="qty">×${it.qty} ${esc(it.unitType||'')}<br><span class="linetotal">${it.lineTotal==null?'بدون سعر':Math.round(it.lineTotal).toLocaleString('en-US')+' ج.م'}</span></div>
            ${it.autoBundled ? '' : `<button class="del edit" data-act="edit-cart-item" data-main="${esc(it.main)}" data-product="${esc(it.product)}">✏️</button>`}
            <button class="del" data-act="del-cart" data-idx="${it._idx}">✕</button>
          </div>
        `).join('')}
      </div>
    `).join('')}
    ${renderPriceTable(cart)}
    ${(()=>{
      // ⚠️ البق الحقيقي: الملخص ده (الإجمالي قبل/بعد الخصم) كان بيتحكم فيه
      // بس بشرط "فيه خصم أصلاً" (discountAmount>0) — من غير ما يتأكد إن
      // زرار "إظهار الخصم" مفعّل. فحتى لو الزرار بيقول "مخفي"، الملخص كان
      // بيوري تفاصيل الخصم بره الجدول نفسه. دلوقتي بيتأكد من الزرار كمان.
      const showDiscountBreakdown = isDiscountEligible() && pricing.discountAmount>0 && (state.discountVisible || pricing.customPct>0);
      return showDiscountBreakdown;
    })() ? `
      <div class="carttotal">
        <span>الإجمالي قبل الخصم</span>
        <b>${Math.round(pricing.subtotal).toLocaleString('en-US')} ج.م</b>
      </div>
      ${pricing.discountAmount>0?`<div class="carttotal" style="color:var(--gold);">
        <span>${pricing.customPct>0 ? 'خصم مخصص ('+pricing.customPct+'%)' : 'خصم القطاع'}</span>
        <b>- ${Math.round(pricing.discountAmount).toLocaleString('en-US')} ج.م</b>
      </div>`:''}
      <div class="carttotal">
        <span>الإجمالي بعد الخصم</span>
        <b>${Math.round(pricing.total).toLocaleString('en-US')} ج.م</b>
      </div>
      ` : `
      <div class="carttotal">
        <span>الإجمالي</span>
        <b>${Math.round(pricing.total).toLocaleString('en-US')} ج.م</b>
      </div>
      `
    }
    ${hasMissingPrice ? '<div class="pricenote">⚠️ في أصناف بدون سعر مش داخلة في الإجمالي</div>' : ''}
  `;
}

function computeCartPricing(cartItems){
  const subtotal = cartItems.reduce((s,it)=> s + (it.lineTotal||0), 0);
  const customPct = (isDiscountEligible() && state.extraDiscount>0) ? state.extraDiscount : 0;
  let discountAmount = 0;
  if(isDiscountEligible()){
    cartItems.forEach(it=>{
      if(it.lineTotal==null) return;
      // لو في خصم مخصص → يحل محل خصم القطاع الأصلي
      const pct = customPct>0 ? customPct : getDiscount(it.main);
      if(pct>0) discountAmount += it.lineTotal * (pct/100);
    });
  }
  return { subtotal, discountAmount, customPct, total: subtotal - discountAmount };
}
// جدول عرض سعر رسمي: م / بيان / الكمية / السعر (+ نسبة الخصم / خصم مبلغ / الصافي للموزع بس).
// العميل يشوف نفس الجدول من غير أعمدة الخصم خالص.
function renderPriceTable(cartItems){
  if(!cartItems.length) return '';
  // الخصم مابيتعرضش غير لو الحساب موزع أصلاً (isDiscountEligible)، وحتى
  // ساعتها بس لو دوس على أيقونة "إظهار الخصم" — عشان يقدر يوري الشاشة
  // لعميل من غير ما نسبة الخصم تبان له بالغلط.
  const eligible = isDiscountEligible() && state.discountVisible;
  const head = eligible
    ? `<tr><th>م</th><th>بيان</th><th>الكمية</th><th>السعر</th><th>نسبة الخصم</th><th>خصم مبلغ</th><th>الصافي</th></tr>`
    : `<tr><th>م</th><th>بيان</th><th>الكمية</th><th>السعر</th></tr>`;
  const rows = cartItems.map((it,idx)=>{
    const desc = esc(it.product) + (it.color ? ' - ' + esc(it.color) : '');
    const qtyTxt = esc(String(it.qty)) + ' ' + esc(it.unitType||'');
    const priceTxt = it.lineTotal==null ? 'بدون سعر' : Math.round(it.lineTotal).toLocaleString('en-US');
    if(!eligible){
      return `<tr><td>${idx+1}</td><td>${desc}</td><td>${qtyTxt}</td><td>${priceTxt}</td></tr>`;
    }
    const pct = (state.extraDiscount>0) ? state.extraDiscount : getDiscount(it.main);
    const discAmt = (it.lineTotal!=null && pct>0) ? it.lineTotal*(pct/100) : 0;
    const net = it.lineTotal==null ? null : it.lineTotal - discAmt;
    return `<tr>
      <td>${idx+1}</td><td>${desc}</td><td>${qtyTxt}</td><td>${priceTxt}</td>
      <td>${pct>0 ? pct+'%' : '—'}</td>
      <td>${discAmt>0 ? Math.round(discAmt).toLocaleString('en-US') : '—'}</td>
      <td>${net==null ? '—' : Math.round(net).toLocaleString('en-US')}</td>
    </tr>`;
  }).join('');
  return `<div class="pricetablewrap"><table class="pricetable"><thead>${head}</thead><tbody>${rows}</tbody></table></div>`;
}
function calcUnitPrice(main, product, color, unitType){
  const item = findCatalogItem(main, product, color);
  if(!item || item.price==null) return null;
  const bigUnits = ['لفة','كرتونة'];
  const multiplier = bigUnits.includes(unitType) ? (item.unit || 1) : 1;
  // السعر المعروض في الشاشة دايمًا قبل الخصم — الخصم بيتحسب ويتفصل بس في عرض السعر النهائي
  return item.price * multiplier;
}
function fmtPrice(n){
  if(n==null) return 'السعر غير متاح';
  return Math.round(n).toLocaleString('en-US') + ' ج.م';
}
function renderOrderTotalLine(o){
  if(!o.items || !o.items.length) return '';
  const total = o.items.reduce((s,it)=> s + (it.lineTotal||0), 0);
  const hasPricing = o.items.some(it=>it.lineTotal!=null);
  if(!hasPricing) return '';
  return `<div class="ordertotalline">الإجمالي: <b>${Math.round(total).toLocaleString('en-US')} ج.م</b></div>`;
}

let toastTimer=null;
function showToast(msg, duration=2600){
  clearTimeout(toastTimer);
  let t = $('#toast');
  if(!t){ t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.display='block';
  toastTimer = setTimeout(()=>{ t.style.display='none'; }, duration);
}


// ===== Web Push Notification =====
const LS_PUSH_SUB = 'elkPushSub';

function urlBase64ToUint8Array(b64){
  const padding = '='.repeat((4 - b64.length%4)%4);
  const base64 = (b64+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

async function registerPush(){
  try{
    if(!('serviceWorker' in navigator)||!('PushManager' in window)) return null;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      const perm = await Notification.requestPermission();
      if(perm!=='granted') return null;
      sub = await reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    localStorage.setItem(LS_PUSH_SUB, JSON.stringify(sub.toJSON()));
    await sendPushSubToServer(sub.toJSON());
    return sub;
  }catch(e){ console.warn('registerPush:',e); return null; }
}

async function sendPushSubToServer(subJson){
  try{
    const username = state.currentUser && state.currentUser.username;
    if(!username) return;
    await fetch(APPS_SCRIPT_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'savePushSub', username, sub: subJson })
    });
  }catch(e){ console.warn('sendPushSubToServer:',e); }
}

async function ensurePushRegistered(){
  if(!state.currentUser || state.currentUser.username==='admin') return;
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted') await registerPush();
}

function chambersHtml(n=4){

// ===== safety net: never let a promise hang the UI forever =====
// لو أي عملية (نت بطيء، سيرفر واقف، مكتبة PDF اتعلقت...) ماخلصتش خلال المهلة دي،
// نرفض الـ Promise يدويًا عشان الزرار يرجع لحالته الطبيعية بدل ما يفضل يلف لحد الأبد.
function withTimeout(promise, ms, label){
  let timer;
  const timeout = new Promise((_, reject)=>{
    timer = setTimeout(()=> reject(new Error('timeout:' + (label||''))), ms);
  });
  return Promise.race([promise, timeout]).finally(()=> clearTimeout(timer));
}

// html2canvas بيشتغل على نفس الـ thread بتاع الواجهة، فلو الرسم تقيل الشاشة
// بتتجمّد فعليًا (والـ timeout نفسه مش بيقدر يشتغل لأن الـ thread متشغل).
// عشان كده بنقلل الـ scale على الموبايل وعلى الطلبات الكبيرة — الجودة تفضل
// كويسة والملف يتولد من غير ما التطبيق يهنج.
// بنطلّع نسخة صورة (PNG) من نفس الكانفس اللي بنعمل منه الـ PDF —
// عشان الإرسال على واتساب يبقى صورة تتفتح على طول بدل ملف PDF.
function canvasToPngBlob_(canvas){
  return new Promise(resolve=>{
    try{
      if(canvas.toBlob){
        canvas.toBlob(b=>resolve(b), 'image/png');
      } else {
        // متصفحات قديمة: نحوّل الـ dataURL بإيدنا
        const parts = canvas.toDataURL('image/png').split(',');
        const bin = atob(parts[1]);
        const arr = new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
        resolve(new Blob([arr], {type:'image/png'}));
      }
    }catch(e){ resolve(null); }
  });
}

function pdfScale_(itemCount){
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent || '');
  const n = Number(itemCount) || 0;
  if(isMobile) return n > 25 ? 1 : 1.5;
  return n > 40 ? 1.5 : 2;
}

// ===== storage (Google Sheet via Apps Script) =====
// بيتأكد إن الطلب موجود فعلاً في الشيت (بنستخدمها بعد الـ timeout).
// مهم: الـ timeout مش معناه إن الحفظ فشل — ساعات السيرفر بيسجّل الطلب بس بياخد
// وقت طويل في الرد، والتطبيق يقطع الاتصال. لو قلنا للموزع "فشل" وهو اتسجل،
// هيبعته تاني ويتكرر الطلب مرتين.
async function orderExistsRemote(id){
  try{
    const r = await fetch(APPS_SCRIPT_URL + '?action=lookup&ids=' + encodeURIComponent(id));
    const d = await r.json();
    return Array.isArray(d) && d.some(o => String(o.id) === String(id));
  }catch(e){ return false; }
}

async function saveOrderRemote(order, isUpdate){
  const payload = Object.assign({}, order, { action: isUpdate ? 'update' : 'create' });
  const controller = new AbortController();
  // Apps Script بياخد وقت خصوصًا في أول نداء أو لما الطلب فيه أصناف كتير.
  // 25 ثانية كانت قصيرة وبتقطع على طلبات شغالة — رفعناها لـ 60.
  const killer = setTimeout(()=>controller.abort(), 60000);
  let res;
  try{
    res = await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(payload),
      signal: controller.signal
    });
  }catch(e){
    clearTimeout(killer);
    if(e && e.name==='AbortError'){
      // اتأخر في الرد — بس يمكن يكون اتسجل فعلاً. نتأكد بنفسنا قبل ما نقول "فشل".
      await new Promise(r=>setTimeout(r, 2500));
      if(await orderExistsRemote(order.id)) return { ok:true, recovered:true };
      throw new Error('السيرفر أخد وقت طويل ومردش. الطلب غالبًا ما اتسجلش — جرّب تاني.');
    }
    throw e;
  }finally{
    clearTimeout(killer);
  }
  if(!res.ok) throw new Error('server responded with status ' + res.status);
  let data;
  try{ data = await res.json(); }catch(e){ throw new Error('invalid server response'); }
  if(!data || data.ok !== true) throw new Error(data && data.error ? data.error : 'server did not confirm save');
  return data;
}

      setAdminToken('');
      state.adminUnlocked = false;
      showToast('انتهت جلسة الأدمن، ادخل الرقم تاني');
    } else {
      showToast('السيرفر مردش صح — الطلبات المعروضة ممكن تكون قديمة');
    }
  }catch(e){
    // ⚠️ قبل كده كنا بنعمل state.orders = [] هنا — فأي انقطاع بسيط في النت (أو

function loadUserSession(){
  // بنستخدم sessionStorage (مش localStorage) عشان الجلسة تتمسح لما التطبيق يتقفل
  // خالص، فيبقى لازم تسجيل دخول جديد في كل مرة فتح — وده بياخد بالنا نتحقق من

  try{
    const raw = sessionStorage.getItem(LS_USER_KEY);
    if(raw){
      const u = JSON.parse(raw);
      if(u && u.username){ state.currentUser = u; return; }
    }
  }catch(e){}
  // مفيش جلسة شغالة — لو الجهاز ده فيه بصمة متفعلة قبل كده، نعرض شاشة "افتح بالبصمة"
  // بدل فورم اليوزر/الباسورد مباشرة.
  try{
    if(localStorage.getItem(LS_BIOMETRIC_CREDID_KEY) && localStorage.getItem(LS_BIOMETRIC_VAULT_KEY)){
      state.showBiometricGate = true;
    }
  }catch(e){}
}

// ===== الدخول بالبصمة (WebAuthn - platform authenticator) =====
// ملحوظة مهمة: ده "قفل جهاز" محلي مش تسجيل دخول جديد للسيرفر. تسجيل الدخول
// الحقيقي (يوزر/باسورد) بيحصل مرة واحدة، وبعدين البصمة بتفتح نفس الجلسة
// المحفوظة على الجهاز ده بس — زي ما شغالة تطبيقات البنوك بالظبط.
function isWebAuthnSupported(){
  return !!(window.PublicKeyCredential && navigator.credentials && navigator.credentials.create);
}
async function isPlatformAuthenticatorAvailable(){
  try{
    if(!isWebAuthnSupported()) return false;
    return await window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  }catch(e){ return false; }
}
function isBiometricEnabledForThisDevice(){
  try{
    return !!(localStorage.getItem(LS_BIOMETRIC_CREDID_KEY) && localStorage.getItem(LS_BIOMETRIC_VAULT_KEY));
  }catch(e){ return false; }
}
function isBiometricEnabledForCurrentUser(){
  try{
    if(!state.currentUser) return false;
    if(!isBiometricEnabledForThisDevice()) return false;
    const v = JSON.parse(localStorage.getItem(LS_BIOMETRIC_VAULT_KEY) || 'null');
    return !!(v && v.username === state.currentUser.username);
  }catch(e){ return false; }
}
function b64FromBuf_(buf){
  let s=''; const bytes = new Uint8Array(buf);
  for(let i=0;i<bytes.length;i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function bufFromB64_(b64){
  const s = atob(b64);
  const bytes = new Uint8Array(s.length);
  for(let i=0;i<s.length;i++) bytes[i] = s.charCodeAt(i);
  return bytes.buffer;
}
async function enableBiometricLogin(){
  if(!state.currentUser){ return; }
  const available = await isPlatformAuthenticatorAvailable();
  if(!available){ showToast('البصمة/التعرف على الوجه مش متاحة على الجهاز ده'); return; }
  try{
    state.biometricBusy = true; render();
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userId = crypto.getRandomValues(new Uint8Array(16));
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name:'القرشي لأبواب وشبابيك الـ UPVC' },
        user: { id:userId, name:state.currentUser.username, displayName:state.currentUser.distName || state.currentUser.username },
        pubKeyCredParams: [{ type:'public-key', alg:-7 }, { type:'public-key', alg:-257 }],
        authenticatorSelection: { authenticatorAttachment:'platform', userVerification:'required' },
        timeout: 60000
      }
    });
    localStorage.setItem(LS_BIOMETRIC_CREDID_KEY, b64FromBuf_(cred.rawId));
    localStorage.setItem(LS_BIOMETRIC_VAULT_KEY, JSON.stringify(state.currentUser));
    showToast('اتفعّل الدخول بالبصمة على الجهاز ده ✅');
  }catch(e){
    showToast('اتلغى تفعيل البصمة');
  }
  state.biometricBusy = false; render();
}
function disableBiometricLogin(){
  try{
    localStorage.removeItem(LS_BIOMETRIC_CREDID_KEY);
    localStorage.removeItem(LS_BIOMETRIC_VAULT_KEY);
  }catch(e){}
  showToast('اتلغت البصمة من الجهاز ده');
  render();
}
async function unlockWithBiometric(){
  const credId = localStorage.getItem(LS_BIOMETRIC_CREDID_KEY);
  const vaultRaw = localStorage.getItem(LS_BIOMETRIC_VAULT_KEY);
  if(!credId || !vaultRaw){ state.showBiometricGate=false; render(); return; }
  state.biometricBusy = true; render();
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: [{ id: bufFromB64_(credId), type:'public-key' }],
        userVerification: 'required',
        timeout: 60000
      }
    });
    const u = JSON.parse(vaultRaw);
    if(u && u.username){
      state.currentUser = u;
      try{ sessionStorage.setItem(LS_USER_KEY, JSON.stringify(u)); }catch(e){}
      state.showBiometricGate = false;
      checkForResumableDraft(); // 🛒 لو في مسودة محفوظة، نعرض إشعار بعد فتح البصمة
      ensurePushRegistered();
    }
  }catch(e){
    showToast('تعذّر التحقق بالبصمة، جرّب تاني أو ادخل بكلمة المرور');
  }
  state.biometricBusy = false; render();
}

async function submitLogin(){
  const username = state.authUsername.trim();
  const password = state.authPassword;
  if(!username){ state.authError='من فضلك اكتب اسم المستخدم'; render(); return; }
  if(!password){ state.authError='من فضلك اكتب كلمة المرور'; render(); return; }
  state.authLoading = true; state.authError=''; render();
  try{
    const res = await fetch(APPS_SCRIPT_URL + '?action=login&username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password));
    const data = await res.json();
    state.authLoading = false;
    if(!data.ok){
      state.authError = data.reason==='pending' ? 'حسابك لسه قيد المراجعة، استنى موافقة الأدمن' : 'اسم المستخدم أو كلمة المرور غلط';
      render();
      return;
    }
    state.currentUser = { username, distName: data.distName||'', distRegion: data.distRegion||'', distPhone: data.distPhone||'', distType: data.distType||'موزع' };
    try{ sessionStorage.setItem(LS_USER_KEY, JSON.stringify(state.currentUser)); }catch(e){}
    if(!state.distName) state.distName = asText(data.distName);
    if(!state.distRegion) state.distRegion = asText(data.distRegion);
    if(!state.distPhone) state.distPhone = asText(data.distPhone);
    saveProfile();
    state.authPassword='';
    checkForResumableDraft(); // 🛒 لو في مسودة محفوظة، نعرض إشعار بعد الدخول مباشرة
    ensurePushRegistered();
    render();
  }catch(e){
    state.authLoading = false;
    state.authError = 'في مشكلة في الاتصال، حاول تاني';
    render();
  }
}

async function submitRegister(){
  const username = state.authUsername.trim();
  const password = state.authPassword;
  const distName = state.regDistName.trim();
  const distRegion = state.regDistRegion.trim();
  const distPhone = state.regDistPhone.trim();
  if(!username){ state.authError='من فضلك اكتب اسم المستخدم'; render(); return; }
  if(!password || password.length<4){ state.authError='كلمة المرور لازم تكون 4 حروف/أرقام على الأقل'; render(); return; }
  if(password !== state.authPassword2){ state.authError='تأكيد كلمة المرور مش مطابق'; render(); return; }
  if(!distName){ state.authError='من فضلك اكتب اسم الموزع / الفرع'; render(); return; }
  if(!distPhone){ state.authError='من فضلك اكتب رقم الهاتف'; render(); return; }
  state.authLoading = true; state.authError=''; render();
  try{
    const res = await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      body: JSON.stringify({ action:'register', username, password, distName, distRegion, distPhone, distType: state.regDistType })
    });
    const data = await res.json();
    state.authLoading = false;
    if(!data.ok){
      state.authError = data.reason==='exists' ? 'اسم المستخدم ده متسجل قبل كده' : 'حصلت مشكلة، حاول تاني';
      render();
      return;
    }
    const msg = 'طلب تفعيل حساب جديد\nاسم المستخدم: ' + username + '\nاسم الموزع: ' + distName + '\nالمنطقة: ' + distRegion + '\nالهاتف: ' + distPhone;
    showToast('اتسجل الطلب، هتفتح واتساب دلوقتي لإرسال طلب التفعيل للأدمن');
    setTimeout(()=>{ window.open('https://wa.me/' + ADMIN_WHATSAPP + '?text=' + encodeURIComponent(msg), '_blank'); }, 600);
    state.authView='login';
    state.authPassword=''; state.authPassword2='';
    render();
  }catch(e){
    state.authLoading = false;
    state.authError = 'في مشكلة في الاتصال، حاول تاني';
    render();
  }
}

async function submitForgot(){
  const username = asText(state.forgotUsername).trim();
  const p1 = asText(state.forgotNewPassword);
  const p2 = asText(state.forgotNewPassword2);
  if(!username){ state.authError='من فضلك اكتب اسم المستخدم'; render(); return; }
  if(!p1){ state.authError='من فضلك اكتب الباسورد الجديد اللي عايزه'; render(); return; }
  if(p1.length < 4){ state.authError='الباسورد لازم يكون 4 حروف/أرقام على الأقل'; render(); return; }
  if(p1 !== p2){ state.authError='الباسوردين مش متطابقين'; render(); return; }

  state.forgotSubmitting = true; state.authError=''; render();
  try{
    const r = await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'requestPasswordReset', username, newPassword: p1 })
    });
    const d = await r.json();
    if(d && d.ok){
      state.forgotSent = true;
    } else {
      state.authError = (d && d.error) ? d.error : 'تعذّر إرسال الطلب، حاول تاني';
    }
  }catch(e){
    state.authError = 'مفيش اتصال بالسيرفر، حاول تاني';
  }
  state.forgotSubmitting = false;
  render();
}

  autoSaveDraft();
  state.draftJustSaved = true;
  render();
  showToast('✓ اتحفظ في السلة — ترجعله في أي وقت من غير ما يتبعت');
  setTimeout(()=>{ state.draftJustSaved = false; render(); }, 2500);

function autoSaveDraft(){

// ===== staging logic (multi product / multi color) =====
function stagedKey(main, product){ return main + '||' + product; }

function toggleStagedProduct(main, product){
  const key = stagedKey(main, product);
  const idx = state.staged.findIndex(s=>s.key===key);
  if(idx>=0){
    const s = state.staged[idx];
    if(s.extractedCartItems && s.extractedCartItems.length){
      state.cart.push(...s.extractedCartItems);
    }
    state.staged.splice(idx,1);
  }else{
    const colorRequired = hasRealColors(main, product);
    const units = unitOptionsForGroup(main);
    const defaultUnit = units[0];

    // لو الصنف ده موجود بالفعل في السلة، نسحبه للتعديل بدل ما نضيف نسخة جديدة
    const existing = [];
    state.cart = state.cart.filter(it=>{
      if(it.main===main && it.product===product && !it.autoBundled){ existing.push(it); return false; }
      return true;
    });

    const selectedColors = existing.length ? existing.map(it=>it.color) : (colorRequired ? [] : ['']);
    const qtys = {}, unitsMap = {};
    existing.forEach(it=>{ qtys[it.color] = it.qty; unitsMap[it.color] = it.unitType; });
    if(!colorRequired && existing.length===0){ qtys[''] = 1; unitsMap[''] = defaultUnit; }

    state.staged.push({
      key, main, product, colorRequired,
      availableColors: colorsForProduct(main, product).map(c=>c.color),
      selectedColors,
      qtys,
      units: unitsMap,
      unitOptions: units,
      cancelling:false,
      isEditingExisting: existing.length>0,
      extractedCartItems: existing
    });
  }
  render();
}

function toggleStagedColor(key, color){
  const s = state.staged.find(x=>x.key===key);
  if(!s) return;
  const i = s.selectedColors.indexOf(color);
  if(i>=0){ s.selectedColors.splice(i,1); delete s.qtys[color]; delete s.units[color]; }
  else{ s.selectedColors.push(color); s.qtys[color] = s.qtys[color] || 1; s.units[color] = s.units[color] || s.unitOptions[0]; }
  render();
}

function setStagedQty(key, color, qty){
  const s = state.staged.find(x=>x.key===key);
  if(!s) return;
  s.qtys[color] = Math.max(1, qty);
  render();
}

function setStagedColorUnit(key, color, unit){
  const s = state.staged.find(x=>x.key===key);
  if(!s) return;
  s.units[color] = unit;
  render();
}

const DOOR_ACCESSORIES = [
  { product:'زاويه كرسي للابواب WPC', perDoor:4 },
  { product:'مفصله ابواب WPC', perDoor:4 },
  { product:'جوان ابواب WPC', perDoor:5.5 },
  { product:'قلب كالون نحاس ابواب WPC', perDoor:1 },
  { product:'كالون سلندر نحاس ابواب WPC', perDoor:1 },
];

// بعد "تمام، ضيفه للسلة"، بلوك "حدد التفاصيل" الطويل بيختفي من الصفحة —
// والصفحة بتقصر بشكل كبير، فمحتوى تحته بيتزحلق لفوق ويحل مكانه قدام عينك
// (حتى لو رقم التمرير نفسه فضل ثابت)، وده اللي كان بيحس إنه "بينزل تحت".
// بنمسك مكان شبكة الأصناف على الشاشة قبل التأكيد ونرجّعها لنفس المكان
// بالظبط بعده، عشان يفضل شايف نفس الأصناف اللي كان بيختار منها.
function confirmStaged(key){
  const s = state.staged.find(x=>x.key===key);
  if(!s) return;
  if(s.colorRequired && s.selectedColors.length===0){ showToast('اختار لون واحد على الأقل'); return; }
  // ⚠️ كنا بنمسك مكان الشبكة كلها (.productgrid) قبل كده — بس دلوقتي التفاصيل
  // بتتحط جوه الشبكة نفسها (مش برّاها)، فحافة الشبكة العلوية ممكن ما تتحركش
  // خالص حتى لو المحتوى اللي إنت شايفه اتزحلق. بنمسك الصنف نفسه بدل الشبكة.
  const productSel = `[data-act="toggle-product"][data-val="${CSS.escape(s.product)}"]`;
  const doConfirm = ()=>{
  s.selectedColors.forEach(color=>{
    const unitType = s.units[color] || s.unitOptions[0];
    const qty = s.qtys[color]||1;
    const catItem = findCatalogItem(s.main, s.product, color);
    const unitPrice = calcUnitPrice(s.main, s.product, color, unitType);
    state.cart.push({
      main:s.main, product:s.product, name: catItem ? catItem.name : s.product, color: color||'',
      unitType, qty, unitPrice, lineTotal: unitPrice==null ? null : unitPrice*qty
    });

    if(s.main==='ابواب WPC' && unitType==='بإكسسوارات'){
      DOOR_ACCESSORIES.forEach(acc=>{
        const accQty = acc.perDoor * qty;
        const accCatItem = findCatalogItem(s.main, acc.product, '') || findCatalogItemAnyMain(acc.product, '');
        const accMain = accCatItem ? accCatItem.main : s.main;
        const accPrice = accCatItem ? calcUnitPrice(accMain, acc.product, '', 'قطعة') : null;
        state.cart.push({
          main: accMain, product:acc.product, name: accCatItem ? accCatItem.name : acc.product, color:'',
          unitType:'قطعة', qty: accQty, unitPrice: accPrice,
          lineTotal: accPrice==null ? null : accPrice*accQty, autoBundled:true
        });
      });
    }
  });
    state.staged = state.staged.filter(x=>x.key!==key);
    showToast('تمت إضافة الصنف للسلة');
    autoSaveDraft();
    render();
  };
  withPositionAnchor_(productSel, doConfirm);
}

function cancelStaged(key){
  const s = state.staged.find(x=>x.key===key);
  if(!s) return;
  s.cancelling = true;
  render();
  const productSel = `[data-act="toggle-product"][data-val="${CSS.escape(s.product)}"]`;
  setTimeout(()=>{
    withPositionAnchor_(productSel, ()=>{
      if(s.extractedCartItems && s.extractedCartItems.length){
        state.cart.push(...s.extractedCartItems);
      }
      state.staged = state.staged.filter(x=>x.key!==key);
      autoSaveDraft();
      render();
    });
  }, 320);
}

async function actuallySubmit(){
  state.showConfirmModal = false;
  state.saveError = '';
  state.submitting = true; render();

  const isUpdate = !!state.editingOrderId;
  const id = isUpdate ? state.editingOrderId : (Date.now().toString(36) + Math.random().toString(36).slice(2,6));
  const order = {
    id, ts: Date.now(),
    username: state.currentUser ? state.currentUser.username : '',
    distName: asText(state.distName).trim(),
    distRegion: asText(state.distRegion).trim(),
    distPhone: asText(state.distPhone).trim(),
    warehouse: asText(state.warehouse).trim(),
    note: asText(state.note).trim(),
    items: state.cart,
    status: STATUS_PENDING
  };
  try{
    const resp = await saveOrderRemote(order, isUpdate);
    const orderNo = (resp && resp.orderNo) ? String(resp.orderNo) : id.toUpperCase();
    order.orderNo = orderNo;
    state.successOrderId = orderNo;
    state.successMode = isUpdate ? 'updated' : 'new';
    state.lastOrder = order;
    if(!isUpdate){
      saveOrderRef(id, order.distName);
      localStorage.setItem(LS_LAST_DATE_KEY, todayStr());
      localStorage.setItem(LS_LAST_ID_KEY, id.toUpperCase());
    }
    state.cart=[]; state.staged=[]; state.distName=''; state.distRegion=''; state.distPhone=''; state.note=''; state.warehouse=''; state.editingOrderId=null;
    loadProfile();
    clearDraft();
    // ✅ إشعار فوري بعد استلام الطلب (5 ثواني عشان المستخدم يقراها)
    showToast(isUpdate
      ? '✅ تم استلام تعديلك — جاري المراجعة والتأكيد بالمتاح'
      : '✅ تم استلام طلبك — جاري المراجعة والتأكيد بالمتاح', 5000);
  }catch(e){
    // صندوق خطأ ثابت (مش toast بيختفي) فيه السبب الخام — عشان نعرف السبب الحقيقي
    state.saveError = 'نوع العملية: ' + (isUpdate ? 'تعديل' : 'جديد')
      + '\nرقم الطلب: ' + id
      + '\nعدد الأصناف: ' + (order.items ? order.items.length : 0)
      + '\nالخطأ: ' + (e && e.message ? e.message : String(e));
    console.error('actuallySubmit failed:', e);
  }
  state.submitting = false;
  render();
  // ✅ نولّد عرض السعر تلقائياً بعد ما الطلب يتبعت
  if(state.lastOrder && state.successOrderId) generateBothQuotes(state.lastOrder);
  // ⛔ مابقناش نولّد الـ PDF تلقائيًا هنا. html2canvas بيجمّد الشاشة وهو شغال،
  // فكانت شاشة النجاح متظهرش والمستخدم يفتكر إن الحفظ فشل — مع إنه نجح فعلاً.
  // دلوقتي شاشة النجاح بتظهر فورًا، والملفات بتتولّد بضغطة زرار وقت ما تحتاجها.
}

// ===== pricing helpers for quote (raw price, normalized to small unit) =====
function smallUnitLabelFor(main){
  if(main==='ابواب WPC') return 'قطعة';
  if(main.includes('اكسسوارات')) return 'قطعة';
  return 'عود';
}
// أمر صرف المخزن لازم يكون باللفة (وحدة العدّ اللي أمين المخزن بيشتغل بيها)،
// مش بالعود زي تصدير الإكسيل. لو الموزع طلب بالعود لصنف من مجموعات اللفة،
// بنحوّله للفة هنا (بالكسر لو مش لفة كاملة) بدل ما نسيبه بالعود.
const ROLL_GROUPS_ = ['قطاعات PVC كومبن', 'قطاعات كرافت لاين', 'نيو لاين', 'شاتر'];

// بيحوّل كمية بالوحدة الصغيرة (عود) للفة — لكن لو الكمية أقل من لفة كاملة،
// بيسيبها بالعود عشان متظهرش ككسر (زي 0.3 لفة) وده مش مفهوم عمليًا.
function rollsOrRodsDisplay_(smallQty, content){
  const c = Number(content) || 1;
  if(c <= 1) return { qty: smallQty, unitLabel: 'عود' };
  const rolls = smallQty / c;
  if(rolls < 1) return { qty: smallQty, unitLabel: 'عود' };
  return { qty: Math.round(rolls*10)/10, unitLabel: 'لفة' };
}

function warehouseUnitDisplay(it){
  if(it.unitType === 'لفة' || it.unitType === 'كرتونة'){
    return { qty: it.qty, unitLabel: it.unitType };
  }
  if(ROLL_GROUPS_.includes(it.main) && it.unitType === 'عود'){
    const cat = findCatalogItem(it.main, it.product, it.color);
    const content = Number(cat && cat.unit) || 1;
    return rollsOrRodsDisplay_(Number(it.qty), content);
  }
  // أصناف من غير لفة أصلاً (أبواب/أكسسوارات) — تفضل بوحدتها الأصلية
  return { qty: it.qty, unitLabel: it.unitType || '' };
}

function normalizeItemToSmallUnit(it){
  if(it.main===OTHER_SECTOR) return { qty: it.qty, unitLabel: it.unitType||'' };
  if(it.main==='ابواب WPC') return { qty: it.qty, unitLabel:'قطعة' };
  // الاكسسوارات: نحافظ على وحدة الموزع (كرتونة أو قطعة) بدون تحويل
  if(it.main && it.main.includes('اكسسوارات')) return { qty: it.qty, unitLabel: it.unitType||'قطعة' };
  const bigUnits = ['لفة','كرتونة'];
  const catItem = findCatalogItem(it.main, it.product, it.color);
  const content = catItem ? (catItem.unit || 1) : 1;
  const label = smallUnitLabelFor(it.main);
  if(bigUnits.includes(it.unitType)) return { qty: it.qty * content, unitLabel: label };
  return { qty: it.qty, unitLabel: label };
}
function rawPriceForItem(it){
  const catItem = findCatalogItem(it.main, it.product, it.color);
  if(catItem && catItem.price!=null) return catItem.price;
  if(it.main===OTHER_SECTOR && it.unitPrice!=null) return it.unitPrice;
  return null;
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// شاشة الأرصدة — للأدمن بس (فيها أرقام، والموزع مش المفروض يشوفها).
// الأرقام دي = الرصيد − المحجوز، بالعود/القطعة.
// بيبني مصفوفة الأرصدة: لكل مجموعة رئيسية → صفوف (الأصناف) وأعمدة (الألوان).
// الكميات باللفة. الصنف اللي كل ألوانه صفر مش بيتعرض خالص.
function stockMatrix_(){
  const q = asText(state.stockSearch).trim().toLowerCase();
  const groups = new Map();

  CATALOG.forEach(d=>{
    if(d.available === false) return;
    const n = Number(d.stock);
    if(!isFinite(n) || n <= 0) return;               // صفر → مش بيتعرض
    // أي كمية أقل من لفة كاملة بتتعتبر صفر — عشان التقرير يبقى واقعي
    const content_ = Number(d.unit) || 1;
    if(n < content_) return;
    if(q && !(d.main + ' ' + d.product + ' ' + (d.color||'')).toLowerCase().includes(q)) return;

    if(!groups.has(d.main)) groups.set(d.main, { colors:new Set(), rows:new Map() });
    const g = groups.get(d.main);
    const color = d.color || 'بدون لون';
    g.colors.add(color);

    if(!g.rows.has(d.product)) g.rows.set(d.product, {});
    const content = Number(d.unit) || 1;
    g.rows.get(d.product)[color] = n / content;      // باللفة
  });

  // ترتيب الألوان: الشائع الأول، وأي لون تاني بعديهم
  const PREF = ['بيج','ابيض','خشبي','رمادي','اسود'];
  return [...groups.entries()].map(([main, g])=>{
    const known = PREF.filter(c=>g.colors.has(c));
    const rest  = [...g.colors].filter(c=>!PREF.includes(c));
    return { main, colors:[...known, ...rest], rows:[...g.rows.entries()] };
  });
}

function fmtRolls_(v){
  if(v === undefined || v === null || v <= 0) return '';
  return (Math.round(v * 10) / 10).toString();
}

async function exportStockPDF(){
  if(typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined'){
    showToast('مكتبة التصدير مش جاهزة، حاول تاني'); return;
  }
  const tables = stockTableHTML_(true);
  if(!tables){ showToast('مفيش أرصدة تتصدّر'); return; }

  state.stockPdfBusy = true; render();

  const wrap = document.createElement('div');
  wrap.style.position='fixed'; wrap.style.top='-9999px'; wrap.style.left='-9999px';
  wrap.style.width='860px';
  wrap.style.fontFamily = "'Cairo', sans-serif";
  wrap.style.direction='rtl';
  wrap.style.background='#FFFFFF';

  const dateStr = new Date().toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit',year:'numeric'});
  wrap.innerHTML = `
    <div style="padding:28px 34px;">
      <div style="display:flex;align-items:center;gap:14px;border-bottom:3px solid #C9A227;padding-bottom:14px;margin-bottom:16px;">
        <img src="data:image/jpeg;base64,${LOGO_B64}" style="width:54px;height:54px;border-radius:10px;object-fit:contain;background:#fff;border:1px solid #E4E0D6;padding:4px;">
        <div style="flex:1;">
          <div style="font-size:21.3px;font-weight:800;color:#1F3050;">تقرير الأرصدة المتاحة</div>
          <div style="font-size:12.9px;color:#6E7480;margin-top:2px;">الكميات باللفة · المتاح = الرصيد − المحجوز</div>
        </div>
        <div style="font-size:13.4px;color:#6E7480;">${esc(dateStr)}</div>
      </div>
      ${tables}
      ${CREDIT_LINE ? `<div style="margin-top:14px;text-align:center;color:#A8A498;font-size:10.1px;">${esc(CREDIT_LINE)}</div>` : ''}
    </div>`;
  document.body.appendChild(wrap);

  try{
    const canvas = await withTimeout(
      html2canvas(wrap, {scale: 1.5, backgroundColor:'#ffffff', useCORS:true, allowTaint:true}),
      30000, 'stock-pdf'
    );
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p','mm','a4');
    const imgData = canvas.toDataURL('image/png');
    const imgWidth = 210, pageHeight = 297;
    const imgHeight = canvas.height * imgWidth / canvas.width;
    let heightLeft = imgHeight, position = 0;
    doc.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
    heightLeft -= pageHeight;
    while(heightLeft > 0){
      position = heightLeft - imgHeight;
      doc.addPage();
      doc.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
      heightLeft -= pageHeight;
    }
    const blob = doc.output('blob');
    const imgBlob = await canvasToPngBlob_(canvas);
    previewPdfBlob({ blob, previewUrl: imgData, imgBlob }, 'الأرصدة_' + dateStr + '.pdf');
  }catch(e){
    showToast('تعذّر التصدير: ' + (e && e.message ? e.message : e));
  }
  try{ document.body.removeChild(wrap); }catch(e){}
  state.stockPdfBusy = false;
  render();
}

// ترتيب القطاعات للعرض: بنرتّب بالقطاعات المعروفة الأول، وبعدين بنضيف أي قطاع
// تاني موجود في الطلب بس مش موجود في قائمة الأصناف الحالية.
// ⚠️ قبل كده كنا بنعمل SECTOR_CHIPS.filter(...) وبس — فأي قطاع مش في القائمة
// الحالية كان بيتشال من الجدول بصمت، ولو كل الأصناف كده يطلع عرض السعر فاضي
// (بيحصل لو قائمة الأصناف فشلت تتحمّل، أو لو الطلب قديم وقطاعه اتغير).
function orderGroups_(groupsMap){
  const known = SECTOR_CHIPS.filter(g=>groupsMap.has(g));
  const rest = [...groupsMap.keys()].filter(g=>!SECTOR_CHIPS.includes(g));
  return [...known, ...rest];
}

// الإرسال على واتساب بقى بصورة (PNG) مش PDF — الصورة بتتفتح في الشات على طول
// من غير ما حد ينزّل ملف. لو الجهاز مش بيدعم مشاركة الصور، بنرجع للـ PDF.
async function shareAsImage_(q, baseName, title){
  if(!q) return false;
  // 1) الأفضل: مشاركة صورة
  if(q.imgBlob){
    try{
      const img = new File([q.imgBlob], baseName + '.png', {type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[img]})){
        await navigator.share({ files:[img], title: title, text:'طلب رقم #' + (state.successOrderId||'') });
        return true;
      }
    }catch(e){ /* المستخدم لغى أو الجهاز مش داعم */ }
  }
  // 2) احتياطي: مشاركة PDF
  try{
    const file = new File([q.blob], baseName + '.pdf', {type:'application/pdf'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({ files:[file], title: title, text:'طلب رقم #' + (state.successOrderId||'') });
      return true;
    }
  }catch(e){ /* fallthrough */ }
  return false;
}
