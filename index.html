<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ELKORASHI DOORS — طلبات أبواب WPC</title>
<meta name="theme-color" content="#002050">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="images/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ELKORASHI">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@500;600;700&family=Readex+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#002050;
  --navy-2:#003060;
  --brand:#1080C0;
  --brand-lt:#4FA8DC;
  --bg:#F3F6FA;
  --card:#FFFFFF;
  --ink:#14243A;
  --muted:#6B7A8C;
  --line:#DCE4EC;
  --ok:#1E7A54;
  --ok-bg:#E7F3EE;
  --warn-bg:#FFF6E5;
  --warn-line:#E8C77A;
  --danger:#B3261E;
  --r:14px;
  --shadow:0 2px 10px rgba(0,32,80,.07);
  --mark:none;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Readex Pro',system-ui,sans-serif;
  background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.6;padding-bottom:30px;
  -webkit-text-size-adjust:100%;
}
h1,h2,h3{font-family:'Reem Kufi',system-ui,sans-serif;font-weight:600}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:0;background:none}
:focus-visible{outline:2.5px solid var(--brand);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============ بوابة التثبيت — شاشة كاملة قبل أي حاجة تانية ============ */
#installGate{
  position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(170deg,var(--navy),var(--navy-2));color:#EAF2FA;
  padding:32px 24px calc(28px + env(safe-area-inset-bottom));text-align:center;
}
#installGate.hidden{display:none}
#installGate img.gatelogo{width:96px;height:96px;border-radius:20px;background:#fff;padding:10px;object-fit:contain;margin-bottom:20px;box-shadow:0 8px 26px rgba(0,0,0,.3)}
#installGate h1{font-size:19px;margin:0 0 10px;line-height:1.4}
#installGate .gatesub{font-size:13.5px;color:#B9CBDD;line-height:1.75;max-width:320px;margin:0 0 26px}
.gatebtn{
  display:block;width:100%;max-width:320px;padding:15px;border-radius:14px;
  background:linear-gradient(180deg,var(--gold-lt,#E4C766),var(--gold,#C9A227));
  color:#2A1F18;font-family:'Reem Kufi',sans-serif;font-size:15.5px;font-weight:700;
  box-shadow:0 6px 20px rgba(201,162,39,.35);
}
.gatehint{font-size:11.5px;color:#8FA3BC;margin-top:12px;max-width:300px;line-height:1.6}
.gatesteps{background:rgba(255,255,255,.07);border-radius:12px;padding:14px;max-width:320px;margin-bottom:18px;text-align:right}
.gatestep{font-size:12.5px;line-height:1.7;color:#DCE7F2;display:flex;gap:8px;margin-bottom:9px}
.gatestep:last-child{margin-bottom:0}
.gatestep b{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:var(--brand);color:#fff;font-size:11px;display:grid;place-items:center}
.gateskip{margin-top:20px;font-size:12.5px;color:#9CB6D2;text-decoration:underline;background:none}

/* ============ الهيدر ============ */
#appbar{position:sticky;top:0;z-index:40}
.top{
  background:linear-gradient(160deg,var(--navy),var(--navy-2));
  color:#EAF2FA;padding:calc(9px + env(safe-area-inset-top)) 14px 9px;
  box-shadow:0 2px 14px rgba(0,32,80,.3);
}
.top-row{display:flex;align-items:center;gap:11px}
.top img.logo{height:38px;width:auto;background:#fff;border-radius:8px;padding:4px 7px;flex:0 0 auto}
.top .t1{font-family:'Reem Kufi',sans-serif;font-size:14.5px;font-weight:600;line-height:1.3}
.top .t2{font-size:11px;color:#9CB6D2;margin-top:1px}
.wh-chip{
  margin-inline-start:auto;flex:0 0 auto;text-align:center;
  background:rgba(79,168,220,.15);border:1px solid rgba(79,168,220,.42);
  color:#9FD1F0;border-radius:9px;padding:4px 9px;font-size:10.5px;line-height:1.35;
}
.wh-chip b{display:block;font-size:12px;color:#DCEEFB}


/* شريط التثبيت/التحديث — تحت اللوجو على طول زي تطبيق الموزعين */
/* شريط الإصدار/التحديث/التثبيت — أعلى الصفحة جنب اللوجو */
.verstrip{display:flex;align-items:center;gap:7px;margin-top:8px}
.verstrip .vs-ver{font-size:10.5px;color:#9CB6D2;flex:1;min-width:0}
.verstrip button{
  flex:0 0 auto;background:rgba(255,255,255,.14);border:1px solid rgba(159,209,240,.4);
  color:#EAF2FA;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;
  white-space:nowrap;
}
.verstrip button.vs-install{background:linear-gradient(180deg,var(--brand-lt),var(--brand));border-color:transparent;color:#fff}
.verstrip button[hidden]{display:none}


/* شريط الأقسام فوق (الأبواب / الإكسسوارات / حلق فقط / برور فقط) */
.secnav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:13px}
.secnav button{
  background:var(--card);border:1.5px solid var(--line);border-radius:12px;
  padding:10px 4px;text-align:center;box-shadow:var(--shadow);
}
.secnav button .ic{display:block;font-size:21px;line-height:1.15;margin-bottom:3px}
.secnav button .tx{display:block;font-size:11px;font-weight:600;color:var(--muted)}
.secnav button.on{border-color:var(--brand);background:linear-gradient(180deg,#fff,#F3F9FE)}
.secnav button.on .tx{color:var(--navy)}

/* شبكة الإكسسوارات المصغّرة — ٣ في الصف */
.accgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.accgrid .ac{border:1.5px solid var(--line);border-radius:11px;padding:8px 6px 7px;text-align:center;background:#FCFDFE}
.accgrid .ac b{display:block;font-size:11px;font-weight:600;line-height:1.28;min-height:28px}
.accgrid .ac .pr{font-size:10px;color:var(--muted);margin:2px 0 7px}
.accgrid .ac .qty{transform:scale(.82);transform-origin:center;margin:0 auto;width:fit-content}

/* لوحة تفاصيل الباب — بتظهر تحت صف الباب المختار جوه نفس الشبكة */
.doorpanel{grid-column:1/-1;background:#F7FAFD;border:1px dashed var(--brand);border-radius:12px;padding:12px;margin:2px 0 4px}
/* المقاس / الحلق / البرور — أعمدة جنب بعض تحت الباب المختار */
.specgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.specol{display:flex;flex-direction:column;gap:5px;min-width:0}
.specol .sol-h{font-size:10px;color:var(--muted);text-align:center;font-weight:600}
.specol .colchip{
  width:100%;padding:7px 2px;border:1.5px solid var(--line);border-radius:8px;
  background:#FCFDFE;font-size:10.5px;font-weight:500;text-align:center;line-height:1.25;
}
.specol .colchip .ic{display:block;font-size:14px;line-height:1.1;margin-bottom:1px}
.specol .colchip .sub{display:block;font-size:8.8px;color:var(--muted);font-weight:400;margin-top:1px}
.specol .colchip.on{background:var(--navy);border-color:var(--navy);color:#EAF2FA}
.specol .colchip.on .sub{color:#9CB6D2}
.doorpanel .dphead{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.doorpanel .dphead b{font-family:'Reem Kufi',sans-serif;font-size:14px;color:var(--navy)}
.doorpanel .dphead span{font-size:11.5px;color:var(--muted)}
.doorpanel .grp{font-size:11.5px;color:var(--muted);margin:11px 0 6px}
.doorpanel .dphead + .grp{margin-top:0}

/* ============ التبويبات ============ */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line)}
.tabs[hidden]{display:none}
.tabs button{flex:1;padding:12px 2px 10px;font-size:12.5px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent}
.tabs button.on{color:var(--navy);border-bottom-color:var(--brand);font-weight:600}
.tabs .badge{display:inline-block;min-width:19px;padding:0 5px;margin-inline-start:4px;background:var(--brand);color:#fff;border-radius:20px;font-size:11px;line-height:19px}

.wrap{padding:14px;max-width:660px;margin:0 auto;position:relative}

/* ============ الكروت + علامة مائية ============ */
.card{
  position:relative;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:14px;margin-bottom:13px;box-shadow:var(--shadow);
  overflow:hidden;
}
/* اللوجو خلفية باهتة في كل كارت */
.card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:var(--mark) no-repeat left 8px bottom 8px;
  background-size:42px auto;opacity:.05;
}
.card>*{position:relative}

.step{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.step .n{
  font-family:'Reem Kufi',sans-serif;font-size:11.5px;font-weight:700;color:#fff;
  background:var(--brand);border-radius:50%;width:23px;height:23px;
  display:grid;place-items:center;flex:0 0 auto;
}
.step h2{font-size:15px;margin:0}
.step .hint{font-size:11px;color:var(--muted);margin-inline-start:auto;font-weight:400}

label.fld{display:block;margin-bottom:10px}
label.fld span{display:block;font-size:12.5px;color:var(--muted);margin-bottom:4px}
label.fld span .req{color:var(--danger);font-weight:700}
input[type=text],input[type=tel],input[type=number],select,textarea{
  width:100%;padding:10px 11px;border:1.5px solid var(--line);border-radius:10px;background:#FCFDFE;
}
input:focus,select:focus,textarea:focus{border-color:var(--brand);outline:none}
input.bad{border-color:var(--danger);background:#FFF6F5}
input::placeholder{color:#A8B4C2}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ============ رف الأبواب ============ */
.rail{display:grid;grid-template-columns:repeat(4,1fr);gap:12px 9px;padding:4px 2px 6px}
.door{text-align:center;padding:0;min-width:0}
.door .leaf{
  position:relative;width:100%;aspect-ratio:3/4;border-radius:9px;overflow:hidden;
  border:2px solid var(--line);background:#E9EEF4;
  transform-origin:right center;transition:transform .25s ease,border-color .18s,box-shadow .18s;
  box-shadow:0 1px 4px rgba(0,32,80,.1);
}
.door .leaf img{width:100%;height:100%;object-fit:cover;display:block}
.door .leaf.noimg{background:linear-gradient(160deg,#B9CBDD,#4A6580)}
.door .leaf.noimg::before{
  content:attr(data-code);position:absolute;inset:0;display:grid;place-items:center;
  font-family:'Reem Kufi',sans-serif;font-size:16px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);
}
.door.on .leaf{border-color:var(--brand);transform:perspective(620px) rotateY(-12deg);box-shadow:-6px 4px 16px rgba(0,32,80,.24)}
.door .zoombadge{
  position:absolute;top:5px;inset-inline-end:5px;width:24px;height:24px;border-radius:50%;
  background:rgba(0,20,50,.55);color:#fff;display:grid;place-items:center;font-size:13px;
  backdrop-filter:blur(2px);z-index:2;
}
.door .code{display:block;font-size:12px;font-weight:600;margin-top:7px;font-family:'Reem Kufi',sans-serif}
.door .nm{display:block;font-size:10.5px;color:var(--muted);line-height:1.3}
.door.on .code{color:var(--brand)}

/* ============ الشرايح ============ */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 14px;border:1.5px solid var(--line);border-radius:10px;background:#FCFDFE;font-size:13.5px;font-weight:500;text-align:center}
.chip.on{background:var(--navy);border-color:var(--navy);color:#EAF2FA}
.chip .sub{display:block;font-size:10.5px;color:var(--muted);font-weight:400;margin-top:-2px}
.chip.on .sub{color:#9CB6D2}
.chip .ic{display:block;font-size:20px;line-height:1.2;margin-bottom:1px}

.box{margin-top:11px;padding:11px;background:#F7FAFD;border:1px dashed var(--brand);border-radius:11px}
.note{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.55}
.note b{color:var(--brand)}
/* ============ العداد ============ */
.qty{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;width:fit-content;background:#FCFDFE}
.qty button{width:40px;height:40px;font-size:19px;font-weight:600;color:var(--brand);display:grid;place-items:center}
.qty button:active{background:#EDF3F9}
.qty input{width:54px;text-align:center;border:0;border-inline:1.5px solid var(--line);border-radius:0;padding:10px 0;background:transparent}

/* ============ الأزرار ============ */
.btn{display:block;width:100%;padding:13px;border-radius:12px;font-family:'Reem Kufi',sans-serif;font-size:15px;font-weight:600;text-align:center;transition:transform .1s}
.btn:active{transform:scale(.985)}
.btn.primary{background:var(--navy);color:#EAF2FA}
.btn.brand{background:linear-gradient(180deg,var(--brand-lt),var(--brand));color:#fff}
.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--navy)}
.btn[disabled]{opacity:.4;pointer-events:none}
.btn.sm{padding:10px;font-size:13px}
.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:9px}

/* ============ الإكسسوارات ============ */
.acc{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.acc:last-of-type{border-bottom:0}
.acc .an{flex:1;min-width:0}
.acc .an b{display:block;font-size:13px;font-weight:500}
.acc .an span{font-size:11px;color:var(--muted)}
.acc .qty{transform:scale(.84);transform-origin:left center}

/* ============ السلة ============ */
.line{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.line:last-of-type{border-bottom:0}
.line img{width:44px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--line);flex:0 0 auto}
.line .ic{width:44px;height:60px;display:grid;place-items:center;background:#EDF3F9;border-radius:6px;font-size:20px;flex:0 0 auto}
.line .info2{flex:1;min-width:0}
.line .info2 b{font-size:13px;font-weight:600;display:block}
.line .info2 .spec{font-size:11.5px;color:var(--muted);line-height:1.55}
.line .info2 .pr{font-size:12.5px;color:var(--brand);font-weight:600;margin-top:2px}
.line .del{color:var(--danger);font-size:18px;padding:0 4px;align-self:flex-start}

.total{display:flex;justify-content:space-between;align-items:baseline;padding-top:12px;margin-top:6px;border-top:2px solid var(--navy)}
.total .lbl{font-size:13px;color:var(--muted)}
.total .val{font-family:'Reem Kufi',sans-serif;font-size:21px;font-weight:700}
.total .val small{font-size:12px;font-weight:400;color:var(--muted)}

/* ============ طلباتي ============ */
.ord{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:11px;box-shadow:var(--shadow)}
.ord .oh{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.ord .oid{font-family:'Reem Kufi',sans-serif;font-weight:700;color:var(--brand);font-size:14px}
.ord .od{font-size:11px;color:var(--muted)}
.ord .os{font-size:12.5px;color:var(--muted);line-height:1.6}
.ord .oa{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}
.ord .oa .btn{padding:9px;font-size:12.5px}

.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .em{font-size:38px;display:block;margin-bottom:10px;opacity:.45}

/* ============ التوست + اللودر ============ */
#toast{
  position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));inset-inline:16px;z-index:95;
  background:var(--navy);color:#EAF2FA;padding:13px 16px;border-radius:12px;font-size:13.5px;text-align:center;
  box-shadow:0 6px 22px rgba(0,32,80,.35);opacity:0;transform:translateY(14px);pointer-events:none;transition:.2s;
}
#toast.show{opacity:1;transform:translateY(0)}
#busy{position:fixed;inset:0;z-index:99;background:rgba(0,32,80,.55);display:none;place-items:center;color:#fff;font-size:14px}
#busy.on{display:grid}
#busy .b{background:var(--navy);padding:20px 26px;border-radius:14px;text-align:center}
#busy .sp{width:26px;height:26px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;margin:0 auto 10px;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ============ الشريط السفلي ============ */
.bar{position:fixed;bottom:0;inset-inline:0;z-index:50;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
.bar .inner{max-width:660px;margin:0 auto;display:flex;align-items:center;gap:11px}
.bar .sum{flex:0 0 auto;line-height:1.25}
.bar .sum b{display:block;font-family:'Reem Kufi',sans-serif;font-size:16px}
.bar .sum span{font-size:11px;color:var(--muted)}
.bar .btn{flex:1;width:auto}

.foot{text-align:center;font-size:11px;color:var(--muted);padding:8px 0 4px}

/* ============ المستند (عرض سعر / طلب) ============ */
#paper{position:fixed;top:-10000px;left:-10000px;width:794px;background:#fff}
</style>
</head>
<body>

<div id="installGate" class="hidden"></div>

<div id="appbar">
<header class="top">
  <div class="top-row">
    <img class="logo" id="hdrLogo" alt="ELKORASHI DOORS">
    <div>
      <div class="t1">أبواب WPC</div>
      <div class="t2">طلب أوردر أبواب</div>
    </div>
    <div class="wh-chip">المخزن<b>مصنع إنشاص</b></div>
  </div>

  <div class="verstrip">
    <span class="vs-ver" id="vsVer"></span>
    <button data-act="update">🔄 تحديث</button>
    <button data-act="install" id="vsInstall" class="vs-install">📲 تثبيت</button>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="new" class="on">طلب جديد</button>
  <button data-tab="cart">السلة<span class="badge" id="cartBadge">0</span></button>
  <button data-tab="orders">طلباتي</button>
  <button data-tab="track">🚚 المتابعة</button>
  <button data-tab="admin">🏭 متابعة المصنع<span class="badge" id="admBadge" hidden>0</span></button>
</nav>
</div>

<main class="wrap" id="view"></main>

<div class="bar" id="bar" hidden>
  <div class="inner">
    <div class="sum"><b id="barTotal">0</b><span id="barCount">لا يوجد أصناف</span></div>
    <button class="btn brand" data-act="go-cart">مراجعة الطلب</button>
  </div>
</div>

<div id="paper"></div>
<div id="busy"><div class="b"><div class="sp"></div><span id="busyTxt">جارٍ التجهيز…</span></div></div>
<div id="toast"></div>

<script>
'use strict';

/* ============================================================
   الإعدادات

  {id:'h6', name:'كالون سلندر نحاس',              en:'Brass Cylinder Lock',                  price:160,  unit:'قطعة'},
  {id:'h7', name:'كالون إشارة نحاس',              en:'Brass Indicator Lock',                 price:160,  unit:'قطعة'},
  {id:'h8', name:'جوان',                          en:'Gasket',                               price:6,    unit:'متر'}
];

const LS_PROFILE = 'wpc_profile', LS_CART = 'wpc_cart', LS_ORDERS = 'wpc_orders', LS_TAB = 'wpc_tab', LS_SECTION = 'wpc_section';

/* ============================================================
   الحالة
   ============================================================ */
const state = {
  tab: load(LS_TAB, 'new'),
  gateBypassed:false,   // تثبيت التطبيق — بيرجع يظهر تاني في أي تحميل جديد للصفحة
  track:{loading:false, rows:null, err:'', at:0},
  admin:{open:false, pw:'', loading:false, rows:null, err:'', busy:null,
    itemsOpen:{}, items:{}, itemsLoading:null, itemBusy:null, delBusy:null},
  profile: load(LS_PROFILE, {name:'', phone:'', region:''}),
  cart:    load(LS_CART, []),
  orders:  load(LS_ORDERS, []),
  pick:{code:'', size:null, custom:{w:'',h:''}, frame:null, dbror:null, qty:1},
  newSection: load(LS_SECTION, ''),   // '' (لسه محددش) | doors | acc | frame | bror
  fr:{cm:10, rods:1},      // حلق إضافي بالعود
  br:{size:'6×9', rods:1}, // برور إضافي بالعود
  acc:{},
  touched:false             // اتضغط إرسال؟ عشان نوضّح الحقول الناقصة
};

function load(k,d){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;} }
function save(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }

/* ============================================================
   مساعدات
   ============================================================ */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function money(n){const v=Math.round(Number(n)*100)/100;return v.toLocaleString('en-EG',{minimumFractionDigits:0,maximumFractionDigits:2});}
function doorByCode(c){return DOORS.find(d=>d.code===c)||DOORS[0];}

function selectDoor(code){
  const p=state.pick;
  if(p.code===code){
    // ضغط على نفس الباب المفتوح — يقفل ويلمّ
    p.code=''; p.size=null; p.custom={w:'',h:''};
    p.frame=null; p.dbror=null; p.qty=1;
  } else {
    // باب جديد = اختيارات جديدة، عشان الموزع يحدد كل حاجة بنفسه من الأول
    p.code=code; p.size=null; p.custom={w:'',h:''};
    p.frame=null; p.dbror=null; p.qty=1;
  }
  render();
}

function showDoorPreview(code){
  const d=doorByCode(code);
  const old=document.getElementById('doorPreviewOverlay'); if(old) old.remove();
  const ov=document.createElement('div');
  ov.id='doorPreviewOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:300;background:rgba(0,10,30,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px';
  ov.innerHTML=`
    <div style="width:100%;max-width:360px;text-align:center">
      <img src="${d.img}" alt="${esc(d.name)}" style="width:100%;max-height:62vh;object-fit:contain;border-radius:14px;background:#fff;box-shadow:0 10px 30px rgba(0,0,0,.4)">
      <div style="color:#fff;margin-top:14px;font-family:'Reem Kufi',sans-serif;font-size:17px;font-weight:700">${esc(d.code)} — ${esc(d.name)}</div>
      <div style="display:flex;gap:10px;margin-top:18px">
        <button data-act="preview-select" data-code="${esc(d.code)}" style="flex:1;background:linear-gradient(180deg,var(--brand-lt),var(--brand));color:#fff;padding:12px;border-radius:12px;font-weight:700;font-size:14px">اختار الباب ده</button>
        <button id="closeDoorPreview" style="flex:0 0 auto;background:rgba(255,255,255,.15);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px">إغلاق</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  document.getElementById('closeDoorPreview').onclick = () => ov.remove();
}
function millById(id){return MILLS.find(m=>m.id===id)||MILLS[1];}
function priceForWidth(w){const n=Number(w)||0;for(const s of SIZES) if(n<=s.w) return s.price;return SIZES[SIZES.length-1].price;}
function rodPrice(perMetre){return Math.round(perMetre*ROD_LEN*100)/100;}
function linePrice(it){return (it.kind==='door'?it.unitPrice:it.price)*it.qty;}
function cartTotal(){return state.cart.reduce((s,it)=>s+linePrice(it),0);}
function cartCount(){return state.cart.length;}
function phoneOk(p){return /^0?1[0-9]{9}$/.test(String(p).replace(/\s/g,''));}
function profileOk(){return !!state.profile.name.trim() && phoneOk(state.profile.phone);}

function toast(m,ms){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),ms||2600);}
function busy(on,txt){const b=document.getElementById('busy');if(txt)document.getElementById('busyTxt').textContent=txt;b.classList.toggle('on',!!on);}
function dateStr(ts){return new Date(ts).toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit',year:'numeric'});}

/* ============================================================
   الرسم
   ============================================================ */
// ⚠️ عميل بس دلوقتي — نظام الموزع/الموافقة اتشال، ومفيش أسعار في أي حتة خالص.
// السطر ده بس اللي يتغيّر لو حبينا نرجّع الأسعار تاني يوم ما.
function pricesVisible(){ return false; }

// كل التبويبات متاحة للجميع (مفيش تقييد حسابات دلوقتي)
function allowedTabs(){ return ['new','cart','orders','track','admin']; }

function render(){
  updateInstallGate();

  const nav=document.getElementById('tabs');
  const bar=document.getElementById('bar');
  nav.hidden=false;

  const allowed=allowedTabs();
  if(!allowed.includes(state.tab)) state.tab=allowed[0];
  save(LS_TAB, state.tab);
  document.querySelectorAll('#tabs button[data-tab]').forEach(b=>{
    const on=allowed.includes(b.dataset.tab);
    b.hidden=!on;
  });

  const v=document.getElementById('view');
  v.innerHTML = state.tab==='new' ? viewNew()
              : state.tab==='cart' ? viewCart()
              : state.tab==='track' ? viewTrack()
              : state.tab==='admin' ? viewAdmin()
              : viewOrders();
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===state.tab));
  document.getElementById('cartBadge').textContent=cartCount();
  updateAdmBadge();

  const show = state.tab==='new' && state.cart.length>0;
  bar.hidden=!show;
  if(show){
    document.getElementById('barTotal').textContent=(pricesVisible()?money(cartTotal())+' ج':'—');
    document.getElementById('barCount').textContent=cartCount()+' صنف في السلة';
  }
  document.body.style.paddingBottom = show ? '104px' : '30px';
}

function verBar(){ return ''; }   // الإصدار/التحديث/التثبيت بقوا في الشريط فوق

function viewNew(){
  const p=state.pick, isCustom=p.size==='custom', bad=state.touched;

  const sizeCol=SIZES.map(s=>`
    <button class="colchip ${p.size===s.w?'on':''}" data-act="pick-size" data-w="${s.w}">
      ${s.w} سم${pricesVisible()?`<span class="sub">${money(s.price)}ج</span>`:''}</button>`).join('')
    +`<button class="colchip ${isCustom?'on':''}" data-act="pick-size" data-w="custom">خاص${pricesVisible()?`<span class="sub">+${CUSTOM_EXTRA}ج</span>`:''}</button>`;

  const frameCol=FRAMES.map(f=>`<button class="colchip ${p.frame===f.cm?'on':''}" data-act="pick-frame" data-cm="${f.cm}">${f.cm} سم</button>`).join('')
    +`<button class="colchip ${p.frame===0?'on':''}" data-act="pick-frame" data-cm="0">بدون</button>`;

  const dbrorCol=BRORS.map(b=>`<button class="colchip ${p.dbror===b.size?'on':''}" data-act="pick-dbror" data-size="${esc(b.size)}">${esc(b.size)}</button>`).join('')
    +`<button class="colchip ${p.dbror===''?'on':''}" data-act="pick-dbror" data-size="">بدون</button>`;

  const frRods=Number(state.fr.rods)||0;
  const frSel=FRAMES.find(f=>f.cm===state.fr.cm)||FRAMES[0];
  const frChips=FRAMES.map(f=>`
    <button class="chip ${state.fr.cm===f.cm?'on':''}" data-act="fr-cm" data-cm="${f.cm}">${f.cm} سم</button>`).join('');

  const brRods=Number(state.br.rods)||0;
  const brSel=BRORS.find(b=>b.size===state.br.size)||BRORS[0];
  const brChips=BRORS.map(b=>`
    <button class="chip ${state.br.size===b.size?'on':''}" data-act="br-size" data-size="${esc(b.size)}">برور ${esc(b.size)}</button>`).join('');

  const accCards=ACCESSORIES.map(a=>{
    const q=state.acc[a.id]||0;
    return `<div class="ac">
      <b>${esc(a.name)}</b>${pricesVisible()?`<div class="pr">${money(a.price)} ج/${esc(a.unit)}</div>`:''}
      <div class="qty">
        <button data-act="acc-minus" data-id="${a.id}">−</button>
        <input type="number" inputmode="decimal" min="0" step="0.5" value="${q}" data-act="acc-set" data-id="${a.id}">
        <button data-act="acc-plus" data-id="${a.id}">+</button>
      </div></div>`;}).join('');
  const accTotal=ACCESSORIES.reduce((s,a)=>s+(state.acc[a.id]||0)*a.price,0);

  // ── لوحة تفاصيل الباب — بتتحط تحت الصف اللي فيه الباب المختار ──
  // مفيش حاجة متحددة افتراضيًا: الموزع لازم يختار المقاس والحلق والبرور بنفسه
  const readyToAdd = p.code && p.size!=null && p.frame!=null && p.dbror!=null
    && (p.size!=='custom' || (Number(p.custom.w)>0 && Number(p.custom.h)>0));

  const detailPanel = p.code ? `
    <div class="doorpanel">
      <div class="dphead"><b>${esc(p.code)}</b><span>${esc(doorByCode(p.code).name)}</span></div>

      <div class="specgrid">
        <div class="specol"><div class="sol-h">المقاس</div>${sizeCol}</div>
        <div class="specol"><div class="sol-h">الحلق</div>${frameCol}</div>
        <div class="specol"><div class="sol-h">البرور</div>${dbrorCol}</div>
      </div>

      ${isCustom?`<div class="box"><div class="row2">
          <label class="fld"><span>العرض (سم)</span><input type="number" inputmode="numeric" min="1" value="${esc(p.custom.w)}" placeholder="مثال 85" data-act="cust" data-k="w"></label>
          <label class="fld"><span>الارتفاع (سم)</span><input type="number" inputmode="numeric" min="1" value="${esc(p.custom.h)}" placeholder="مثال 210" data-act="cust" data-k="h"></label>
        </div><div class="note">المقاسات خارج الاستاندر بيتضاف عليها <b>${CUSTOM_EXTRA} ج</b>.</div></div>`:''}

      <div class="grp">الكمية</div>
      <div class="qty">
        <button data-act="qty-minus">−</button>
        <input type="number" inputmode="numeric" min="1" value="${p.qty}" data-act="qty-set">
        <button data-act="qty-plus">+</button>
      </div>
      <div class="note" id="sumline">${esc(currentSummary())}</div>
      <button class="btn primary" style="margin-top:12px" data-act="add-door" ${readyToAdd?'':'disabled'}>
        ${readyToAdd?'أضف الباب للسلة':'اختر المقاس والحلق والبرور أولاً'}</button>
    </div>` : '';

  // ── شبكة الأبواب مقسّمة صفوف من ٤، واللوحة بتتحط تحت الصف اللي فيه المختار ──
  let doorsGrid='';
  for(let i=0;i<DOORS.length;i+=4){
    const row=DOORS.slice(i,i+4);
    const hasSel = row.some(d=>d.code===p.code);
    doorsGrid += row.map(d=>`
      <button class="door ${p.code===d.code?'on':''}" data-act="pick-door" data-code="${d.code}">
        <div class="leaf" data-code="${esc(d.code)}">
          <img src="${d.img}" alt="" loading="lazy" onerror="this.closest('.leaf').classList.add('noimg');this.remove();">
          <span class="zoombadge" data-act="door-preview" data-code="${esc(d.code)}">🔍</span>
        </div>
        <span class="code">${esc(d.code)}</span><span class="nm">${esc(d.name)}</span>
      </button>`).join('');
    if(hasSel) doorsGrid += detailPanel;
  }

  const nav = `
  <div class="secnav">
    <button class="${state.newSection==='doors'?'on':''}" data-act="sec" data-s="doors"><span class="ic">🚪</span><span class="tx">الأبواب</span></button>
    <button class="${state.newSection==='acc'?'on':''}"   data-act="sec" data-s="acc"><span class="ic">🔩</span><span class="tx">الإكسسوارات</span></button>
    <button class="${state.newSection==='frame'?'on':''}" data-act="sec" data-s="frame"><span class="ic">📏</span><span class="tx">حلق فقط</span></button>
    <button class="${state.newSection==='bror'?'on':''}"  data-act="sec" data-s="bror"><span class="ic">📐</span><span class="tx">برور فقط</span></button>
  </div>`;

  const secDoors = `
  <section class="card">
    <div class="step"><span class="n">🚪</span><h2>اختر الباب</h2><span class="hint">١٠ ألوان</span></div>
    <div class="rail" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px 9px">${doorsGrid}</div>
  </section>`;

  const secAcc = `
  <section class="card">
    <div class="step"><span class="n">🔩</span><h2>إكسسوارات الأبواب</h2><span class="hint">اختياري</span></div>
    <div class="accgrid">${accCards}</div>
    <button class="btn ghost sm" style="margin-top:12px" data-act="add-acc" ${accTotal?'':'disabled'}>
      ${accTotal?'أضف الإكسسوارات':'اختر الكميات أولاً'}</button>
  </section>`;

  const secFrame = `
  <section class="card">
    <div class="step"><span class="n">📏</span><h2>حلق فقط</h2><span class="hint">بالعود — ${ROD_LEN} م</span></div>
    <div class="chips">${frChips}</div>
    <label class="fld" style="margin-top:12px"><span>عدد العيدان</span>
      <input type="number" inputmode="numeric" min="0" step="1" value="${esc(state.fr.rods)}" placeholder="مثال 4" data-act="fr-rods"></label>
    <button class="btn ghost sm" data-act="add-fr" ${frRods>0?'':'disabled'}>
      ${frRods>0 ? `أضف ${frRods} عود حلق ${frSel.cm} سم` : 'اكتب عدد العيدان'}</button>
  </section>`;

  const secBror = `
  <section class="card">
    <div class="step"><span class="n">📐</span><h2>برور فقط</h2><span class="hint">بالعود — ${ROD_LEN} م</span></div>
    <div class="chips">${brChips}</div>
    <label class="fld" style="margin-top:12px"><span>عدد العيدان</span>
      <input type="number" inputmode="numeric" min="0" step="1" value="${esc(state.br.rods)}" placeholder="مثال 3" data-act="br-rods"></label>
    <button class="btn ghost sm" data-act="add-br" ${brRods>0?'':'disabled'}>
      ${brRods>0 ? `أضف ${brRods} عود برور ${brSel.size}` : 'اكتب عدد العيدان'}</button>
  </section>`;

  const secEmpty = `
  <div class="empty">
    <span class="em">👆</span>
    <p>اختر قسم من فوق (الأبواب / الإكسسوارات / حلق فقط / برور فقط) عشان تبدأ.</p>
  </div>`;

  const body = state.newSection==='doors' ? secDoors
             : state.newSection==='acc'   ? secAcc
             : state.newSection==='frame' ? secFrame
             : state.newSection==='bror'  ? secBror
             : secEmpty;

  return `
  <section class="card">
    <div class="step"><span class="n">١</span><h2>بياناتك</h2><span class="hint">إجباري</span></div>
    <label class="fld"><span>الاسم <b class="req">*</b></span>
      <input type="text" class="${bad && !state.profile.name.trim()?'bad':''}" value="${esc(state.profile.name)}" placeholder="الاسم كما هو مسجّل" data-act="prof" data-k="name"></label>
    <div class="row2">
      <label class="fld"><span>رقم الموبايل <b class="req">*</b></span>
        <input type="tel" inputmode="tel" class="${bad && !phoneOk(state.profile.phone)?'bad':''}" value="${esc(state.profile.phone)}" placeholder="01xxxxxxxxx" data-act="prof" data-k="phone"></label>
      <label class="fld"><span>المنطقة</span>
        <input type="text" value="${esc(state.profile.region)}" placeholder="طنطا مثلاً" data-act="prof" data-k="region"></label>

function currentSummary(){
  const p=state.pick;
  if(!p.code) return '';
  const d=doorByCode(p.code);

  if(p.size==null) return 'اختر المقاس.';
  let sizeTxt,unit;
  if(p.size==='custom'){
    const w=Number(p.custom.w)||0,h=Number(p.custom.h)||0;
    if(!w||!h) return 'اكتب العرض والارتفاع.';
    sizeTxt=w+'×'+h+' سم (خاص)'; unit=priceForWidth(w)+CUSTOM_EXTRA;
  } else { sizeTxt=p.size+' سم'; unit=priceForWidth(p.size); }

  if(p.frame==null) return 'اختر الحلق (أو «بدون حلق») عشان تكمّل.';
  if(p.dbror==null) return 'اختر البرور (أو «بدون برور») عشان تكمّل.';

  let t='باب '+d.code+' '+d.name+' — '+sizeTxt+' × '+p.qty;
  if(pricesVisible()) t+=' = '+money(unit*p.qty)+' ج';
  if(p.frame) t+=' | حلق '+p.frame+' سم';
  if(p.dbror) t+=' | برور '+p.dbror;
  if(p.frame||p.dbror) t+=' (شامل مع الباب)';
  return t;
}

function viewCart(){
  if(!state.cart.length) return `<div class="empty"><span class="em">🚪</span><p>السلة فاضية — ارجع لتبويب «طلب جديد».</p></div>${verBar()}`;
  const priced=pricesVisible();

  const lines=state.cart.map((it,i)=>{
    const th = it.kind==='door' ? `<img src="${esc(it.img)}" alt="" onerror="this.outerHTML='<div class=\\'ic\\'>🚪</div>'">`
             : `<div class="ic">${it.kind==='frame'?'📏':it.kind==='bror'?'📐':'🔩'}</div>`;
    let spec;
    if(it.kind==='door'){
      spec=it.sizeTxt+(priced?' · '+money(it.unitPrice)+' ج':'')+' × '+it.qty;
      const inc=[]; if(it.frame) inc.push('حلق '+it.frame+' سم'); if(it.dbror) inc.push('برور '+it.dbror);
      if(inc.length) spec+='<br>شامل: '+inc.join(' + ')+(priced?' — بدون سعر':'');
    } else if(it.kind==='frame'||it.kind==='bror'){
      spec=it.qty+' عود'+(priced?' × '+money(it.price)+' ج ('+ROD_LEN+' م/عود)':'');
    } else spec=(priced?money(it.price)+' ج × ':'× ')+it.qty;

    return `<div class="line">${th}<div class="info2"><b>${esc(it.title)}</b>
      <div class="spec">${spec}</div>${priced?`<div class="pr">${money(linePrice(it))} ج</div>`:''}</div>
      <button class="del" data-act="del" data-i="${i}">✕</button></div>`;}).join('');

  const ok=profileOk();
  return `
  <section class="card">
    <div class="step"><span class="n">✓</span><h2>مراجعة الطلب</h2></div>
    ${lines}
    ${priced?`<div class="total"><span class="lbl">الإجمالي التقديري</span><span class="val">${money(cartTotal())} <small>ج</small></span></div>
    <div class="note">${esc(PRICE_NOTE)}<br>تقدر تتابع حالة طلبك بعد الإرسال من تبويب 🚚 المتابعة.</div>`
    :`<div class="note" style="margin-top:12px">هيتواصل معاك المصنع بالتفاصيل والسعر بعد إرسال الطلب — تقدر تتابع حالته من تبويب 🚚 المتابعة.</div>`}
  </section>

  <section class="card">
    <div class="step"><span class="n">↗</span><h2>إرسال طلب أوردر</h2></div>
    <div class="note" style="margin-top:0;margin-bottom:12px">
      الاسم: <b>${esc(state.profile.name||'—')}</b> · ${esc(state.profile.region||'المنطقة غير محددة')}<br>
      المخزن: <b>${esc(WAREHOUSE)}</b>
      ${ok?'':'<br><span style="color:var(--danger)">اكتب الاسم ورقم الموبايل في تبويب «طلب جديد» قبل الإرسال.</span>'}
    </div>
    <button class="btn brand" data-act="submit">إرسال طلب الأوردر على واتساب</button>
    <div class="btnrow" style="margin-top:9px">
      <button class="btn ghost sm" data-act="quote-cart">📄 PDF الطلب</button>
      <button class="btn ghost sm" data-act="clear">تفريغ السلة</button>
    </div>
  </section>
  ${verBar()}`;

function statusPill(v){
  const st = STATUS[v] || {ar:(v||'—'), ic:'•', bg:'#EDF0F3', fg:'#5B6B7D'};
  return `<span style="display:inline-block;padding:3px 11px;border-radius:20px;font-size:11.5px;

// بنستخدم JSONP (وسم script) بدل fetch — أضمن مع Apps Script ومفيش مشاكل CORS
function jsonp(url, timeout){
  return new Promise((res, rej) => {
    const cb = 'wpcb' + Date.now() + Math.floor(Math.random()*999);
    const sc = document.createElement('script');
    const t = setTimeout(() => { cleanup(); rej(new Error('انتهت المهلة')); }, timeout || 15000);
    function cleanup(){ clearTimeout(t); delete window[cb]; sc.remove(); }
    window[cb] = d => { cleanup(); res(d); };
    sc.onerror = () => { cleanup(); rej(new Error('تعذّر الاتصال')); };
    sc.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.body.appendChild(sc);
  });
}

// بيبني order object موحّد من بيانات شاشة المصنع (list + orderItems) — مستخدم في تصدير الـ PDF وفي مشاركة الصورة
// السيرفر بيخزّن اسم الصنف بالإنجليزي بس (Order_Items عمود Item). بنعيد بناء الاسم العربي
// من نفس الكتالوجات اللي التطبيق أصلًا شغال بيها (DOORS/ACCESSORIES)، مش نص إنجليزي متسيّب.
const ACC_EN_TO_AR_ = {}; ACCESSORIES.forEach(a=>{ ACC_EN_TO_AR_[a.en] = a.name; });
function arabicItemTitle_(it){
  if(it.type==='Door'){
    const d = DOORS.find(x=>x.code===it.code);
    return d ? ('باب WPC '+d.code+' — '+d.name) : (it.title||'');
  }
  if(it.type==='Frame') return 'حلق باب '+(it.size||'')+' — عود '+ROD_LEN+' م';
  if(it.type==='Bror')  return 'برور '+(it.size||'')+' — عود '+ROD_LEN+' م';
  return ACC_EN_TO_AR_[it.title] || it.title || '';
}

// السيرفر بيخزّن المقاس بالإنجليزي ("70 cm" أو "80x210 cm (custom)") — بنحوّله لنفس صيغة
// العميل العربية ("70 سم" أو "80×210 سم (مقاس خاص)") قبل ما نعرضه في أي مستند
function arabicSizeText_(sizeEn){
  const s = String(sizeEn||'').trim();
  let m = /^(\d+)\s*cm$/i.exec(s);
  if(m) return m[1]+' سم';
  m = /^(\d+)\s*x\s*(\d+)\s*cm\s*\(custom\)$/i.exec(s);
  if(m) return m[1]+'×'+m[2]+' سم (مقاس خاص)';
  return s;
}

function buildAdminDocOrder_(o, its){
  return {
    id:o.id, ts:o.date?new Date(o.date).getTime():Date.now(),
    name:o.dist, phone:o.phone, region:o.region, warehouse:'', total:o.total,
    items: its.map(it=>{
      const sz = it.type==='Door' ? arabicSizeText_(it.size) : (it.size||'');
      return {
        kind: it.type==='Door'?'door':(it.type==='Frame'?'frame':(it.type==='Bror'?'bror':'acc')),
        title: (it.avail===false?'⚠️ غير متاح — ':'') + arabicItemTitle_(it) + (it.type==='Door'&&it.code?' ('+it.code+')':''),
        sizeTxt: sz, spec: sz, unit: it.unit||'', qty: it.qty||0,
        unitPrice: it.unitPrice||0, price: it.unitPrice||0,
        frame: it.frame||'', dbror: it.dbror||''
      };
    })
  };
}

  busy(true,'جارٍ تجهيز صورة الطلب…');

// تقرير PDF شامل: كل الطلبات مقسّمة حسب المرحلة، كل طلب بتاريخه واسم صاحبه وأصنافه وكمياتها
// بيجمع الأصناف المتكررة (نفس الاسم/الكود/المقاس) في سطر واحد بكميتهم مجمّعة
function mergeReportItems_(items){
  const map = {}, ord = [];
  (items||[]).forEach(it=>{
    const key = (it.title||'')+'|'+(it.code||'')+'|'+(it.size||'')+'|'+(it.unit||'')+'|'+(it.frame||'')+'|'+(it.dbror||'');
    if(!map[key]){ map[key] = {type:it.type, title:arabicItemTitle_(it), code:it.code, size:it.size, frame:it.frame, dbror:it.dbror, unit:it.unit, qty:0, avail:true}; ord.push(key); }
    map[key].qty += Number(it.qty)||0;
    if(it.avail===false) map[key].avail = false;
  });
  return ord.map(k=>map[k]);
}

// بيرجّع عرض الباب بالسم لو المقاس قياسي ("70 cm") عشان نقدر نجمّع بيه، أو null لو مقاس خاص/غير قياسي
function doorWidthGroup_(sizeStr){
  const m = /^(\d+)\s*cm$/.exec(String(sizeStr||'').trim());
  return m ? Number(m[1]) : null;
}

function reportItemRowHTML_(it){
  const sub = it.type==='Door'
    ? [it.frame?'حلق '+it.frame+' سم':'', it.dbror?'برور '+it.dbror:''].filter(Boolean).join(' · ')
    : (it.size||'');
  return `<div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:4px 0;border-bottom:1px dashed #E4EAF0">
    <span style="font-size:11.5px;${it.avail===false?'color:#B3261E':''}">
      ${it.avail===false?'⚠️ ':''}<b>${esc(it.title||'')}</b>${it.code?' <span style="color:#6B7A8C">('+esc(it.code)+')</span>':''}
      ${sub?'<br><span style="font-size:10.5px;color:#6B7A8C">'+esc(sub)+'</span>':''}
    </span>
    <span style="font-size:12px;font-weight:700;white-space:nowrap">${esc(it.qty||0)} ${esc(it.unit||'')}</span>
  </div>`;
}

function reportHTML(orders){
  const ORDER_KEYS = ['New','Received','In Progress','Ready','Delivered','Cancelled'];
  const groups = {};
  orders.forEach(o=>{ (groups[o.status] = groups[o.status]||[]).push(o); });

  const sections = ORDER_KEYS.filter(k=>groups[k] && groups[k].length).map(k=>{
    const st = STATUS[k] || {ar:k, ic:'•'};
    const cards = groups[k].map(o=>{
      const merged = mergeReportItems_(o.items);
      const doorItems = merged.filter(it=>it.type==='Door');
      const otherItems = merged.filter(it=>it.type!=='Door');

      const doorGroups = {}; const customDoors = [];
      doorItems.forEach(it=>{
        const w = doorWidthGroup_(it.size);
        if(w!=null) (doorGroups[w]=doorGroups[w]||[]).push(it);
        else customDoors.push(it);
      });
      const widths = Object.keys(doorGroups).map(Number).sort((a,b)=>a-b);

      let doorsHtml = widths.map(w=>`
        <div style="margin-top:6px">
          <div style="font-size:11px;font-weight:700;color:#1080C0;padding:3px 0">🚪 أبواب مقاس ${w} سم</div>
          ${doorGroups[w].map(reportItemRowHTML_).join('')}
        </div>`).join('');
      if(customDoors.length) doorsHtml += `
        <div style="margin-top:6px">
          <div style="font-size:11px;font-weight:700;color:#1080C0;padding:3px 0">🚪 أبواب مقاس خاص</div>
          ${customDoors.map(reportItemRowHTML_).join('')}
        </div>`;

      const otherHtml = otherItems.length ? `
        <div style="margin-top:10px">
          <div style="font-size:11px;font-weight:700;color:#6B7A8C;padding:3px 0">🔩 حلق / برور / إكسسوارات</div>
          ${otherItems.map(reportItemRowHTML_).join('')}
        </div>` : '';

      if(!doorItems.length && !otherItems.length) doorsHtml = '<div style="padding:6px 0;color:#8A97A6;font-size:11px">مفيش أصناف</div>';

      const totalsLines = widths.map(w=>{

      }).join('') + (customDoors.length ? `<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0"><span>أبواب مقاس خاص</span><b>${customDoors.reduce((s,it)=>s+(Number(it.qty)||0),0)} باب</b></div>` : '');
      const doorsGrandTotal = doorItems.reduce((s,it)=>s+(Number(it.qty)||0),0);
      const overallTotal = merged.reduce((s,it)=>s+(Number(it.qty)||0),0);

      return `<div style="border:1px solid #DCE4EC;border-radius:9px;margin-top:9px;overflow:hidden">
        <div style="background:#F3F6FA;padding:7px 11px">
          <div style="font-size:11.5px"><b style="font-family:'Reem Kufi',sans-serif;color:#002050">#${esc(o.id)}</b> — <b>${esc(o.dist||'')}</b> — ${esc(o.date||'')}</div>
        </div>
        <div style="padding:2px 11px">${doorsHtml}${otherHtml}</div>

async function buildFullReportPdf_(orders){
  if(typeof html2canvas==='undefined' || !window.jspdf){ toast('محتاج نت أول مرة عشان يجهّز الـ PDF'); return; }
  const paper=document.getElementById('paper');
  paper.innerHTML=reportHTML(orders);
  await new Promise(r=>setTimeout(r,320));
  const canvas=await html2canvas(paper.firstElementChild,{scale:2,backgroundColor:'#ffffff',useCORS:true});
  paper.innerHTML='';
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF('p','mm','a4');
  const pw=210, ph=297;
  const iw=pw, ih=canvas.height*pw/canvas.width;
  const img=canvas.toDataURL('image/jpeg',0.92);
  if(ih<=ph){ pdf.addImage(img,'JPEG',0,0,iw,ih); }
  else{
    let left=ih, pos=0;
    while(left>0){ pdf.addImage(img,'JPEG',0,pos,iw,ih); left-=ph; pos-=ph; if(left>0) pdf.addPage(); }
  }
  pdf.save('تقرير_الطلبات_'+new Date().toISOString().slice(0,10)+'.pdf');
}

async function exportAdminFullReport(){
  if(!APPS_SCRIPT_URL || !state.admin.pw) return;
  busy(true,'جارٍ تجهيز التقرير…');
  try{
    const d = await jsonp(APPS_SCRIPT_URL + '?action=listWithItems&pw=' + encodeURIComponent(state.admin.pw), 25000);
    if(!d || !d.ok) throw new Error((d && d.error) || 'رد غير متوقع');
    const orders = d.orders || [];
    if(!orders.length){ toast('مفيش طلبات لسه'); busy(false); return; }
    await buildFullReportPdf_(orders);
  }catch(err){
    toast('تعذّر تجهيز التقرير: ' + (err.message || err));
  }
  busy(false);
}

let adminPollTimer = null;
function startAdminPolling(){
  if(adminPollTimer || !APPS_SCRIPT_URL) return;
  adminPollTimer = setInterval(()=>adminPoll(), 90000);   // فحص خلفي كل ٩٠ ثانية طول ما الشاشة مفتوحة
}

// فحص خلفي: بيقارن آخر حالة معروفة لكل طلب بالحالة الجديدة —
// طلب جديد خالص → يزوّد عداد "معلق" فوق تبويب 🏭. طلب اتغيّرت حالته → إشعار فوري.
async function adminPoll(){
  if(!APPS_SCRIPT_URL || !state.admin.pw) return;
  try{
    const d = await jsonp(APPS_SCRIPT_URL + '?action=list&pw=' + encodeURIComponent(state.admin.pw));
    if(!d || !d.ok) return;
    const rows = d.orders || [];
    const seen = loadAdminSeen_();
    let pending = 0;
    rows.forEach(o=>{
      const prev = seen[o.id];
      if(prev===undefined){
        pending++;
        notifyAdmin_('📥 طلب جديد #'+o.id, o.dist?('من: '+o.dist):'');
      } else if(prev !== o.status){
        const stAr = (STATUS[o.status] && STATUS[o.status].ar) || o.status;
        notifyAdmin_('طلب #'+o.id+' تم تعديله لـ '+stAr, o.dist?('صاحب الطلب: '+o.dist):'');
      }
      seen[o.id] = o.status;
    });
    saveAdminSeen_(seen);
    state.admin.pendingCount = pending;
    updateAdmBadge();
    // لو شاشة متابعة المصنع مفتوحة فعلًا قدام المستخدم، حدّث القايمة المعروضة كمان
    if(state.admin.open && state.tab==='admin'){ state.admin.rows = rows; render(); }
  }catch(err){ /* أعطال الشبكة في الفحص الخلفي بنتجاهلها بصمت */ }
}

function addDoor(){
  const p=state.pick;
  if(!p.code || p.size==null || p.frame==null || p.dbror==null){
    toast('اختر المقاس والحلق والبرور أولاً'); return;
  }
  const d=doorByCode(p.code);
  let sizeTxt,sizeEn,unitPrice;
  if(p.size==='custom'){
    const w=Number(p.custom.w)||0,h=Number(p.custom.h)||0;
    if(!w||!h){toast('اكتب العرض والارتفاع للمقاس الخاص');return;}
    sizeTxt=w+'×'+h+' سم (مقاس خاص)'; sizeEn=w+'x'+h+' cm (custom)'; unitPrice=priceForWidth(w)+CUSTOM_EXTRA;
  } else { sizeTxt=p.size+' سم'; sizeEn=p.size+' cm'; unitPrice=priceForWidth(p.size); }

  state.cart.push({
    kind:'door',
    title:'باب WPC '+d.code+' — '+d.name,
    titleEn:'WPC Door '+d.code+' - '+d.en,
    code:d.code, img:d.img, sizeTxt, sizeEn, unitPrice, qty:p.qty,
    frame:p.frame||0, dbror:p.dbror||''
  });
  save(LS_CART,state.cart);
  toast('اتضاف للسلة: '+d.code+' — '+sizeTxt);
  // نلمّ الاختيارات ونقفل اللوحة عشان يختار باب تاني بارتياح
  state.pick={code:'', size:null, custom:{w:'',h:''}, frame:null, dbror:null, qty:1};
  render();
}

function addRod(kind){
  const isFrame = kind==='frame';
  const st = isFrame?state.fr:state.br;
  const rods = Math.round(Number(st.rods)||0);
  if(rods<=0){toast('اكتب عدد العيدان');return;}

  const src = isFrame ? (FRAMES.find(f=>f.cm===st.cm)||FRAMES[0]) : (BRORS.find(b=>b.size===st.size)||BRORS[0]);
  const key = isFrame ? ('حلق'+src.cm) : ('برور'+src.size);
  const price = rodPrice(src.price);

  const ex=state.cart.find(it=>it.kind===kind && it.key===key);
  if(ex) ex.qty+=rods;
  else state.cart.push({
    kind, key, price, qty:rods,
    spec: isFrame ? (src.cm+' سم') : src.size,
    perM: src.price,
    title:  isFrame ? ('حلق باب '+src.cm+' سم — عود '+ROD_LEN+' م') : ('برور '+src.size+' — عود '+ROD_LEN+' م'),
    titleEn:isFrame ? ('Door Frame '+src.cm+' cm - '+ROD_LEN+'m rod') : ('Bror '+src.size+' - '+ROD_LEN+'m rod')
  });

  save(LS_CART,state.cart);
  if(isFrame) state.fr.rods=1; else state.br.rods=1;
  toast('اتضاف '+rods+' عود');
  render();
}

function addAccessories(){
  let n=0;
  ACCESSORIES.forEach(a=>{
    const q=state.acc[a.id]||0; if(!q) return;
    const ex=state.cart.find(it=>it.kind==='acc'&&it.id===a.id);
    if(ex) ex.qty=Math.round((ex.qty+q)*100)/100;
    else state.cart.push({kind:'acc',id:a.id,title:a.name,titleEn:a.en,price:a.price,qty:q,unit:a.unit});
    n+=q;
  });
  if(!n){toast('محددتش أي كميات');return;}
  state.acc={}; save(LS_CART,state.cart); toast('اتضافت الإكسسوارات'); render();
}

function newOrderId(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  return 'W'+String(d.getFullYear()).slice(2)+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());
}

function draftOrder(){
  return {
    id:newOrderId(), ts:Date.now(),
    name:state.profile.name, phone:state.profile.phone, region:state.profile.region,
    warehouse:WAREHOUSE, items:JSON.parse(JSON.stringify(state.cart)), total:cartTotal()
  };
}

function buildMessage(o){
  const priced=pricesVisible();
  let m='🚪 طلب أوردر — '+COMPANY+'\n';
  m+='رقم الطلب: #'+o.id+'\n';
  m+='الاسم: '+(o.name||'-')+'\n';
  m+='المنطقة: '+(o.region||'-')+'\n';
  m+='الموبايل: '+(o.phone||'-')+'\n';
  m+='المخزن: '+WAREHOUSE+'\n——————\n';
  o.items.forEach((it,i)=>{
    m+=(i+1)+'. '+it.title+'\n';
    if(it.kind==='door'){
      m+='   المقاس: '+it.sizeTxt+' — الكمية: '+it.qty+'\n';
      const inc=[]; if(it.frame) inc.push('حلق '+it.frame+' سم'); if(it.dbror) inc.push('برور '+it.dbror);
      if(inc.length) m+='   شامل مع الباب: '+inc.join(' + ')+'\n';
    } else if(it.kind==='frame'||it.kind==='bror'){
      m+='   '+it.qty+' عود'+(priced?' × '+money(it.price)+' ج':'')+'\n';
    } else m+='   الكمية: '+it.qty+' '+(it.unit||'')+'\n';
  });
  m+='——————\n';
  if(priced){
    m+='الإجمالي التقديري: '+money(o.total)+' جنيه\n';
    m+='شكرًا لتعاملك مع '+COMPANY_AR+'\n';
  } else {
    m+='هيتواصل معاك المصنع بالتفاصيل والسعر.\n';
  }
  m+='تقدر تتابع حالة الطلب من تبويب 🚚 المتابعة في التطبيق.';
  return m;
}

// بيفتح واتساب مباشرة على محادثة رقم استلام الأوردرات الثابت (إجباري، مفيش اختيار تاني).
function openWhatsAppPicker(text){
  window.open('https://wa.me/'+ORDER_WHATS+'?text='+encodeURIComponent(text),'_blank');
}

function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
}

async function makeDoc(o,mode){
  if(!o.items || !o.items.length){toast('مفيش أصناف');return;}
  if(typeof html2canvas==='undefined' || !window.jspdf){toast('محتاج نت أول مرة عشان يجهّز الـ PDF');return;}
  busy(true,'جارٍ تجهيز المستند…');
  try{
    const paper=document.getElementById('paper');
    paper.innerHTML=docHTML(o,mode);
    await new Promise(r=>setTimeout(r,320));           // نستنى الصور والخطوط
    const canvas=await html2canvas(paper.firstElementChild,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const pw=210, ph=297;
    const iw=pw, ih=canvas.height*pw/canvas.width;
    const img=canvas.toDataURL('image/jpeg',0.92);
    if(ih<=ph){ pdf.addImage(img,'JPEG',0,0,iw,ih); }
    else {
      let left=ih, pos=0;
      while(left>0){ pdf.addImage(img,'JPEG',0,pos,iw,ih); left-=ph; pos-=ph; if(left>0) pdf.addPage(); }
    }
    pdf.save((mode==='quote'?'عرض_سعر_':'طلب_')+o.id+'.pdf');
    paper.innerHTML='';
  }catch(err){ toast('تعذّر تجهيز الـ PDF: '+(err&&err.message?err.message:err)); }
  busy(false);
}

   ============================================================ */
function exportExcel(orders,fname){
  if(typeof XLSX==='undefined'){toast('محتاج نت أول مرة عشان يجهّز الإكسيل');return;}
  if(!orders.length){toast('مفيش طلبات');return;}
  const priced=pricesVisible();
  busy(true,'جارٍ تجهيز الإكسيل…');
  try{
    const sum=[['Order No','Date','Distributor','Phone','Region','Warehouse','Lines'].concat(priced?['Total']:[])];
    const det=[['Order No','Date','Distributor','Type','Item','Colour','Size','Frame (with door)','Milling','Unit','Qty'].concat(priced?['Unit Price','Line Total']:[])];

    orders.forEach(o=>{
      const sumRow=[o.id, dateStr(o.ts), o.name||'', String(o.phone||''), o.region||'', o.warehouse||WAREHOUSE, o.items.length];
      if(priced) sumRow.push(Number(o.total)||0);
      sum.push(sumRow);
      o.items.forEach(it=>{
        const isDoor=it.kind==='door', isRod=it.kind==='frame'||it.kind==='bror';
        const row=[
          o.id, dateStr(o.ts), o.name||'',
          isDoor?'Door':(it.kind==='frame'?'Frame':it.kind==='bror'?'Bror':'Accessory'),
          it.titleEn||it.title||'', it.code||'',
          isDoor?(it.sizeEn||it.sizeTxt||''):(isRod?(it.spec||''):''),
          isDoor?[(it.frame?it.frame+' cm frame':''),(it.dbror?'bror '+it.dbror:'')].filter(Boolean).join(' + ')+(it.frame||it.dbror?' (incl.)':''):'',
          isDoor?(it.millEn||''):'',
          isDoor?'door':(isRod?('rod '+ROD_LEN+'m'):(it.unit||'pc')),
          Number(it.qty)||0
        ];
        if(priced) row.push(Number(isDoor?it.unitPrice:it.price)||0, Number(linePrice(it))||0);
        det.push(row);
      });
    });

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sum), 'Orders');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(det), 'Order_Items');
    XLSX.writeFile(wb, fname+'.xlsx');
  }catch(err){ toast('تعذّر التصدير: '+(err&&err.message?err.message:err)); }
  busy(false);
}

async function doUpdate(){
  busy(true,'جارٍ التحديث…');
  try{
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
  }catch(e){}
  location.reload(true);
}

// (من غير أي رسالة خطأ في الكونسول)، وكمان مبتدّيش beforeinstallprompt خالص.
// عشان كده مستخدم بيدوس زرار التثبيت ومفيش أي رد فعل. الحل: مودال جوه
// الصفحة نفسها (عنصر HTML عادي) بدل alert()، بيشتغل في كل الحالات.
function isInAppWebView(){
  const ua = navigator.userAgent;
  return /FBAN|FBAV|Instagram|Line\/|MicroMessenger|; ?wv\)/i.test(ua);
}

function showInstallHelp(){
  const isIOS = isIOSDevice();
  const inApp = isInAppWebView();
  let body;
  if(inApp){
    body = `<b>لازم تفتح الصفحة من متصفح حقيقي الأول</b><br><br>
      دلوقتي فاتحها من جوه تطبيق تاني مباشرة، وده بيمنع التثبيت.<br><br>
      ١ — دوس على ⋮ (تلات نقط) فوق يمين الشاشة<br>
      ٢ — اختار «فتح في المتصفح» أو «Open in Chrome»<br>
      ٣ — من هناك جرّب زرار التثبيت تاني`;
  } else if(isIOS){
    body = `<b>للتثبيت على الآيفون:</b><br><br>
      ١ — افتح الصفحة من متصفح Safari<br>
      ٢ — اضغط زرار المشاركة ⬆️ تحت<br>
      ٣ — اختار «إضافة إلى الشاشة الرئيسية»`;
  } else {
    body = `<b>للتثبيت على أندرويد:</b><br><br>
      ١ — دوس على قائمة المتصفح ⋮ فوق يمين الشاشة<br>
      ٢ — اختار «تثبيت التطبيق» أو «إضافة إلى الشاشة الرئيسية»`;
  }
  const old = document.getElementById('installHelpOverlay'); if(old) old.remove();
  const ov = document.createElement('div');
  ov.id = 'installHelpOverlay';
  ov.style.cssText = 'position:fixed;inset:0;z-index:300;background:rgba(0,20,50,.72);display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML = `<div style="background:#fff;border-radius:16px;padding:24px 20px;max-width:340px;text-align:center;font-size:14.5px;line-height:2;color:#12233d;font-family:'Readex Pro',sans-serif">
    ${body}
    <button id="closeInstallHelp" style="margin-top:20px;background:#002050;color:#fff;padding:11px 26px;border-radius:10px;font-weight:700;font-size:14px">تمام</button>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  document.getElementById('closeInstallHelp').onclick = () => ov.remove();
}

async function doInstall(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
    return;
  }
  if(window.matchMedia('(display-mode: standalone)').matches || navigator.standalone){
    toast('التطبيق متثبّت بالفعل ✅'); return;
  }
  showInstallHelp();
}

/* ============================================================
   التشغيل
   ============================================================ */
const savedPw = sessionStorage.getItem('wpc_adm');
if(savedPw){ state.admin.pw = savedPw; state.admin.open = true; startAdminPolling(); adminPoll(); }
document.getElementById('hdrLogo').src = ASSETS.logo;
document.documentElement.style.setProperty('--mark', 'url('+ASSETS.mark+')');
document.getElementById('vsVer').textContent = 'الإصدار ' + APP_BUILD;

// خانة أي رقم — لما تدوس عليها تتحدد كلها عشان تكتب على طول من غير ما تمسح بإيدك
document.addEventListener('focusin', e => {
  if(e.target.matches('input[type="number"]')) e.target.select();
});

render();
function markUpdateReady(){
  const btn=document.querySelector('.verstrip [data-act="update"]');
  if(btn) btn.classList.add('vs-install');
  toast('فيه إصدار جديد — اضغط 🔄 تحديث فوق');
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      // لو لقى نسخة جديدة مستنية، بننبّه على زرار التحديث فوق
      if(reg.waiting) markUpdateReady();
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing; if(!nw) return;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed' && navigator.serviceWorker.controller){
            markUpdateReady();
          }
        });
      });
      setInterval(()=>reg.update().catch(()=>{}), 60*60*1000);   // بيدوّر على تحديث كل ساعة
    }).catch(()=>{});
  });
}
</script>
