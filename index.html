  if(!q) return;
  const name = 'عرض_سعر_' + (state.successOrderId||'order');
  if(await shareAsImage_(q, name, 'عرض سعر')) return;
  // 3) آخر حل: ننزّل الصورة ونفتح واتساب عشان يرفقها بإيده
  if(q.imgBlob){
    downloadBlob(q.imgBlob, name + '.png');
    showToast('اتحملت الصورة — هتفتح واتساب، ارفقها من المعرض');
  } else {
    downloadQuote();
    showToast('اتحمل الملف — هتفتح واتساب، ارفقه يدويًا');
  }
  const o = state.lastOrder;
  let msg = 'طلب #' + (state.successOrderId||'') + '\n';
  if(o) msg += 'الموزع: ' + asText(o.distName) + '\nالمنطقة: ' + asText(o.distRegion) + '\n';
  setTimeout(()=>{ window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank'); }, 900);
}

  // ⚠️ عرض السعر (PDF) بيتعرض باللفة لأصناف القطاعات لو الكمية لفة كاملة
  // أو أكتر — لكن لو الكمية أقل من لفة، بتتعرض بالعود عشان متبقاش كسر لفة
  // (زي 0.3 لفة) — بعكس تصدير الإكسيل اللي فضل بالعود زي ما هو (متلمسناهوش).
  // السعر بيتحوّل لسعر اللفة (سعر العود × محتوى اللفة) بس لما تكون العرض
  // فعلًا لفات، عشان الإجمالي يفضل مطابق للحقيقي بالظبط في الحالتين.
  const rows = order.items.map(it=>{
    const raw = rawPriceForItem(it); // سعر الوحدة الصغيرة (عود/قطعة) — الأساس المالي الصحيح
    const norm = normalizeItemToSmallUnit(it);

      dispUnit = disp.unitLabel;
      dispPrice = raw==null ? null : (dispUnit==='لفة' ? raw*content : raw);
    }
    const lineRaw = dispPrice==null ? null : dispPrice*dispQty;
    return Object.assign({}, it, { normQty: dispQty, normUnit: dispUnit, rawPrice: dispPrice, lineRaw });
  });
  const subtotal = rows.reduce((s,r)=> s + (r.lineRaw||0), 0);
  // ⚠️ فرّقنا بين حاجتين هنا: "الخصم موجود أصلاً" (بيتحسب دايمًا لو موزع،
  // بغض النظر عن الزرار) و"نوريه ولا لأ" (ده بس اللي بيتحكم فيه الزرار).

    const imgData = canvas.toDataURL('image/png');
    const imgWidth = 210;
    const pageHeight = 297;
    const imgHeight = canvas.height * imgWidth / canvas.width;
    let heightLeft = imgHeight;
    let position = 0;
    doc.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
    heightLeft -= pageHeight;
    while(heightLeft > 0){
      position = heightLeft - imgHeight;
      doc.addPage();
      doc.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
      heightLeft -= pageHeight;
    }
    const imgBlob = await canvasToPngBlob_(canvas);
    result = { blob: doc.output('blob'), previewUrl: imgData, imgBlob: imgBlob };
  }catch(e){ console.error('buildQuotePDF failed:', e); result = null; }
  try{ document.body.removeChild(wrap); }catch(e){}
  return result;
}

// ===== طلبية نواقص (صور، مش PDF): زرارين — كرافت ونيو / كومبن واكسسوارات =====
// كل زرار بيطلّع صورة واحدة (PNG) بدل PDF: من فوق "طلبية نواقص {اسم الفرع}"
// والتاريخ، والأصناف باللفة (لمجموعات اللفة)، ومن تحت إجمالي كل قطاع من
// القطاعات اللي بتتحسب باللفة (كرافت/نيو/كومبن). الصفحة دايمًا مقسومة عمودين
// جنب بعض؛ لو الأصناف زادت عن نص الصفحة الأولى بتكمل في العمود التاني تلقائيًا.
const SHORTAGE_IMG_GROUPS_ = {
  kraft_new: { label: 'كرافت ونيو', mains: ['قطاعات كرافت لاين', 'نيو لاين'] },
  combin_acc: { label: 'كومبن واكسسوارات', mains: ['قطاعات PVC كومبن', 'اكسسوارات pvc اكسا'] }
};
// القطاعات اللي إجماليها باللفة بيتحسب في الفوتر (اكسسوارات وحداتها مختلطة
// كرتونة/قطعة فمفيش إجمالي واحد يبقى له معنى ليها).
const SHORTAGE_TOTAL_MAINS_ = ['قطاعات كرافت لاين', 'نيو لاين', 'قطاعات PVC كومبن'];

async function buildShortageImageGroup(order, groupKey){
  if(typeof html2canvas === 'undefined') return null;
  const group = SHORTAGE_IMG_GROUPS_[groupKey];
  if(!order || !order.items || !order.items.length || !group) return null;

  const relevant = order.items.filter(it => group.mains.includes(it.main));
  if(!relevant.length) return null;

  const date = new Date(order.ts);
  const dateStr = date.toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit',year:'numeric'});

  // الأصناف باللفة لمجموعات اللفة (أو بالعود لو الكمية أقل من لفة كاملة)،
  // وبباقي وحداتها الصغيرة لغير كده
  const rows = relevant.map(it=>{
    const norm = normalizeItemToSmallUnit(it);
    if(ROLL_GROUPS_.includes(it.main)){
      const cat = findCatalogItem(it.main, it.product, it.color);
      const content = Number(cat && cat.unit) || 1;
      const disp = rollsOrRodsDisplay_(norm.qty, content);
      return Object.assign({}, it, { dispQty: disp.qty, dispUnit: disp.unitLabel });
    }
    return Object.assign({}, it, { dispQty: norm.qty, dispUnit: norm.unitLabel });
  });

  const groupsMap = new Map();
  rows.forEach(r=>{
    if(!groupsMap.has(r.main)) groupsMap.set(r.main, []);
    groupsMap.get(r.main).push(r);
  });
  const orderedMains = group.mains.filter(m=>groupsMap.has(m));

  // صف واحد مسطّح لكل الأصناف، مع علم يوضّح بداية قطاع جديد (لعرض هيدر فرعي)
  const flat = [];
  orderedMains.forEach(main=>{
    groupsMap.get(main).forEach((it,i)=> flat.push(Object.assign({}, it, { sectionStart: i===0, sectionLabel: main })));
  });

  // إجمالي كل قطاع من القطاعات المحسوبة باللفة (كرافت/نيو/كومبن) — ممكن
  // يبقى فيه إجمالي لفات وإجمالي عيدان مع بعض لو فيه أصناف اتعرضت بالعود
  // (كميات أقل من لفة كاملة)، فبنعرض الاتنين لو موجودين.
  const totals = orderedMains
    .filter(m=>SHORTAGE_TOTAL_MAINS_.includes(m))
    .map(m=>{
      const items = groupsMap.get(m);
      const rollsSum = items.filter(it=>it.dispUnit==='لفة').reduce((a,it)=>a+(Number(it.dispQty)||0), 0);
      const rodsSum = items.filter(it=>it.dispUnit==='عود').reduce((a,it)=>a+(Number(it.dispQty)||0), 0);
      const parts = [];
      if(rollsSum>0) parts.push(Math.round(rollsSum*10)/10 + ' لفة');
      if(rodsSum>0) parts.push(Math.round(rodsSum*10)/10 + ' عود');
      return { main: m, text: parts.join(' + ') };
    })
    .filter(t=>t.text);

  // الصفحة دايمًا مقسومة نصين: العمود الأول ياخد النص الأول من الأصناف،
  // والزيادة كلها بتكمل في العمود التاني — زي ورقتين اتلزقوا في واحدة.
  const half = Math.ceil(flat.length/2) || 1;
  const colA = flat.slice(0, half);
  const colB = flat.slice(half);

  function rowsHTML(list, startIndex){
    let html = '';
    list.forEach((it,i)=>{
      if(it.sectionStart && SHORTAGE_IMG_GROUPS_[groupKey].mains.length>1){
        html += `<div style="padding:7px 10px;background:#E4C766;color:#1F3050;font-weight:800;font-size:15px;border-radius:6px;margin:${i===0?'0':'10px'} 0 6px 0;">${esc(it.sectionLabel)}</div>`;
      }
      const bg = i%2===0 ? '#FFFFFF' : '#F5F3EE';

// عشان نفس الزرارين يشتغلوا هنا وفي شاشة "تم إرسال الطلب".
function findOrderForShortage_(id){
  if(id){
    const o = state.orders.find(o=>o.id===id) || state.myOrders.find(o=>o.id===id);
    if(o) return o;
  }
  return state.lastOrder;
}

async function handleShortageImage(id, groupKey){
  const order = findOrderForShortage_(id);
  if(!order){ showToast('مفيش طلب'); return; }
  const busyKey = id || 'last';
  state.shortageImgBusy = busyKey + '|' + groupKey; render();
  try{
    const blob = await buildShortageImageGroup(order, groupKey);
    if(blob){
      const label = SHORTAGE_IMG_GROUPS_[groupKey].label;
      previewImageBlob(blob, 'نواقص_' + label.replace(/\s+/g,'_') + '_' + orderNoDisplay_(order) + '.png');
    } else {
      showToast('مفيش أصناف من "' + SHORTAGE_IMG_GROUPS_[groupKey].label + '" في الطلب ده');

async function prepareWarehouseImages(){
  const o = state.lastOrder;
  if(!o || !o.items || !o.items.length){ showToast('مفيش طلب'); return; }
  state.whImgPreparing = true; state.warehouseImages = []; render();

  // مجموعة رئيسية لكل صورة
  const groups = new Map();
  o.items.forEach(it=>{
    if(!groups.has(it.main)) groups.set(it.main, []);
    groups.get(it.main).push(it);
  });
  const ordered = orderGroups_(groups);
  const out = [];
  for(let i=0;i<ordered.length;i++){
    const g = ordered[i];
    // فسحة صغيرة بين كل صورة عشان الواجهة ما تتجمدش
    await new Promise(r=>setTimeout(r, 60));
    const blob = await buildWarehouseImage(o, g, groups.get(g), i+1, ordered.length);
    if(blob) out.push({ group: g, blob: blob });
  }
  state.warehouseImages = out;
  state.whImgPreparing = false;
  if(!out.length) showToast('تعذّر تجهيز الصور، حاول تاني');
  render();
}

async function shareWarehouseImages(){
  const imgs = state.warehouseImages || [];
  if(!imgs.length){ showToast('جهّز الصور الأول'); return; }
  const o = state.lastOrder;
  const base = 'مخزن_' + String(o ? o.id : 'order').toUpperCase();
  const files = imgs.map((x, i)=> new File([x.blob], base + '_' + (i+1) + '_' + x.group + '.png', {type:'image/png'}));
  try{
    if(navigator.canShare && navigator.canShare({files})){
      await navigator.share({ files, title:'أمر صرف مخزن', text:'طلب #' + (o?orderNoDisplay_(o):'') });
      return;
    }
  }catch(e){
    if(e && e.name === 'AbortError') return;
  }
  // احتياطي: ننزّلهم واحدة واحدة
  imgs.forEach((x,i)=> downloadBlob(x.blob, base + '_' + (i+1) + '_' + x.group + '.png'));
  showToast('اتحملت الصور — ابعتها من المعرض');
}

// ===== excel export (admin) =====
async function exportExcel(statusFilter){
  // statusFilter: واحدة من المراحل التلاتة بالظبط — كل زرار بيصدّر ملف مستقل بطلباته بس
  const ordersForFile = state.orders.filter(o=>o.status===statusFilter);

  if(ordersForFile.length===0){ showToast('مفيش طلبات "' + statusFilter + '" لتصديرها'); return; }
  if(typeof ExcelJS === 'undefined'){ showToast('حصل خطأ في تحميل أداة التصدير، حاول تاني'); return; }

  const NAVY='FF1F3050', WHITE='FFFFFFFF', LIGHT='FFF5F3EE', GOLD='FFC9A227';
  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet(statusFilter, { views:[{ rightToLeft:true }] });
  ws.columns = [
    { header:'م', key:'serial', width:6 },
    { header:'الموزع', key:'dist', width:18 },
    { header:'المنطقة', key:'region', width:14 },
    { header:'الصنف', key:'product', width:32 },
    { header:'الكمية', key:'qty', width:8 },
    { header:'الوحدة', key:'unit', width:10 },
    { header:'سعر الوحدة', key:'price', width:11 },
    { header:'الإجمالي', key:'total', width:11 },
    { header:'التاريخ', key:'date', width:14 },
  ];
  const headerRow = ws.getRow(1);
  headerRow.eachCell(cell=>{
    cell.font = { bold:true, color:{argb:WHITE}, size:12, name:'Arial' };
    cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:NAVY} };
    cell.alignment = { horizontal:'center', vertical:'middle' };
    cell.border = { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} };
  });
  headerRow.height = 22;

  const groups = new Map();
  ordersForFile.forEach(o=>{
    if(!groups.has(o.distName)) groups.set(o.distName, { region:o.distRegion||'', ts:o.ts, items:[] });
    o.items.forEach(it => groups.get(o.distName).items.push(it));
  });

  let rowIdx = 2, toggle=false, grandTotal=0, serial=0;
  groups.forEach((g, dist)=>{
    const startRow = rowIdx;
    const dateStr = new Date(g.ts).toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit',year:'numeric'});
    const fillColor = toggle ? LIGHT : WHITE;
    g.items.forEach((it, idx)=>{
      grandTotal += it.lineTotal||0;
      serial++;
      // بنصدّر بالوحدة الصغيرة (عود / قطعة) مش باللفة — زي عرض السعر بالظبط
      const norm = normalizeItemToSmallUnit(it);
      const rawPrice = rawPriceForItem(it);
      const row = ws.addRow({
        serial,
        dist: idx===0?dist:'', region: idx===0?g.region:'',
        product: it.name || it.product,
        qty: norm.qty, unit: norm.unitLabel||'',
        price: rawPrice==null ? 'غير متاح' : Math.round(rawPrice),
        total: it.lineTotal==null ? 'غير متاح' : Math.round(it.lineTotal),
        date: idx===0?dateStr:''
      });
      row.eachCell(cell=>{
        cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:fillColor} };
        cell.border = { top:{style:'hair',color:{argb:'FFDDDDDD'}}, bottom:{style:'hair',color:{argb:'FFDDDDDD'}}, left:{style:'hair',color:{argb:'FFDDDDDD'}}, right:{style:'hair',color:{argb:'FFDDDDDD'}} };
        cell.alignment = { horizontal:'right', vertical:'middle', wrapText:true };
        cell.font = { name:'Arial', size:11 };
      });
      rowIdx++;
    });
    if(g.items.length>1){
      ws.mergeCells(startRow,2,rowIdx-1,2); ws.mergeCells(startRow,3,rowIdx-1,3); ws.mergeCells(startRow,9,rowIdx-1,9);
    }
    const distCell = ws.getCell(startRow,2);
    distCell.font = { bold:true, color:{argb:NAVY}, size:11, name:'Arial' };
    distCell.alignment = { horizontal:'right', vertical:'middle', wrapText:true };
    toggle = !toggle;
  });
  ws.autoFilter = { from:'A1', to:'I1' };

  const totalRow = ws.addRow({ product:'الإجمالي الكلي', total: Math.round(grandTotal) });
  ws.mergeCells(rowIdx, 1, rowIdx, 7);
  totalRow.eachCell(cell=>{
    cell.font = { bold:true, color:{argb:WHITE}, size:12, name:'Arial' };
    cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:GOLD} };
    cell.alignment = { horizontal:'center', vertical:'middle' };
  });

  const buffer = await wb.xlsx.writeBuffer();
  const blob = new Blob([buffer], { type:'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fileTag = statusFilter.replace(/\s+/g,'_');
  a.href = url; a.download = 'طلبات_الموزعين_' + fileTag + '.xlsx';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  const unitType = s.units[color] || s.unitOptions[0];

  const price = calcUnitPrice(s.main, s.product, color, unitType);
  const lineTotal = price==null ? null : price*qty;
  return `
  <div class="inlineqtyrow">
    ${s.unitOptions.length>1 ? `
    <select class="cqselect" data-act="set-color-unit" data-key="${esc(s.key)}" data-val="${esc(color)}">

    <div class="qtystepper small">
      <button data-act="staged-qty-dec" data-key="${esc(s.key)}" data-val="${esc(color)}" type="button">−</button>

      <button data-act="staged-qty-inc" data-key="${esc(s.key)}" data-val="${esc(color)}" type="button">+</button>

}

        }
        const sel = s.selectedColors.includes(c) ? 'active' : '';
        // ⚠️ في مخازن العاشر/المنصورة، أو لو الداخل عميل، الرصيد مالوش معنى —
        // اللون بيتعرض عادي (شكل افتراضي، مفيش لون تلوين ولا لافتة خالص).
        if(!warehouseAffectsStock()){
          return `<button class="chip ${sel}" data-act="toggle-color" data-key="${esc(s.key)}" data-val="${esc(c)}">${esc(c)}</button>`;
        }
        const lvl = colorStockLevel(findCatalogItem(s.main, s.product, c));
        // أحمر: أقل من لفة (أو صفر) · أصفر: أقل من 5 لفات · عادي: كفاية
        if(lvl === 'out'){
          return `<button class="chip nostockchip ${sel}" data-act="toggle-color" data-key="${esc(s.key)}" data-val="${esc(c)}">${esc(c)}<small>غير متاح رصيد</small></button>`;
        }
        if(lvl === 'crit'){
          return `<button class="chip outstockchip ${sel}" data-act="toggle-color" data-key="${esc(s.key)}" data-val="${esc(c)}">${esc(c)}<small>متاح اعواد</small></button>`;
        }
        if(lvl === 'low'){
          return `<button class="chip gold lowstockchip ${sel}" data-act="toggle-color" data-key="${esc(s.key)}" data-val="${esc(c)}">${esc(c)}<small>كمية قليلة</small></button>`;
        }
        return `<button class="chip greenchip ${sel}" data-act="toggle-color" data-key="${esc(s.key)}" data-val="${esc(c)}">${esc(c)}</button>`;
      }).join('')}
    </div>
    ${(()=>{
      // ⚠️ كان فيه تناقض هنا: لون "مفيش رصيد خالص" (out) كان بياخد نفس رسالة
      // "الكمية قليلة" بتاعة لون فيه رصيد جزئي (low/crit) — وده مضلل، لأن
      // "قليلة" بتوحي إن فيه حاجة، والصفر مفيهوش حاجة أصلاً. بنفصل الرسالتين.
      const outs = s.selectedColors.filter(c => colorStockLevel(findCatalogItem(s.main, s.product, c)) === 'out');
      const partial = s.selectedColors.filter(c => {
        const l = colorStockLevel(findCatalogItem(s.main, s.product, c));
        return l === 'low' || l === 'crit';
      });
      let html = '';
      if(outs.length){
        html += `<div class="lowstocknote" style="background:#FDECEC;border-color:var(--danger);color:#8A1F1F;">🚫 مفيش رصيد خالص في: ${
          outs.map(c=>esc(c)).join(' · ')
        } — السعر متاح لو حبيت تطلبه</div>`;
      }
      if(partial.length){
        html += `<div class="lowstocknote">⚠️ الكمية مش كتيرة في: ${
          partial.map(c=>esc(c)).join(' · ')
        } — يفضل تتأكد الأول</div>`;
      }
      return html;
    })()}` : ''}
    ${s.selectedColors.length>0 ? `
    <div class="colorqtytable">
      <div class="cqheader">
        <span class="cqcol-color">اللون</span>
        <span class="cqcol-unit">${esc(unitColumnLabel(s.main))}</span>
        <span class="cqcol-qty">الكمية</span>
        <span class="cqcol-price">السعر*</span>
      </div>
      ${s.selectedColors.map(c=>{
        const unitType = s.units[c] || s.unitOptions[0];
        const qty = s.qtys[c] ?? 1;
        const price = calcUnitPrice(s.main, s.product, c, unitType);
        const lineTotal = price==null ? null : price*qty;
        return `
        <div class="cqrow">
          <span class="cqcolor">${c?esc(c):s.product}</span>
          ${s.unitOptions.length>1 ? `
          <select class="cqselect" data-act="set-color-unit" data-key="${esc(s.key)}" data-val="${esc(c)}">
            ${s.unitOptions.map(u=>`<option value="${esc(u)}" ${s.units[c]===u?'selected':''}>${esc(u)}</option>`).join('')}
          </select>` : `<span class="cqunitfixed">${esc(s.unitOptions[0])}</span>`}
          <div class="qtystepper small">
            <button data-act="staged-qty-dec" data-key="${esc(s.key)}" data-val="${esc(c)}" type="button">−</button>
            <input type="text" inputmode="numeric" pattern="[0-9]*" min="1" value="${qty}" data-act="staged-qty-input" data-key="${esc(s.key)}" data-val="${esc(c)}">
            <button data-act="staged-qty-inc" data-key="${esc(s.key)}" data-val="${esc(c)}" type="button">+</button>
          </div>
          <span class="cqprice">${lineTotal==null?'—':Math.round(lineTotal).toLocaleString('en-US')}</span>
        </div>`;
      }).join('')}
    </div>` : ''}
    <div class="stagedbtns">
      <button class="confirmbtn" data-act="confirm-staged" data-key="${esc(s.key)}">${s.isEditingExisting?'✓ حفظ التعديل':'✓ تمام، ضيفه للسلة'}</button>
      <button class="cancelbtn" data-act="cancel-staged" data-key="${esc(s.key)}">✖ إلغاء</button>
    </div>
  </div>`;
}

// ===== render: order view =====
function renderOrderView(){
  if(state.catalogLoading){
    return `<main><div class="loading">جارٍ تحميل قائمة الأصناف...</div></main>`;
  }
  const catalogErrorBanner = state.catalogError ? `<div class="editbanner" style="background:#FBEBD1;">⚠️ تعذّر تحميل قائمة الأسعار المحدّثة، الأصناف ظاهرة بدون أسعار مؤقتًا</div>` : '';
  const saveErrorBanner = state.saveError ? `
    <div class="card" style="border:2px solid var(--danger);">
      <h2 style="color:var(--danger);">⚠️ الحفظ فشل — السبب:</h2>
      <textarea readonly style="width:100%;min-height:120px;font-family:monospace;font-size:12.3px;direction:ltr;text-align:left;padding:8px;">${esc(state.saveError)}</textarea>
      <button class="savebtn" data-act="clear-save-error" style="margin-top:8px;">إخفاء</button>
    </div>` : '';
  if(state.successOrderId){
    return `
    <main>
      <div class="card success">
        <div class="ic">✓</div>
        <h2>${state.successMode==='updated' ? 'تم تحديث الطلب بنجاح' : 'تم إرسال الطلب بنجاح'}</h2>
        <p>هيتم مراجعة طلبك والتواصل معاك لتأكيد التنفيذ</p>
        <div class="ordid">#${esc(state.successOrderId)}</div>
        <!-- ✂️ بناءً على طلب صريح: المستندات بقت "عرض السعر" بس، بأيقوناته
             التلاتة (واتساب صورة / تنزيل PDF / معاينة). باقي المستندات
             (صورة الطلب العامة، أمر صرف المخزن، طلبية النواقص) اتشالت. -->
        <div class="docsection">
          <div class="docsectiontitle">📄 عرض السعر</div>
          <div class="iconbtnrow">
            ${state.quotePdfGenerating ? `
              <div class="loading" style="padding:10px 20px;">جارٍ التجهيز...</div>
            ` : state.quotePdfPlain ? `
              <button class="iconbtn" data-act="preview-quote-plain">👁️<span>معاينة</span></button>
              <button class="iconbtn" data-act="share-quote-plain">📤<span>واتساب</span></button>
              <button class="iconbtn" data-act="download-quote-plain">⬇️<span>تنزيل PDF</span></button>
            ` : `
              <div class="loading" style="padding:10px 20px;">جارٍ التجهيز...</div>
            `}
          </div>
        </div>

        <div class="docsection">
          <div class="docsectiontitle">📦 طلبية النواقص</div>
          <div class="iconbtnrow">
            <button class="iconbtn" data-act="shortage-img" data-group="kraft_new" ${state.shortageImgBusy==='last|kraft_new'?'disabled':''}>🖼️<span>${state.shortageImgBusy==='last|kraft_new'?'جارٍ...':'نواقص كرافت ونيو'}</span></button>
            <button class="iconbtn" data-act="shortage-img" data-group="combin_acc" ${state.shortageImgBusy==='last|combin_acc'?'disabled':''}>🖼️<span>${state.shortageImgBusy==='last|combin_acc'?'جارٍ...':'نواقص كومبن واكسسوارات'}</span></button>
          </div>
        </div>
        <br>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <button class="newbtn" data-act="edit-last-order">✏️ تعديل الطلب / إضافة أصناف</button>
          <button class="newbtn outline" data-act="new-order">تسجيل طلب جديد</button>
        </div>
      </div>
    </main>`;
  }

  // كل قطاع بلونه الخاص عشان يتميّز عن التاني بصريًا وهو مجمّع 4 في الصف
  const SECTOR_COLOR_CLASS_ = {
    'قطاعات PVC كومبن': 'sc-1',
    'قطاعات كرافت لاين': 'sc-2',
    'نيو لاين': 'sc-3',
    'اكسسوارات pvc اكسا': 'sc-4',
    'ابواب WPC': 'sc-5',
    'تصنيع': 'sc-6',
    'حشوات': 'sc-7',
    'اخري': 'sc-8'
  };
  const sectorChips = SECTOR_CHIPS.map(g=>`
    <button class="chip ${g===OTHER_SECTOR?'gold':(SECTOR_COLOR_CLASS_[g]||'')} ${state.mainGroup===g?'active':''}" data-act="set-group" data-val="${esc(g)}">${esc(g)}</button>
  `).join('');

  let subSection = '';
  let productSection = '';
  // مفاتيح الأصناف اللي عرضنالها صف مختصر (وحدة+كمية+سعر) تحتها في الشبكة
  // نفسها — لأن اللون كان اتحدد بالفعل من خطوة "اختار اللون" فوق، فمفيش
  // داعي نودّي الموزع لقسم "حدد التفاصيل" البعيد. أي صنف تاني (لسه محتاج
  // يختار لون بنفسه) بيفضل يظهر في قسم "حدد التفاصيل" العادي تحت.
  const inlineStagedKeys_ = [];
  if(state.mainGroup && state.mainGroup!==OTHER_SECTOR){
    const needsSub = sectorNeedsSubFilter(state.mainGroup);
    const colorsAvail = !needsSub ? colorsForMain(state.mainGroup) : [];
    let subToUse = null;
    if(needsSub){
      const subs = subGroupsForMain(state.mainGroup);
      if(subs.length>1){
        subSection = `
        <div class="card">
          <h2><span class="num">4</span>اختار التصنيف الفرعي</h2>
          <div class="chipwrap">
            ${subs.map(s=>`<button class="chip ${state.subGroup===s?'active':''}" data-act="set-sub" data-val="${esc(s)}">${esc(s)}</button>`).join('')}
          </div>
        </div>`;
      }
      subToUse = state.subGroup;
    } else if(colorsAvail.length){
      // خطوة "اختار اللون" — بتظهر بعد القطاع مباشرة لأي قطاع فيه ألوان حقيقية
      subSection = `
      <div class="card">
        <h2><span class="num">4</span>اختار اللون</h2>
        <div class="chipwrap chipgrid4">
          ${colorsAvail.map(c=>`<button class="chip ${state.selectedColor===c?'active':''}" data-act="set-color" data-val="${esc(c)}">${esc(c)}</button>`).join('')}
        </div>
      </div>`;
    }
    const colorToUse = colorsAvail.length ? state.selectedColor : null;
    const showProducts = needsSub ? !!subToUse : (colorsAvail.length ? !!colorToUse : true);
    if(showProducts){
      const prodMap = productsForGroup(state.mainGroup, subToUse);
      const q = state.productSearch.trim().toLowerCase();
      // ترتيب الأصناف رجع زي ما كان — بترتيب الكاتالوج الأصلي، من غير ترتيب حسب التوفر
      let names = [...prodMap.keys()].filter(n => !q || n.toLowerCase().includes(q));
      // لو دخلنا من خطوة "اختار اللون"، بنفلتر الأصناف على اللي فعلاً متاحة
      // باللون ده بس — عشان دي بالظبط اللي طلبها الموزع.
      if(colorToUse){
        names = names.filter(n => colorsForProduct(state.mainGroup, n).some(c=>c.color===colorToUse));
      }
      productSection = `
      <div class="card">
        <h2><span class="num">5</span>اختار الأصناف (تقدر تختار أكتر من واحد)</h2>
        <div class="searchbox">
          <input type="text" placeholder="ابحث عن اسم الصنف..." value="${esc(state.productSearch)}" data-act="search-product">
        </div>
        <div class="stocklegend">
          ${colorToUse ? `
          <span><i style="background:var(--success);"></i> متوفر</span>
          <span><i style="background:var(--gold);"></i> كمية قليلة</span>
          <span><i style="background:var(--danger);"></i> متاح اعواد</span>
          <span><i style="background:#000;"></i> مفيش رصيد خالص</span>
          <span><i style="background:#C9C5BA;"></i> موقوف</span>
          ` : `
          <span><i style="background:var(--success);"></i> متوفر</span>
          <span><i style="background:var(--danger);"></i> مفيش رصيد (السعر متاح)</span>
          <span><i style="background:#C9C5BA;"></i> موقوف</span>
          `}
        </div>
        <div class="productgrid ${state.mainGroup && state.mainGroup.includes('اكسسوارات') ? 'compact' : ''}">
          ${names.length ? names.map(n=>{
            const stagedEntry = state.staged.find(s=>s.key===stagedKey(state.mainGroup,n));
            const isStaged = !!stagedEntry;
            const inCart = state.cart.some(it=>it.main===state.mainGroup && it.product===n);
            const colorItem = colorToUse ? findCatalogItem(state.mainGroup, n, colorToUse) : null;
            const unavailable = colorToUse ? !!(colorItem && colorItem.available===false) : isProductFullyUnavailable(state.mainGroup, n);
            // ⚠️ في مخازن العاشر والمنصورة، ولو الداخل عميل، الرصيد مالوش
            // معنى — نوري الصنف عادي من غير أي تلوين أو لافتة "متوفر/مفيش
            // رصيد" خالص. "موقوف" من الأدمن يفضل يتطبق دايمًا مهما كان.
            const showStock = warehouseAffectsStock();
            // في وضع "اختار اللون" بنستخدم المستوى الحقيقي بتاع اللون ده بالظبط
            // (4 مستويات: مفيش رصيد خالص / اعواد / قليلة / متوفر) — نفس الألوان
            // والتصميم المستخدمين أصلاً في شرائح الألوان.
            const lvl = unavailable ? 'unavailable' : (showStock ? (colorToUse ? colorStockLevel(colorItem) : productStockLevel(state.mainGroup, n)) : 'ok');
            const stockClass = unavailable ? 'unavailable' : (showStock ? (
              colorToUse
                ? (lvl==='ok' ? 'instock' : lvl==='low' ? 'lowstock' : lvl==='crit' ? 'critstock' : 'blackstock')
                : (lvl==='ok' ? 'instock' : lvl==='crit' ? 'lowstock' : 'outstock')
            ) : '');
            const tile = `
            <div class="ptile ${isStaged?'selected':''} ${inCart?'incart':''} ${stockClass}" data-act="${unavailable?'noop-unavailable':'toggle-product'}" data-val="${esc(n)}">
              ${isStaged?'<span class="tick">✓</span>':''}
              <span>${esc(n)}</span>
              ${unavailable?'<span class="unavailtag">موقوف</span>':''}
              ${colorToUse ? `
                ${(showStock && !unavailable && lvl==='out')?'<span class="stocktag black">مفيش رصيد خالص</span>':''}
                ${(showStock && !unavailable && lvl==='crit')?'<span class="stocktag out">متاح اعواد</span>':''}
                ${(showStock && !unavailable && lvl==='low')?'<span class="stocktag low">كمية قليلة</span>':''}
                ${(showStock && !unavailable && lvl==='ok')?'<span class="stocktag in">متوفر</span>':''}
              ` : `
                ${(showStock && !unavailable && lvl==='out')?'<span class="stocktag out">مفيش رصيد</span>':''}
                ${(showStock && !unavailable && lvl==='crit')?`<span class="stocktag low">كمية قليلة: ${esc(lowStockColorsLabel(state.mainGroup, n) || '—')}</span>`:''}
                ${(showStock && !unavailable && lvl==='ok')?`<span class="stocktag in">متوفر: ${esc(availableColorsLabel(state.mainGroup, n) || '—')}</span>`:''}
              `}
            </div>`;
            // ⚠️ لو اللون اتحدد بالفعل من خطوة "اختار اللون" فوق (colorToUse)
            // وده الصنف ده كان متضاف بلونه، بنعرض صف مختصر (وحدة+كمية+سعر+
            // زرار إضافة) على طول تحت الصنف — من غير ما نبعته لقسم "حدد
            // التفاصيل" البعيد ولا نعيد سؤاله عن اللون تاني.
            let inlineRow = '';
            if(isStaged && colorToUse && stagedEntry.selectedColors.includes(colorToUse)){
              inlineRow = renderInlineQtyRow(stagedEntry, colorToUse);
              inlineStagedKeys_.push(stagedEntry.key);
            }
            return tile + inlineRow;
          }).join('') : '<div class="empty">مفيش نتائج بالاسم ده</div>'}
        </div>
      </div>`;
    }
  }

  let otherSection = '';
  if(state.mainGroup===OTHER_SECTOR){
    otherSection = `
    <div class="card">
      <h2><span class="num">3</span>صنف غير موجود بالقائمة</h2>
      <div class="field">
        <label>اسم الصنف اللي عايزه *</label>
        <input type="text" placeholder="اكتب اسم الصنف" value="${esc(state.otherName)}" data-act="set-othername">
      </div>
      <div class="field">
        <label>ملاحظات على الصنف</label>
        <textarea placeholder="أي تفاصيل عن الصنف (مقاس، خامة...)" data-act="set-othernote">${esc(state.otherNote)}</textarea>
      </div>
      <label>الوحدة</label>
      <div class="chipwrap" style="margin-bottom:14px;">
        ${unitOptionsForGroup(OTHER_SECTOR).map(u=>`
          <button class="chip ${state.otherUnit===u?'active':''}" data-act="set-otherunit" data-val="${esc(u)}">${esc(u)}</button>
        `).join('')}
      </div>
      <label>الكمية</label>
      <div class="qtystepper">
        <button data-act="other-qty-dec" type="button">−</button>
        <input type="number" min="1" value="${state.otherQty}" data-act="other-qty-input">
        <button data-act="other-qty-inc" type="button">+</button>
      </div>
      <div class="field" style="margin-top:12px;">
        <label>السعر (اختياري، لو عارفه)</label>
        <input type="number" min="0" placeholder="مثال: 150" value="${esc(state.otherPrice)}" data-act="set-otherprice">
      </div>
      <button class="addbtn" data-act="add-other">إضافة للسلة</button>
    </div>`;
  }

  // الأصناف اللي عرضنالها صف مختصر تحت الصنف نفسه (لون متحدد من فوق) مش
  // بتتكرر هنا — القسم ده بقى بس للأصناف اللي لسه محتاجة تختار لون بنفسها.
  const remainingStaged = state.staged.filter(s => !inlineStagedKeys_.includes(s.key));
  const stagedSection = remainingStaged.length ? `
    <div class="card">
      <h2><span class="num">6</span>حدد التفاصيل</h2>
      ${remainingStaged.map(renderStagedBlock).join('')}
    </div>` : '';

  const cartSection = `
    <div class="card">
      <h2><span class="num">7</span>الأصناف المطلوبة (${state.cart.length})</h2>
      ${renderCartItemsHtml(state.cart)}
    </div>`;

  // المخزن بقى أول خطوة — يظهر كإيقونات، ولحد ما الموزع يختار مخزن،
  // باقي الفورم (بيانات الموزع، القطاعات، الأصناف...) ما بيظهرش خالص.
  const warehouseCard = `
    <div class="card">
      <h2><span class="num">1</span>برجاء اختيار المخزن لسهولة توجيهه للمسؤول</h2>
      <div class="whgrid">
        ${WAREHOUSES.map(w=>`
          <button class="whtile ${state.warehouse===w?'active':''}" data-act="pick-warehouse-inline" data-val="${esc(w)}">
            <span class="whicon">${warehouseIcon_(w)}</span>
            <span>${esc(w)}</span>
          </button>
        `).join('')}
      </div>
    </div>`;

  // زرار للرجوع لأي طلب اتحفظ في السلة قبل كده — ظاهر أول حاجة في الفورم
  // عشان يبقى سهل الوصول، خصوصًا إن مفيش طريقة تانية غير الرسالة التلقائية
  // اللي بتظهر أول ما التطبيق يفتح بس.
  const openDraftBtn = `
    <div class="card" style="text-align:center;">
      <button class="newbtn outline" data-act="open-saved-draft">🛒 عندي طلب محفوظ في السلة — افتحه</button>
    </div>`;

  // العميل ميشوفش شاشة اختيار المخزن أصلاً — مالهاش معنى بالنسباله لأنه
  // مش بيشوف رصيد في أي مخزن.
  if(!state.warehouse && !isClientAccount()){
    return `<main>${warehouseCard}${openDraftBtn}</main>`;
  }

  const distSection = `
    <div class="card distcard">
      ${state.editingOrderId ? `<div class="editbanner">✏️ بتعدّل على طلب سابق #${esc(state.editingOrderId.toUpperCase())}</div>` : ''}
      ${isClientAccount() ? '' : `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:12px;color:var(--muted);">${warehouseIcon_(state.warehouse)} المخزن: <b style="color:var(--navy);">${esc(state.warehouse)}</b></span>
        <button class="chip" style="padding:3px 10px;font-size:11px;" data-act="pick-warehouse-inline" data-val="">غيّر</button>
      </div>`}
      <h2><span class="num">2</span>بيانات الموزع</h2>
      <div class="row3">

function isStandaloneMode(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function isIOSDevice(){
  const ua = navigator.userAgent || '';
  if(/iphone|ipad|ipod/i.test(ua)) return true;
  // ⚠️ iPad من iPadOS 13 وطالع بيقول عن نفسه "Macintosh" في الـ userAgent،
  // فكان بيفشل في الكشف ويظهرله زرار تثبيت أندرويد اللي مش بيشتغل على iOS خالص.
  // بنكشفه هنا من إن عنده لمس (الماك مالوش شاشة لمس).
  if(/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1) return true;
  return false;
}

// على iOS، "إضافة إلى الشاشة الرئيسية" شغالة في Safari بس.
// لو اليوزر فاتح اللينك من كروم أو فيسبوك أو واتساب، الخيار ده مش موجود عنده
// أصلاً — وده أكتر سبب بيخلي ناس الآيفون تقول "مش عارف أثبته".
// إشعار يدوي للموزع — بيفتح واتساب برسالة جاهزة. بيشتغل مع أي رقم من غير أي إعداد.
// نص رسالة تبليغ الموزع — مكان واحد بس عشان الرسالة النصية وصورة الإشعار
// يفضلوا متطابقين، ولو النص اتغير تاني نغيّره من هنا وبس.
function notifyMessageText_(ord){
  let msg = '✅ تم استلام الطلب الخاص بكم وجاري تنفيذه حسب المتاح بالمخزن وسيتم اعلامكم برساله بالمتاح\n';
  msg += 'نشكر صبركم\n';
  msg += 'رقم الطلب: #' + orderNoDisplay_(ord) + '\n';
  msg += 'الموزع: ' + (asText(ord.distName) || '-') + '\n';
  msg += 'المنطقة: ' + (asText(ord.distRegion) || '-') + '\n';
  msg += 'المخزن: ' + (asText(ord.warehouse) || '-') + '\n';
  msg += 'شكرًا لتعاملك مع القرشي لأبواب وشبابيك الـ UPVC';
  return msg;
}

function notifyDistributorManually(id){
  const ord = state.orders.find(o=>o.id===id);
  if(!ord) return;
  let msg = notifyMessageText_(ord);
  // ⚠️ من غير رقم متحدد — الرسالة بتفتح واتساب فاضي عشان الأدمن يختار
  // المستلم بنفسه (زي الجروب الخاص) بدل ما تتبعت لرقم الموزع تلقائيًا.
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

// أرقام مصر: بنحوّل 01xxxxxxxxx لصيغة دولية 201xxxxxxxxx
function normalizePhoneIntl_(p){
  let d = asText(p).replace(/\D/g,'');
  if(!d) return '';
  if(d.startsWith('20')) return d;
  if(d.startsWith('0')) return '20' + d.slice(1);
  if(d.startsWith('1')) return '20' + d;
  return d;
}

// الموزع بيبعت الطلب كـ"صورة" ويختار بنفسه هيبعتها لمين (جروب / شخص).
// مفيش رقم محدد — بنفتح شاشة المشاركة بتاعة الموبايل وهو يختار.
//
// ⚠️ قيد مهم: navigator.share لازم يتنده في نفس لحظة الضغطة. لو استنينا الصورة
// تتولد الأول (بتاخد ثانية أو اتنين)، المتصفح بيعتبر إن الضغطة ضاعت وبيلغي
// المشاركة. عشان كده فصلناها خطوتين: "جهّز الصورة" الأول، وبعدين "ابعت".
async function prepareOrderImage(){
  const o = state.lastOrder;
  if(!o){ showToast('مفيش طلب'); return; }
  state.orderImgPreparing = true; render();
  try{
    const res = await buildQuotePDF(o);
    state.orderImage = (res && res.imgBlob) ? res : null;
    if(!state.orderImage) showToast('تعذّر تجهيز الصورة، حاول تاني');
  }catch(e){
    state.orderImage = null;
    showToast('تعذّر تجهيز الصورة: ' + (e && e.message ? e.message : e));
  }
  state.orderImgPreparing = false;
  render();
}

async function shareOrderImage(){
  const q = state.orderImage;
  if(!q || !q.imgBlob){ showToast('جهّز الصورة الأول'); return; }
  const o = state.lastOrder;
  const name = 'طلب_' + String(o ? o.id : 'order').toUpperCase();
  try{
    const img = new File([q.imgBlob], name + '.png', {type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[img]})){
      // مفيش رقم — شاشة المشاركة هتفتح وهو يختار الجروب أو الشخص
      await navigator.share({ files:[img], title:'طلبية', text:'طلب #' + (o ? orderNoDisplay_(o) : '') });
      state.orderSentToWa = true;
      render();
      return;
    }
  }catch(e){
    // المستخدم لغى المشاركة — مش خطأ
    if(e && e.name === 'AbortError') return;
  }
  // احتياطي: ننزّل الصورة وهو يرفعها بإيده
  downloadBlob(q.imgBlob, name + '.png');
  showToast('اتحملت الصورة — افتح واتساب وابعتها من المعرض');
  state.orderSentToWa = true;
  render();
}

// تحديث إجباري: بيمسح كل الكاش ويلغي الـ Service Worker ويعيد التحميل من السيرفر.
// بيحل حالة إن الموبايل عالق على نسخة قديمة.
async function forceUpdate(){
  showToast('جارٍ التحديث... استنى لحظة');
  try{
    if('caches' in window){
      const keys = await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
  }catch(e){}
  try{
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
  }catch(e){}
  // نضيف بارامتر عشوائي عشان نتخطى كاش المتصفح نفسه
  const u = new URL(window.location.href);
  u.searchParams.set('v', Date.now());
  window.location.replace(u.toString());
}

async function copyAppLink(){
  try{
    await navigator.clipboard.writeText(APP_URL);
    showToast('اتنسخ ✅ افتح Safari والصقه');
  }catch(e){
    showToast(APP_URL);
  }
}

function isIOSSafari(){
  if(!isIOSDevice()) return false;
  const ua = navigator.userAgent || '';
  // كروم على iOS فيه CriOS، فايرفوكس FxiOS، إيدج EdgiOS، وتطبيقات جوه (واتساب/فيسبوك) فيها FBAN/FBAV/Instagram
  if(/CriOS|FxiOS|EdgiOS|OPiOS|FBAN|FBAV|Instagram|Line|Twitter/i.test(ua)) return false;
  return /Safari/i.test(ua);
}

// ===== main render =====
// كل مرة بنعمل render بنعيد بناء الصفحة كلها (innerHTML) — وده كان بيضيّع
// مكان التمرير، فالشاشة ترجع لفوق (لأول صنف) في كل مرة تختار صنف.
// هنا بنحفظ مكان التمرير والحقل اللي إيدك فيه، وبنرجّعهم بعد إعادة البناء.
let lastViewKey = '';

// "مرساة" التمرير: بنحفظ العنصر اللي إيدك عليه ومكانه على الشاشة، وبعد إعادة
// البناء بنلاقيه تاني ونظبط التمرير عشان يفضل في نفس المكان بالظبط.
//
// ⚠️ حفظ scrollY لوحده مكانش كفاية: لما تختار صنف، بلوك "حدد التفاصيل" بيتحط
// *فوق* الشبكة، فالمحتوى بيتزحلق لتحت والصنف اللي دوست عليه بيروح من تحت إيدك
// حتى لو التمرير رجع لنفس الرقم. فبنمسك العنصر نفسه مش الرقم.
let scrollAnchor_ = null;

function currentScroll_(){
  return window.scrollY || window.pageYOffset ||
         (document.scrollingElement ? document.scrollingElement.scrollTop : 0) || 0;
}
function scrollTo_(y){
  try{ window.scrollTo(0, y); }catch(e){}
  try{ if(document.scrollingElement) document.scrollingElement.scrollTop = y; }catch(e){}
}

function selectorFor_(el){
  if(!el || !el.dataset || !el.dataset.act) return '';
  let sel = `[data-act="${el.dataset.act}"]`;
  const k = el.getAttribute('data-key');
  const v = el.getAttribute('data-val');
  if(k) sel += `[data-key="${CSS.escape ? CSS.escape(k) : k}"]`;
  if(v) sel += `[data-val="${CSS.escape ? CSS.escape(v) : v}"]`;
  return sel;
}

// بتتنده من onAction قبل ما نغيّر أي حاجة
function setScrollAnchor(el){
  try{
    const sel = selectorFor_(el);
    if(!sel) { scrollAnchor_ = null; return; }
    scrollAnchor_ = { sel, top: el.getBoundingClientRect().top };
  }catch(e){ scrollAnchor_ = null; }
}

function captureUiState_(){
  const el = document.activeElement;
  let focus = null;
  if(el && el.dataset && el.dataset.act && (el.tagName==='INPUT' || el.tagName==='TEXTAREA')){
    focus = {
      sel: selectorFor_(el),
      start: el.selectionStart,
      end: el.selectionEnd
    };
  }
  return { scrollY: currentScroll_(), focus, anchor: scrollAnchor_ };
}

// ⚠️ كان فيه هنا نظام "مرساة" بيحاول يتتبّع العنصر المضغوط بالاسم ويعوّض
// أي فرق في مكانه بعد الرسم. ده كان بيتعارض مع تثبيت الارتفاع على body
// (اللي بيحل نفس المشكلة أصلاً بطريقة أبسط وأضمن) ومع تثبيت تمرير الشبكة
// الداخلية لوحدها — والتعارض ده هو اللي كان بيسبب قفزة لفوق لما تختار صنف.
// شلنا المرساة خالص وسيبنا حاجتين بس: رجّع نفس رقم التمرير بالظبط، ورجّع
// تمرير الشبكة الداخلية لوحدها (captureGridScroll_/restoreGridScroll_).
// بيحفظ مكان عنصر معيّن على الشاشة (بالـselector بتاعه، مش بمرجع العنصر
// نفسه، عشان العنصر بيتبني من جديد مع كل render) وبيرجّعه لنفس المكان
// بعد أي تغيير — مهما كان السبب في التغيير ده (إضافة/شيل تفاصيل، تغيير
// حالة، ...). أدق بكتير من مسك التمرير كرقم مجرد أو مسك حاوية كبيرة.
function withPositionAnchor_(selector, mutateAndRenderFn){
  let beforeTop = null;
  try{
    const el = document.querySelector(selector);
    if(el) beforeTop = el.getBoundingClientRect().top;
  }catch(e){}

  mutateAndRenderFn();

  if(beforeTop === null) return;
  const applyFix = ()=>{
    try{
      const el2 = document.querySelector(selector);
      if(!el2) return;
      const delta = el2.getBoundingClientRect().top - beforeTop;
      if(Math.abs(delta) > 1) window.scrollBy(0, delta);
    }catch(e){}
  };
  applyFix();
  requestAnimationFrame(applyFix);
}

function restoreUiState_(snap, sameScreen){
  if(!snap) return;
  if(sameScreen && Math.abs(currentScroll_() - snap.scrollY) > 0.5){
    scrollTo_(snap.scrollY);
  }
  const f = snap.focus;
  if(f && f.sel){
    const el = document.querySelector(f.sel);
    if(el && (el.tagName==='INPUT' || el.tagName==='TEXTAREA')){
      // ⚠️ el.focus() العادي بيخلي المتصفح يسحب الصفحة عشان يوريك الحقل —
      // preventScroll بيرجّع التركيز من غير ما يحرّك الصفحة.
      try{ el.focus({ preventScroll: true }); }catch(e){ el.focus(); }
      try{ el.setSelectionRange(f.start, f.end); }catch(e){}
    }
  }
  if(sameScreen){
    requestAnimationFrame(()=>{
      if(Math.abs(currentScroll_() - snap.scrollY) > 1) scrollTo_(snap.scrollY);
    });
  }
  scrollAnchor_ = null;
}

// 🔑 اللقطة الناقصة: ".productgrid" (شبكة الأصناف) عندها overflow-y:auto
// وscroll خاص بيها لوحدها (مش صفحة المتصفح). كل render بيستبدل الـ innerHTML
// بتاعها بالكامل، فالعنصر القديم بتمريره بيتمسح ويتحط عنصر جديد scrollTop=0 —
// فلو الموزع نازل جوه الشبكة ودوس على صنف تحت، الشبكة "تقفز" لفوق فورًا حتى
// لو صفحة المتصفح نفسها ثابتة. ده كان السبب الحقيقي الباقي وراء القفزات.
function captureGridScroll_(){
  const el = document.querySelector('.productgrid');
  return el ? el.scrollTop : null;
}
function restoreGridScroll_(val){
  if(val === null) return;
  const el = document.querySelector('.productgrid');
  if(el) el.scrollTop = val;
}

// عشان الموزع لما يختار صنف جديد (مش شايله قبل كده) ميحتاجش يدور بنفسه على
// كارت "حدد التفاصيل" اللي ممكن يكون بعيد أوي تحت شبكة الأصناف الطويلة —
// بندزّه (scroll) تلقائيًا لبلوك تفاصيل الصنف ده أول ما يتضاف، مع ترك مسافة
// من فوق عشان الهيدر الثابت ميغطيش أول سطر منه.
function scrollToStagedDetail_(key){
  requestAnimationFrame(()=>{
    const el = document.querySelector(`[data-stagedkey="${CSS.escape(key)}"]`);
    if(!el) return;
    const head = document.querySelector('.fixedhead-outer');
    const headH = head ? head.offsetHeight : 0;
    const rect = el.getBoundingClientRect();
    const targetY = window.scrollY + rect.top - headH - 12;
    window.scrollTo({ top: Math.max(0, targetY), behavior: 'smooth' });
  });
}

function applyFixedHeaderSpacing_(){
  // ⚠️ سطر "نسخة vNN" كان بيروح تحت الهيدر الثابت ويختفي، لأنه أول عنصر
  // جاي في ترتيب الصفحة بعد الهيدر مباشرة — والهيدر الثابت مابياخدش مكانه
  // في الترتيب العادي، فالسطر ده كان بيترسم فوق الصفحة تمامًا (تحت الهيدر).
  // بندفعه هو كمان بنفس ارتفاع الهيدر، وبعده أول عنصر تاني (بانر أو main).
  const head = document.querySelector('.fixedhead-outer');
  const h = head ? head.offsetHeight : 0;
  const version = document.querySelector('#app > .versionline');
  if(version) version.style.marginTop = head ? h + 'px' : '';
  const target = document.querySelector('#app > .installbanner') || document.querySelector('#app > main');
  if(target) target.style.marginTop = '';
}

function render(){
  const app = $('#app');
  const snap = captureUiState_();
  const gridScroll = captureGridScroll_();

  // 🔑 السبب الرئيسي للقفز على مستوى الصفحة: وقت استبدال innerHTML الصفحة
  // بتفضى للحظة، فارتفاعها بيقل، والمتصفح بيقصقص مكان التمرير لأقصى حد متاح.
  // ⚠️ #app عليه min-height:100vh أصلاً، فقفل الارتفاع عليه مبيعملش حاجة —
  // القفل لازم يكون على <body> نفسه (هو صندوق التمرير الفعلي).
  const prevH = document.body.offsetHeight;
  if(prevH) document.body.style.minHeight = prevH + 'px';
  const unlock = ()=>{ try{ document.body.style.minHeight=''; }catch(e){} };

  try{
    if(!isStandaloneMode() && !state.installGateBypassed){
      app.innerHTML = renderInstallGate();
      bindEvents();
      unlock();
      return;
    }
    if(!state.currentUser){
      app.innerHTML = renderAuthView();
      bindEvents();
      unlock();
      return;
    }
    let view;
    if(state.view==='order') view = renderOrderView();
    else if(state.view==='myorders') view = renderMyOrdersView();
    else view = renderAdminView();
    const banner = state.showInstallBanner ? renderInstallBanner() : '';
    app.innerHTML = renderHeader() + banner + view + renderPreviewModal() + renderDiagModal() + renderNotifyPrompt() + renderWarehouseModal() + renderStockModal() + renderPwRequestsModal() + renderCartReviewModal() + renderGlobalError();
    bindEvents();
    applyFixedHeaderSpacing_();

    // نرجّع التمرير بس لو إحنا في نفس الشاشة (مش لما ننتقل من شاشة لشاشة)
    const viewKey = state.view + '|' + (state.successOrderId ? 'success' : '') + '|' + (state.adminUnlocked ? 'a' : '');
    restoreUiState_(snap, viewKey === lastViewKey);
    restoreGridScroll_(gridScroll);
    lastViewKey = viewKey;
    requestAnimationFrame(()=>{ unlock(); restoreGridScroll_(gridScroll); });
  }catch(err){
    // لو أي جزء من الشاشة فشل يترندر، مانسيبش الشاشة "هنجانة" بصمت — نوريّ رسالة
    // واضحة بدل ما تفضل واقفة من غير أي تفسير.
    console.error('render() failed:', err);
    unlock();
    try{ showToast('⚠️ حصل خطأ في عرض الشاشة: ' + (err && err.message ? err.message : err)); }catch(e){}
  }
}

  else if(state.authView==='register') inner = renderRegisterForm();
  else if(state.authView==='forgot') inner = renderForgotForm();
  else inner = renderLoginForm();

  <div class="authwrap">
    <div class="authcard" style="text-align:right;">
      <img class="authlogo" src="data:image/jpeg;base64,${LOGO_B64}" alt="القرشي">

      <div class="authsub">بوابة طلبات الموزعين</div>
      ${inner}
    </div>
  </div>`;
}

// ===== events =====
function bindEvents(){
  // خانة الخصم المخصص — بتحدّث بـ blur بس عشان مانضيعش الـ focus أثناء الكتابة
  const extraDiscEl = document.querySelector('[data-extradiscount]');
  if(extraDiscEl){
    extraDiscEl.addEventListener('blur', ()=>{
      const pct = parseFloat(extraDiscEl.value);
      state.extraDiscount = (!isNaN(pct) && pct>=0 && pct<=100) ? pct : 0;
      render();
    });
    extraDiscEl.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ extraDiscEl.blur(); }
    });
  }

  document.querySelectorAll('[data-act]').forEach(el=>{
    const act = el.getAttribute('data-act');
    if(el.tagName==='INPUT' || el.tagName==='TEXTAREA'){
      el.addEventListener('input', e=>onInputChange(act, e.target, e.target.value));
      el.addEventListener('keydown', e=>{
        if(e.key==='Enter' && act==='pin-input'){ onAction('pin-submit', el); }
        if(e.key==='Enter' && act==='auth-password'){ onAction('login-submit', el); }
        if(e.key==='Enter' && act==='forgot-username'){ onAction('forgot-submit', el); }
      });
      // خانات الأرقام: أول ما الموزع يدوس/يقف فيها، القيمة الحالية تتحدد
      // كلها تلقائيًا — عشان أي رقم جديد يكتبه يمسح القديم بدل ما يتلزق جنبه
      // (زي مشكلة كتابة "0" وهي بتتلزق مع الرقم القديم بدل ما تحل مكانه).
      if(el.type==='number' || act==='staged-qty-input'){
        el.addEventListener('focus', ()=>{ try{ el.select(); }catch(err){} });
      }
      // خانات الكمية: بنسيب الموزع يمسح الخانة أو يكتب "0" وهو لسه بيكتب من
      // غير ما نرجّعها 1 فورًا (وده كان بيبان وكأن الرقم "بيختفي") — وبس لما
      // يسيب الخانة (blur) بنتأكد إن القيمة مش أقل من 1.
      if(act==='other-qty-input'){
        el.addEventListener('blur', ()=>{
          if(!state.otherQty || state.otherQty<1){ state.otherQty=1; render(); }
        });
      }
      if(act==='staged-qty-input'){
        el.addEventListener('blur', ()=>{
          const key = el.getAttribute('data-key'), color = el.getAttribute('data-val');
          const s = state.staged.find(x=>x.key===key);
          if(s && (!s.qtys[color] || s.qtys[color]<1)){ s.qtys[color]=1; render(); }
        });
      }
    } else if(el.tagName==='SELECT'){
      el.addEventListener('change', e=>onSelectChange(act, el, e.target.value));
    } else {
      el.addEventListener('click', e=>{ setScrollAnchor(el); onAction(act, el); });
    }
  });
}

function onSelectChange(act, el, val){
  if(act==='set-color-unit'){
    setStagedColorUnit(el.getAttribute('data-key'), el.getAttribute('data-val'), val);
  }
}

function onInputChange(act, el, val){
  const activeAct = el.getAttribute('data-act');
  const activeKey = el.getAttribute('data-key');
  const activeVal = el.getAttribute('data-val');
  const selStart = el.selectionStart, selEnd = el.selectionEnd;

  switch(act){
    case 'search-product': state.productSearch = val; break;
    case 'set-distname': state.distName = val; autoSaveDraft(); saveProfile(); break;
    case 'set-distregion': state.distRegion = val; autoSaveDraft(); saveProfile(); break;
    case 'set-distphone': state.distPhone = val; autoSaveDraft(); saveProfile(); break;
    case 'set-note': state.note = val; autoSaveDraft(); break;
    case 'set-othername': state.otherName = val; break;
    case 'set-othernote': state.otherNote = val; break;
    case 'set-otherprice': state.otherPrice = val; break;
    case 'other-qty-input': {
      const n = parseInt(val);
      state.otherQty = val==='' ? 0 : (isFinite(n) ? Math.max(0, n) : 0);
      break;
    }
    case 'staged-qty-input': {
      const s = state.staged.find(x=>x.key===activeKey);
      if(s){
        const digitsOnly = val.replace(/[^0-9]/g,'');
        const n = parseInt(digitsOnly);
        s.qtys[activeVal] = digitsOnly==='' ? 0 : (isFinite(n) ? Math.max(0, n) : 0);
      }
      break;
    }
    case 'pin-input': state.pinInput = val.replace(/[^0-9]/g,''); state.pinError=false; break;
    case 'admin-search': state.adminFilter = val; break;
    case 'myorders-phone': state.myOrdersPhone = val; break;
    case 'auth-username': state.authUsername = val; state.authError=''; break;
    case 'auth-password': state.authPassword = val; state.authError=''; break;
    case 'auth-password2': state.authPassword2 = val; state.authError=''; break;
    case 'reg-distname': state.regDistName = val; break;
    case 'reg-distregion': state.regDistRegion = val; break;
    case 'reg-distphone': state.regDistPhone = val; break;
    case 'forgot-username': state.forgotUsername = val; state.authError=''; break;
    case 'forgot-newpass': state.forgotNewPassword = val; state.authError=''; break;
    case 'forgot-newpass2': state.forgotNewPassword2 = val; state.authError=''; break;
  }
  const scrollY = window.scrollY;
  render();
  window.scrollTo(0, scrollY);
  const again = document.querySelector(activeKey ? `[data-act="${activeAct}"][data-key="${activeKey}"][data-val="${activeVal}"]` : `[data-act="${activeAct}"]`);
  if(again && (again.tagName==='INPUT'||again.tagName==='TEXTAREA')){
    again.focus({preventScroll:true});
    if(selStart!=null && again.setSelectionRange){ try{ again.setSelectionRange(selStart, selEnd); }catch(e){} }
    window.scrollTo(0, scrollY);
  }
}

async function onAction(act, el){
  try{
    await onActionInner(act, el);
  }catch(err){
    // أي خطأ في أي زرار كان بيضيع بصمت (الزرار ميعملش حاجة خالص).
    // دلوقتي بيظهر في الصندوق الأحمر بالسبب الكامل.
    showFatalError('الزرار: ' + act + '\n' + (err && err.stack ? err.stack : String(err)));
  }
}

function showFatalError(msg){
  state.saveError = String(msg).slice(0, 900);
  try{ render(); }catch(e){
    // لو حتى render مكسور، نعرض الخطأ مباشرة في الصفحة
    const d = document.createElement('div');
    d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#fff;color:#900;padding:16px;font:12px monospace;direction:ltr;text-align:left;overflow:auto;white-space:pre-wrap;';
    d.textContent = msg;
    document.body.appendChild(d);
  }
}

// أي خطأ في أي مكان في التطبيق (حتى برّه الزراير) يظهر بدل ما يختفي
window.addEventListener('error', e=>{
  showFatalError('خطأ عام:\n' + (e.error && e.error.stack ? e.error.stack : e.message));
});
window.addEventListener('unhandledrejection', e=>{
  const r = e.reason;
  showFatalError('خطأ غير معالج:\n' + (r && r.stack ? r.stack : String(r)));
});

async function onActionInner(act, el){
  switch(act){
    case 'goto-login': state.authView='login'; state.authError=''; render(); break;
    case 'goto-register': state.authView='register'; state.authError=''; render(); break;
    case 'goto-forgot': state.authView='forgot'; state.authError=''; state.forgotSent=false; render(); break;
    case 'login-submit': await submitLogin(); break;
    case 'biometric-unlock': await unlockWithBiometric(); break;
    case 'use-password-login': state.showBiometricGate=false; render(); break;
    case 'enable-biometric': await enableBiometricLogin(); break;
    case 'disable-biometric': disableBiometricLogin(); break;
    case 'register-submit': await submitRegister(); break;
    case 'pick-warehouse':
      state.warehouse = el.getAttribute('data-val');
      state.showWarehouseModal = false;
      // اختار المخزن → نكمّل على تأكيد الإرسال على طول
      requestSubmit();
      break;
    case 'pick-warehouse-inline':{
      // ⚠️ ده الزرار بتاع خطوة "هتحمّل من أنهي مخزن؟" الأولى في الفورم —
      // كان الـ case بتاعه ناقص خالص، فالزرار كان بيبان بس مبيعملش حاجة
      // لما تدوس عليه (مفيش أي "action" مربوط بيه في التبديلة دي).
      const v = el.getAttribute('data-val');
      state.warehouse = v || '';
      render();
      break;
    }
    case 'close-warehouse': state.showWarehouseModal=false; render(); break;
    case 'show-stock': state.showStock=true; state.stockSearch=''; render(); break;
    case 'show-pwreq': await loadPwRequests(); break;
    case 'close-pwreq': state.showPwRequests=false; render(); break;
    case 'approve-pwreq': await decidePwRequest(el.getAttribute('data-val'), true); break;
    case 'reject-pwreq': await decidePwRequest(el.getAttribute('data-val'), false); break;
    case 'close-stock': state.showStock=false; render(); break;
    case 'stock-search': state.stockSearch = el.value; render(); break;
    case 'export-stock-pdf': await exportStockPDF(); break;
    case 'change-warehouse':
      state.showConfirmModal = false;
      state.showWarehouseModal = true;
      render();
      break;
    case 'reg-type-dist': state.regDistType='موزع'; render(); break;
    case 'reg-type-client': state.regDistType='عميل'; render(); break;
    case 'forgot-submit': await submitForgot(); break;
    case 'logout':
      state.currentUser = null;
      setAdminToken('');
      state.adminUnlocked = false;
      try{ sessionStorage.removeItem(LS_USER_KEY); }catch(e){}
      state.authView='login'; state.authUsername=''; state.authPassword='';
      state.showBiometricGate = isBiometricEnabledForThisDevice();
      render();
      break;
    case 'goto':{
      const v = el.getAttribute('data-view');
      state.view = v; render();
      if(v==='admin' && state.adminUnlocked) loadOrders();
      if(v==='myorders' && !state.myOrdersSearched && getSavedOrderRefs().length) refreshMyOrders();
      break;
    }
    case 'set-group':{
      state.mainGroup = el.getAttribute('data-val');
      state.productSearch='';
      state.selectedColor = null;
      if(sectorNeedsSubFilter(state.mainGroup)){
        const subs = subGroupsForMain(state.mainGroup);
        state.subGroup = subs.length===1 ? subs[0] : null;
      } else {
        state.subGroup = null;
      }
      render();
      break;
    }
    case 'set-sub':
      state.subGroup = el.getAttribute('data-val');
      render();
      break;
    case 'set-color':
      state.selectedColor = el.getAttribute('data-val');
      render();
      break;
    case 'toggle-product':{
      const name = el.getAttribute('data-val');
      const key = stagedKey(state.mainGroup, name);
      const wasStaged = state.staged.some(x=>x.key===key);
      // بنمسك مكان الصنف اللي دوس عليه بالظبط، وبعد ما الألوان تتفتح تحته
      // ويحصل أي تحريك للأصناف التانية، برجّعه لنفس المكان على الشاشة —
      // فيفضل شايفه هو والصنف اللي بعده من غير ما الشاشة "تنط".
      withPositionAnchor_(`[data-act="toggle-product"][data-val="${CSS.escape(name)}"]`, ()=>{
        toggleStagedProduct(state.mainGroup, name);
        // لو دخلنا من خطوة "اختار اللون"، اللون ده يتاختار تلقائيًا جوه
        // تفاصيل الصنف عشان الموزع ميحتاجش يدوس عليه تاني بيده.
        if(state.selectedColor){
          const s = state.staged.find(x=>x.key===key);
          if(s && s.colorRequired && s.availableColors.includes(state.selectedColor) && !s.selectedColors.includes(state.selectedColor)){
            toggleStagedColor(key, state.selectedColor);
          }
        }
      });
      // ⚠️ لو الصنف ده جديد (مكانش شايله قبل كده)، دلوقتي هو مضاف لقسم
      // "حدد التفاصيل" البعيد تحت — بنودّي الموزع لهناك تلقائيًا عشان
      // ميحسش إن حاجة ماحصلتش. لو كان بيلغي صنف كان شايله، مش محتاجين نودّيه.
      // ⚠️ لو اللون متحدد بالفعل من فوق (state.selectedColor)، الصنف هيظهر
      // كصف مختصر تحت التايل نفسه على طول (مش في قسم بعيد)، فمفيش داعي
      // نعمل سكرول — هو أصلاً في مكانه قدام عين الموزع.
      if(!wasStaged && !state.selectedColor) scrollToStagedDetail_(key);
      break;
    }
    case 'noop-unavailable': showToast('الصنف ده غير متوفر حاليًا'); break;
    case 'toggle-color': toggleStagedColor(el.getAttribute('data-key'), el.getAttribute('data-val')); break;
    case 'set-staged-unit': setStagedUnit(el.getAttribute('data-key'), el.getAttribute('data-val')); break;
    case 'staged-qty-dec':{
      const s = state.staged.find(x=>x.key===el.getAttribute('data-key'));
      const c = el.getAttribute('data-val');
      if(s) setStagedQty(s.key, c, (s.qtys[c]||1)-1);
      break;
    }
    case 'staged-qty-inc':{
      const s = state.staged.find(x=>x.key===el.getAttribute('data-key'));
      const c = el.getAttribute('data-val');
      if(s) setStagedQty(s.key, c, (s.qtys[c]||1)+1);
      break;
    }
    case 'confirm-staged': confirmStaged(el.getAttribute('data-key')); break;
    case 'cancel-staged': cancelStaged(el.getAttribute('data-key')); break;
    case 'del-cart': removeFromCart(parseInt(el.getAttribute('data-idx'))); break;
    case 'edit-cart-item':{
      const main = el.getAttribute('data-main'), product = el.getAttribute('data-product');
      toggleStagedProduct(main, product);
      const scrollTarget = document.querySelector('.stagedblock');
      if(scrollTarget) scrollTarget.scrollIntoView({behavior:'smooth', block:'center'});
      break;
    }

    case 'set-otherunit': state.otherUnit = el.getAttribute('data-val'); render(); break;
    case 'other-qty-dec': state.otherQty = Math.max(1, state.otherQty-1); render(); break;
    case 'other-qty-inc': state.otherQty = state.otherQty+1; render(); break;
    case 'add-other': addOtherItem(); break;

    case 'request-submit': requestSubmit(); break;
    case 'toggle-discount': state.discountVisible = !state.discountVisible; render(); break;
    // set-extra-discount: handled via blur in bindEvents
    case 'open-cart-review': if(state.pendingDraft && !state.cart.length){ resumeDraft(); state.showResumeModal=false; } state.showCartReview=true; render(); break;
    case 'close-cart-review': state.showCartReview=false; render(); break;
    case 'cart-add-more': state.showCartReview=false; render(); break;
    case 'edit-last-order':{
      const lo = state.lastOrder;
      if(lo){ startEditOrder(lo); }
      else { showToast('مفيش طلب متاح للتعديل'); }
      break;
    }
    case 'cart-send':
      state.showCartReview=false;
      requestSubmit(); // نفس مسار "إرسال الطلب" العادي: تأكيد ثم إرسال فعلي
      break;
    case 'save-draft': saveDraft(); break;
    case 'preview-cart-invoice': previewCartInvoice(); break;
    case 'continue-daily': proceedAfterDailyWarning(); break;
    case 'goto-myorders-from-warning':
      state.showDailyWarning = false;
      state.view = 'myorders';
      render();
      if(!state.myOrdersSearched) refreshMyOrders();
      break;
    case 'close-confirm': state.showConfirmModal=false; render(); break;
    case 'do-submit': actuallySubmit(); break;
    case 'resume-draft': resumeDraft(); break;
    case 'discard-draft': discardDraftAndStartFresh(); break;
    case 'open-saved-draft': openSavedDraftManually(); break;

    case 'new-order': resetOrderForm(); break;
    case 'share-quote-plain':
      if(!state.quotePdfPlain){ await generateBothQuotes(state.lastOrder); }
      if(state.quotePdfPlain) shareQuotePDF();
      break;
    case 'download-quote-plain':
      if(!state.quotePdfPlain){ await generateBothQuotes(state.lastOrder); }
      if(state.quotePdfPlain) downloadQuote();
      break;
    case 'preview-quote-plain':
      if(!state.quotePdfPlain){ await generateBothQuotes(state.lastOrder); }
      if(state.quotePdfPlain) previewPdfBlob(state.quotePdfPlain, 'عرض_سعر_' + (state.successOrderId||'order') + '.pdf');
      break;
    case 'share-shortage': shareShortagePDF(); break;
    case 'download-shortage': downloadShortage(); break;
    case 'preview-shortage': previewPdfBlob(state.shortagePdf, 'طلبية_نواقص_' + (state.successOrderId||'order') + '.pdf'); break;
    case 'close-preview': closePreviewModal(); break;
    case 'download-preview': downloadPreviewModal(); break;
    case 'share-preview': sharePreviewModal(); break;
    case 'shortage-img':
      handleShortageImage(el.getAttribute('data-id') || null, el.getAttribute('data-group'));
      break;
    case 'make-docs': if(state.lastOrder) generateBothQuotes(state.lastOrder); break;
    case 'clear-save-error': state.saveError=''; render(); break;
    case 'notify-dist': notifyDistributorManually(el.getAttribute('data-id')); break;
    case 'do-notify-dist':{
      const nid = state.notifyPromptId;
      state.notifyPromptId = null;
      notifyDistributorManually(nid);
      render();
      break;
    }
    case 'skip-notify': state.notifyPromptId=null; render(); break;
    case 'prepare-order-img': await prepareOrderImage(); break;
    case 'prepare-wh-img': await prepareWarehouseImages(); break;
    case 'share-wh-img': await shareWarehouseImages(); break;
    case 'send-order-wa': await shareOrderImage(); break;
    case 'force-update': await forceUpdate(); break;
    case 'copy-app-link': copyAppLink(); break;
    case 'run-diag': runDiagnostics(); break;
    case 'close-diag': state.showDiag=false; render(); break;
    case 'noop': break;

    case 'myorders-search': searchMyOrdersByPhone(); break;
    case 'myorders-refresh': refreshMyOrders(); break;
    case 'edit-order':{
      const id = el.getAttribute('data-id');
      const ord = state.myOrders.find(o=>o.id===id) || state.orders.find(o=>o.id===id);
      if(ord) startEditOrder(ord);
      break;
    }

    case 'pin-submit':
      await submitAdminPin();
      break;
    case 'toggle-status':{
      const id = el.getAttribute('data-id');
      const ord = state.orders.find(o=>o.id===id);
      if(!ord) break;
      updateOrderStatus(id, nextStatus_(ord.status));
      break;
    }
    case 'delete-order':{
      const id = el.getAttribute('data-id');
      if(confirm('متأكد إنك عايز تحذف الطلب ده نهائيًا؟')) deleteOrder(id);
      break;
    }
    case 'preview-order-pdf':{
      const id = el.getAttribute('data-id');
      if(!state.adminPdfGeneratingId) handleOrderPDF(id, 'preview');
      break;
    }
    case 'preview-myorder-pdf':{
      const id = el.getAttribute('data-id');
      if(!state.adminPdfGeneratingId) previewMyOrderPDF(id);
      break;
    }
    case 'download-order-pdf':{
      const id = el.getAttribute('data-id');
      if(!state.adminPdfGeneratingId) handleOrderPDF(id, 'download');
      break;
    }
    case 'delete-delivered':
      if(confirm('هيتم حذف كل الطلبات "' + STATUS_DONE + '" نهائيًا. متأكد؟')) deleteDeliveredOrders();
      break;
    case 'admin-status': state.adminStatusFilter = el.getAttribute('data-val'); render(); break;
    case 'export-excel-pending': exportExcel(STATUS_PENDING); break;
    case 'export-excel-received': exportExcel(STATUS_RECEIVED); break;
    case 'export-excel-delivered': exportExcel(STATUS_DONE); break;
    case 'refresh-orders': loadOrders(); showToast('جارٍ التحديث...'); break;
    case 'install-app': installApp(); break;
    case 'dismiss-install': dismissInstallBanner(); break;
    case 'bypass-install': state.installGateBypassed = true; render(); break;
  }
}

// ===== PWA install support =====
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  state.showInstallBanner = true;
  render();
});
window.addEventListener('appinstalled', ()=>{
  state.showInstallBanner = false;
  deferredInstallPrompt = null;
  render();
});

async function installApp(){
  if(!deferredInstallPrompt) return;
  state.showInstallBanner = false; render();
  deferredInstallPrompt.prompt();
  try{ await deferredInstallPrompt.userChoice; }catch(e){}
  deferredInstallPrompt = null;
}

function dismissInstallBanner(){
  state.showInstallBanner = false;
  try{ sessionStorage.setItem('qurashi_install_dismissed','1'); }catch(e){}
  render();
}

if('serviceWorker' in navigator){
  let swReg = null;

  // ده كان سبب إن "التحديث ما وصلش لكل الناس": لما نسخة جديدة من الـ service
  // worker تتحمّل، بتفضل واقفة في حالة "waiting" ومش بتشتغل غير لما كل التابات
  // المفتوحة تتقفل خالص. على الموبايل (PWA) ده ممكن ميحصلش لأسابيع.
  // الحل: أول ما نلاقي نسخة مستنية، نبعتلها SKIP_WAITING تشتغل فورًا.
  function activateWaiting(reg){
    if(reg && reg.waiting){
      reg.waiting.postMessage({ type:'SKIP_WAITING' });
    }
  }

  window.addEventListener('load', ()=>{
    // updateViaCache:'none' يضمن إن ملف sw.js نفسه يتفحص من السيرفر
    // كل مرة، بدل ما يفضل المتصفح محتفظ بنسخة قديمة منه لحد 24 ساعة
    navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(reg=>{
      swReg = reg;
      activateWaiting(reg);
      reg.addEventListener('updatefound', ()=>{
        const nw = reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange', ()=>{
          // النسخة الجديدة اتثبتت وفيه نسخة قديمة شغالة → فعّلها فورًا
          if(nw.state === 'installed' && navigator.serviceWorker.controller){
            activateWaiting(reg);
          }
        });
      });
      reg.update().catch(()=>{});
    }).catch(()=>{});
  });

  // فحص وجود تحديث كل مرة التطبيق يرجع للواجهة (بعد ما كان في الخلفية) أو كل دقيقة
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState==='visible' && swReg){
      swReg.update().then(()=>activateWaiting(swReg)).catch(()=>{});
    }
  });
  setInterval(()=>{
    if(swReg) swReg.update().then(()=>activateWaiting(swReg)).catch(()=>{});
  }, 60000);

  let reloadedOnce = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(reloadedOnce) return;
    reloadedOnce = true;
    showToast('🔄 في تحديث جديد للتطبيق، جارٍ التحديث...');
    setTimeout(()=>window.location.reload(), 700);
  });
}

// ===== init =====
loadUserSession();
restoreAdminSession();
loadProfile();
loadCatalog().then(()=>{ checkForResumableDraft(); render(); });
render();
